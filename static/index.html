            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>标题提取模型：</label>
              <Select
                style={{ width: "100%" }}
                value={titleModel}
                onChange={setTitleModel}
                options={modelOptions}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>翻译模型：</label>
              <Select
                style={{ width: "100%" }}
                value={poeModel}
                onChange={setPoeModel}
                options={modelOptions}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <Checkbox
                checked={extractTagsOnUpload}
                onChange={e => setExtractTagsOnUpload(e.target.checked)}
              >
                上传后自动提取论文标签
              </Checkbox>
              <div style={{ fontSize: 12, color: "#7a7a7a", marginTop: 8, lineHeight: 1.6 }}>
                开启后会在获得摘要后额外请求 Poe 进行标签分类，并把 tags 一同返回前端，可能额外消耗少量积分。
              </div>
            </div>
            <div>
              <label style={{ display: "block", marginBottom: 8 }}>分享链接基础路径 (URL Base)：</label>
              <Input
                placeholder="留空则使用当前页面URL，例如: https://a.com"
                value={urlBase}
                onChange={e => setUrlBase(e.target.value)}
              />
              <div style={{ fontSize: 12, color: "#999", marginTop: 5 }}>
                设置后分享链接将使用此基础路径，例如当前页是 /chat/abc，URL Base 为 https://a.com，则分享链接为 https://a.com/chat/abc
              </div>
            </div>
          </Modal>

          <Modal
            title={ASSET_DIRECTION_MODAL_TITLE}
            open={assetDirectionModalVisible}
            onOk={handleAssetDirectionSubmit}
            onCancel={() => setAssetDirectionModalVisible(false)}
            okText="重新处理"
            confirmLoading={assetDirectionSubmitting}
          >
            <div className="asset-direction-modal">
              <div className="asset-direction-intro">
                如果插图或表格解析位置不对，可以在这里分别调整 caption 位置。保存后会重新处理当前论文的插图和表格。
              </div>

              <div className="asset-direction-card">
                <div className="asset-direction-card-title">插图设置</div>
                <div className="asset-direction-card-desc">这一组选项只影响“论文插图”。</div>
                <Radio.Group
                  value={figureDirectionValue}
                  onChange={(event) => setFigureDirectionValue(event.target.value)}
                  className="asset-direction-group"
                >
                  <Radio value="above">插图 caption 在上，图片内容在下</Radio>
                  <Radio value="below">插图 caption 在下，图片内容在上</Radio>
                </Radio.Group>
              </div>

              <div className="asset-direction-card">
                <div className="asset-direction-card-title">表格设置</div>
                <div className="asset-direction-card-desc">这一组选项只影响“论文表格”。</div>
                <Radio.Group
                  value={tableDirectionValue}
                  onChange={(event) => setTableDirectionValue(event.target.value)}
                  className="asset-direction-group"
                >
                  <Radio value="above">表格 caption 在上，表格内容在下</Radio>
                  <Radio value="below">表格 caption 在下，表格内容在上</Radio>
                </Radio.Group>
              </div>
            </div>
          </Modal>

          <Modal
            title="编辑论文标签"
            open={tagPickerVisible}
            onOk={applyTagSelection}
            onCancel={() => setTagPickerVisible(false)}
            okText="保存"
            confirmLoading={tagSaving}
            width={980}
            bodyStyle={{ paddingTop: 12 }}
          >
            <div className="tag-picker-toolbar">
              <div className="tag-picker-tabs">
                {tagLibrary.map(category => (
                  <button
                    key={category.category_code}
                    type="button"
                    className={`tag-picker-tab ${activeTagCategory === category.category_code ? "active" : ""}`}
                    onClick={() => setActiveTagCategory(category.category_code)}
                  >
                    {getLocalizedLabel(category)}
                  </button>
                ))}
              </div>
              <Input
                prefix={<SearchOutlined />}
                placeholder={uiLanguage === "en" ? "Search all tags" : "搜索全部标签"}
                value={tagKeyword}
                onChange={e => setTagKeyword(e.target.value)}
                className="tag-picker-search"
                allowClear
              />
            </div>

            <div className="tag-picker-selected">
              <div className="tag-picker-section-title">
                {uiLanguage === "en" ? `Selected Tags (${draftTagCodes.length})` : `已选标签（${draftTagCodes.length}）`}
              </div>
              <div className="tag-picker-selected-list">
                {renderSelectedTagPills(draftTagCodes, {
                  findTagByCode,
                  getLocalizedLabel,
                  onRemove: toggleDraftTag,
                  emptyText: uiLanguage === "en" ? "No tags selected" : "暂无已选标签",
                })}
              </div>
            </div>

            <div className="tag-picker-groups">
              {filteredTagCategories.map(category => (
                <div key={category.category_code} className="tag-picker-group">
                  <div className="tag-picker-group-title">{getLocalizedLabel(category)}</div>
                  <div className="tag-picker-chip-list">
                    {(category.tags || []).map(tag => {
                      const selected = draftTagCodes.includes(tag.tag_code);
                      return (
                        <button
                          key={tag.tag_code}
                          type="button"
                          className={`tag-picker-chip ${selected ? "selected" : ""}`}
                          onClick={() => toggleDraftTag(tag.tag_code)}
                          title={tag.tag_code}
                        >
                          <span>{getLocalizedLabel(tag)}</span>
                          <span className="tag-picker-chip-count">{tag.usage_count || 0}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </Modal>
        </>
      );
    }

    // ==========================================
    // 4. 入口渲染
    // ==========================================

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
