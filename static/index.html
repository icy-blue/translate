<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>论文翻译 - Poe API</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Ant Design -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.js"></script>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body {
      margin: 0;
      background: #f5f7fa;
    }

    .header-box {
      background: white;
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 1000;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .layout {
      display: flex;
      gap: 30px;
      margin-top: 20px;
    }

    .sidebar {
      width: 260px;
      background: white;
      padding: 20px;
      border-radius: 10px;
      height: 80vh;
      overflow-y: auto;
      position: sticky;
      top: 120px;
    }

    .toc-item {
      cursor: pointer;
      margin: 6px 0;
      font-size: 14px;
      color: #555;
    }

    .toc-item.active {
      color: #1677ff;
      font-weight: 600;
    }

    .level-1 {
      font-weight: 600;
    }

    .level-2 {
      padding-left: 16px;
    }

    .level-3 {
      padding-left: 32px;
    }

    .content h1,
    .content h2,
    .content h3 {
      scroll-margin-top: 220px;
    }


    .content {
      flex: 1;
    }

    .message-block {
      margin-bottom: 30px;
      padding: 25px;
      background: white;
      border-radius: 10px;
      border: 1px solid #eee;
    }

    .user-message-block {
      margin-bottom: 30px;
      padding: 25px;
      background: #f0f0f0;
      border-radius: 10px;
      border: 1px solid #ddd;
    }

    .title-block {
      margin-bottom: 30px;
      padding: 25px;
      background: #fafafa;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-size: 24px;
      font-weight: 600;
      text-align: center;
    }

    .math-block {
      margin: 20px 0;
    }

    .status-bar {
      background: #e6f4ff;
      color: #1677ff;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
    }

    /* Browse page styles */
    .browse-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .browse-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .view-toggle-btn {
      padding: 6px 12px;
      border: 1px solid #d9d9d9;
      background: white;
      cursor: pointer;
      border-radius: 4px;
      font-size: 14px;
    }

    .view-toggle-btn.active {
      background: #1677ff;
      color: white;
      border-color: #1677ff;
    }

    .paper-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    .paper-grid.masonry {
      display: block;
      column-count: 3;
      column-gap: 20px;
    }

    .paper-grid.masonry .paper-card {
      break-inside: avoid;
      margin-bottom: 20px;
    }

    .paper-grid.list {
      grid-template-columns: 1fr;
    }

    .paper-card {
      background: white;
      border-radius: 10px;
      border: 1px solid #eee;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      flex-direction: column;
    }

    .paper-card:hover {
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.12);
      transform: translateY(-4px);
    }

    .paper-title {
      font-size: 16px;
      font-weight: 600;
      color: #1677ff;
      margin-bottom: 10px;
      word-break: break-word;
      flex-grow: 0;
    }

    .paper-time {
      font-size: 12px;
      color: #999;
      margin-bottom: 12px;
    }

    .paper-summary {
      font-size: 13px;
      color: #666;
      line-height: 1.5;
      word-break: break-word;
      flex-grow: 1;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
    }

    .empty-state p {
      font-size: 16px;
      margin-bottom: 20px;
    }

    @media (max-width: 1200px) {
      .paper-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      .paper-grid.masonry {
        column-count: 2;
      }
    }

    @media (max-width: 768px) {
      .paper-grid,
      .paper-grid.masonry {
        grid-template-columns: 1fr;
        column-count: 1;
      }
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

    const { useState, useEffect } = React;
    const { Button, Upload, Input, InputNumber, message, Modal, Checkbox } = antd;
    const { TextArea } = Input;

    const BASE_URL = "";

    // BrowsePage Component
    function BrowsePage() {
      const [conversations, setConversations] = useState([]);
      const [loading, setLoading] = useState(false);
      const [viewMode, setViewMode] = useState("masonry"); // 'masonry' or 'list'

      useEffect(() => {
        loadConversations();
      }, []);

      async function loadConversations() {
        setLoading(true);
        try {
          const res = await fetch(`${BASE_URL}/conversations`);
          if (!res.ok) {
            message.error("加载论文列表失败");
            setLoading(false);
            return;
          }
          const data = await res.json();
          setConversations(data);
        } catch (err) {
          message.error("网络错误");
        }
        setLoading(false);
      }

      function goToPaper(conversationId) {
        window.history.pushState({}, "", `/chat/${conversationId}`);
        window.location.reload();
      }

      function formatDate(dateString) {
        const date = new Date(dateString);
        return date.toLocaleDateString("zh-CN", {
          year: "numeric",
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit"
        });
      }

      return (
        <div style={{ minHeight: "100vh" }}>
          <div className="header-box">
            <div className="container">
              <h2>📚 论文库</h2>
              <div className="browse-header">
                <span>已翻译 {conversations.length} 篇论文</span>
                <div className="browse-controls">
                  <button
                    className={`view-toggle-btn ${viewMode === "masonry" ? "active" : ""}`}
                    onClick={() => setViewMode("masonry")}
                  >
                    瀑布流
                  </button>
                  <button
                    className={`view-toggle-btn ${viewMode === "list" ? "active" : ""}`}
                    onClick={() => setViewMode("list")}
                  >
                    列表
                  </button>
                </div>
                {/* 新论文按钮单独区域 */}
                <div style={{ marginTop: 10 }}>
                  <button
                    className="view-toggle-btn"
                    style={{ background: "#52c41a", color: "white", borderColor: "#52c41a" }}
                    onClick={() => { window.location.href = "/chat"; }}
                  >
                    翻译新论文
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div className="container">
            {conversations.length === 0 ? (
              <div className="empty-state">
                <p>暂无翻译论文</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>上传 PDF 文件开始翻译</p>
              </div>
            ) : (
              <div className={`paper-grid ${viewMode}`}>
                {conversations.map(paper => (
                  <div
                    key={paper.id}
                    className="paper-card"
                    onClick={() => goToPaper(paper.id)}
                  >
                    <div className="paper-title">{paper.title || "未命名论文"}</div>
                    <div className="paper-time">{formatDate(paper.created_at)}</div>
                    <div className="paper-summary">{paper.summary || "暂无摘要"}</div>
                    {paper.pdf_url && (
                      <div style={{ marginTop: 10 }}>
                        <a href={paper.pdf_url} download target="_blank" rel="noopener noreferrer" style={{ color: '#1677ff', textDecoration: 'none' }} onClick={(e) => e.stopPropagation()}>
                          📄 下载 PDF
                        </a>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function App() {

      // ✅ 检测当前page是浏览页还是聊天页
      function getCurrentPage() {
        // match /chat or /chat/{id}
        const match = window.location.pathname.match(/^\/chat(?:\/(.+))?$/);
        if (match) {
          return { page: "chat", conversationId: match[1] || null };
        }
        return { page: "browse" };
      }

      const currentPageInfo = getCurrentPage();

      // 如果是浏览页，直接返回BrowsePage组件
      if (currentPageInfo.page === "browse") {
        return <BrowsePage />;
      }

      // ✅ 否则显示原来的聊天页面（ChatPage）
      return <ChatPage conversationId={currentPageInfo.conversationId} />;
    }

    // ChatPage Component (原来的App功能)
    function ChatPage({ conversationId: initialConversationId }) {

      // ✅ 从 URL 读取 conversationId
      function getConversationIdFromUrl() {
        const match = window.location.pathname.match(/\/chat\/(.+)/);
        return match ? match[1] : null;
      }

      function pushConversationToUrl(id) {
        window.history.pushState({}, "", `/chat/${id}`);
      }

      const [apiKey, setApiKey] = useState(localStorage.getItem("poe_api_key") || "");
      const [conversationId, setConversationId] = useState(getConversationIdFromUrl());
      const [blocks, setBlocks] = useState([]);
      const [toc, setToc] = useState([]);
      const [activeHeading, setActiveHeading] = useState(null);
      const [loading, setLoading] = useState(false);
      // paper title extracted by backend
      const [paperTitle, setPaperTitle] = useState("");
      // 每次自动继续的次数
      const [continueCount, setContinueCount] = useState(4);
      // 自定义对话
      const [customModalVisible, setCustomModalVisible] = useState(false);
      const [customMessage, setCustomMessage] = useState("");
      const [saveToRecord, setSaveToRecord] = useState(true);

      useEffect(() => { localStorage.setItem("poe_api_key", apiKey); }, [apiKey]);

      // update document title when paperTitle changes
      useEffect(() => {
        if (paperTitle) {
          document.title = `论文翻译 - ${paperTitle}`;
        } else {
          document.title = "论文翻译 - Poe API";
        }
      }, [paperTitle]);

      // ✅ 页面加载时如果 URL 有 id 自动加载历史
      useEffect(() => {
        const id = getConversationIdFromUrl();
        if (id) {
          setConversationId(id);
          loadConversation(id);
        }
      }, []);

      async function loadConversation(id) {
        setPaperTitle("");
        setLoading(true);
        const res = await fetch(`${BASE_URL}/conversation/${id}`);
        if (!res.ok) {
          message.error("会话不存在");
          setLoading(false);
          return;
        }
        const data = await res.json();
        if (data.title) {
          setPaperTitle(data.title);
        }
        // filter out continuation markers and rely on backend to remove the initial prompt
        const filtered = data.messages.filter(m => !(m.role === "user" && m.content === "继续"));
        setBlocks(
          filtered.map((m, i) => ({
            id: Date.now() + i,
            role: m.role,
            content: m.content
          }))
        );
        setLoading(false);
      }

      // ✅ 数学处理函数（保持你原来的）
      function processLatex(text) {
        const displayBlocks = [];
        let index = 0;

        text = text.replace(
          /\\\[((?:[\s\S]*?))\\\]/g,
          (_, formula) => {
            displayBlocks.push(
              `\n\n<div class="math-block">$$$$\n${formula.trim()}\n$$$$</div>\n\n`
            );
            return `__DISPLAY_BLOCK_${index++}__`;
          }
        );

        text = text.replace(
          /\(([^()\n]*?[\\_^][^()\n]*?)\)/g,
          (_, formula) => `\\(${formula}\\)`
        );

        displayBlocks.forEach((block, i) => {
          text = text.replace(`__DISPLAY_BLOCK_${i}__`, block);
        });

        return text;
      }

      useEffect(() => {

        renderMathInElement(document.body, {
          delimiters: [
            { left: "$$", right: "$$", display: true },
            { left: "\\(", right: "\\)", display: false }
          ],
          throwOnError: false,
          strict: false
        });

        const headings = document.querySelectorAll(".content h1, .content h2, .content h3");
        const newToc = [];

        headings.forEach((heading, index) => {
          const id = "heading-" + index;
          heading.id = id;
          newToc.push({
            id,
            text: heading.innerText,
            level: Number(heading.tagName.slice(1))
          });
        });

        setToc(newToc);

      }, [blocks]);

      useEffect(() => {
        const handleScroll = () => {
          const headings = document.querySelectorAll(".content h1, .content h2");
          let current = null;
          headings.forEach(heading => {
            if (heading.getBoundingClientRect().top <= 120) {
              current = heading.id;
            }
          });
          setActiveHeading(current);
        };
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      // ✅ 上传
      const uploadProps = {
        name: "file",
        accept: ".pdf",
        showUploadList: false,
        customRequest: async ({ file }) => {
          if (!apiKey) { message.error("请输入 API Key"); return; }

          const formData = new FormData();
          formData.append("file", file);
          formData.append("api_key", apiKey);

          setLoading(true);
          setBlocks([]);
          // 提取文件名（去掉.pdf后缀）作为临时标题
          const tempTitle = file.name.replace(/\.pdf$/i, "");
          setPaperTitle(tempTitle);

          const res = await fetch(`${BASE_URL}/upload`, {
            method: "POST",
            body: formData
          });

          const data = await res.json();
          setLoading(false);

          if (!res.ok) {
            message.error(data.detail || "上传失败");
            return;
          }

          // 如果文件已存在（后端通过指纹检测），后端返回 exists + messages
          if (data.exists) {
            setConversationId(data.conversation_id);
            if (data.title) { setPaperTitle(data.title); }
            pushConversationToUrl(data.conversation_id);

            const msgs = (data.messages || []).filter(m => !(m.role === "user" && m.content === "继续")).map((m, i) => ({ id: Date.now() + i, role: m.role, content: m.content }));
            setBlocks(msgs);
            message.info("文件已存在，跳转到对应会话");
            return;
          }

          // 新上传返回的也改为 messages 数组（包含 user 和 bot）
          setConversationId(data.conversation_id);
          if (data.title) { setPaperTitle(data.title); }
          pushConversationToUrl(data.conversation_id);

          const msgsNew = (data.messages || []).filter(m => !(m.role === "user" && m.content === "继续")).map((m, i) => ({ id: Date.now() + i, role: m.role, content: m.content }));
          setBlocks(msgsNew.length ? msgsNew : [{ id: Date.now(), role: "bot", content: "无回复" }]);
          setLoading(false);
        }
      };

      // ✅ 单次翻译请求
      const doContinue = async () => {
        const formData = new FormData();
        formData.append("api_key", apiKey);

        const res = await fetch(
          `${BASE_URL}/continue/${conversationId}`,
          { method: "POST", body: formData }
        );

        const data = await res.json();

        if (!res.ok) {
          message.error(data.detail || "请求失败");
          return false;
        }

        setBlocks(prev => [
          ...prev,
          { id: Date.now(), role: "bot", content: data.reply }
        ]);
        return true;
      };

      // ✅ 继续翻译（会根据 continueCount 调用多次）
      const handleContinue = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (!apiKey) { message.warning("请输入 API Key"); return; }

        setLoading(true);
        for (let i = 0; i < continueCount; i++) {
          const ok = await doContinue();
          if (!ok) break;
        }
        setLoading(false);
      };

      // 自定义对话提交
      const handleCustomSubmit = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (!apiKey) { message.warning("请输入 API Key"); return; }
        if (!customMessage.trim()) { message.warning("请输入消息"); return; }

        setLoading(true);
        const formData = new FormData();
        formData.append("api_key", apiKey);
        formData.append("message", customMessage);
        formData.append("save_to_record", saveToRecord);

        const res = await fetch(`${BASE_URL}/custom_message/${conversationId}`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        setLoading(false);

        if (!res.ok) {
          message.error(data.detail || "请求失败");
          return;
        }

        // always display user and bot responses locally
        setBlocks(prev => [
          ...prev,
          { id: Date.now(), role: "user", content: customMessage },
          { id: Date.now() + 1, role: "bot", content: data.reply }
        ]);
        if (!saveToRecord) {
          message.info("对话完成（未保存到记录）");
        }

        setCustomModalVisible(false);
        setCustomMessage("");
      };

      return (
        <>
          <div className="header-box">
            <div className="container">
              <h2>📄 论文翻译 - Poe API</h2>

              <Input.Password
                placeholder="请输入 Poe API Key"
                value={apiKey}
                onChange={e => setApiKey(e.target.value)}
                disabled={loading}
                style={{ marginBottom: 10 }}
              />

              <Button
                style={{ marginRight: 10, color: "#1677ff", borderColor: "#1677ff" }}
                onClick={() => window.location.href = "/"}
              >
                ← 论文库
              </Button>

              {/* upload button only when no conversation in progress */}
              {!conversationId && (
                <Upload {...uploadProps} disabled={loading}>
                  <Button type="primary" loading={loading}>
                    {loading ? "处理中..." : "上传 PDF"}
                  </Button>
                </Upload>
              )}

              <span style={{ marginLeft: 10 }}>自动继续次数：</span>
              <InputNumber
                min={0}
                value={continueCount}
                disabled={loading}
                onChange={v => setContinueCount(v)}
                style={{ width: 80, marginLeft: 5 }}
              />

              <Button
                style={{ marginLeft: 10 }}
                onClick={handleContinue}
                loading={loading}
                disabled={loading}
              >
                {loading ? "翻译中..." : "继续"}
              </Button>

              <Button
                style={{ marginLeft: 10 }}
                onClick={() => setCustomModalVisible(true)}
                disabled={loading || !conversationId}
              >
                自定义对话
              </Button>

              {loading && <div className="status-bar">⏳ 正在翻译...</div>}
            </div>
          </div>

          <div className="container">
            <div className="layout">

              <div className="sidebar">
                <h3>目录</h3>
                {toc.map(item => (
                  <div
                    key={item.id}
                    className={`toc-item level-${item.level} ${activeHeading === item.id ? "active" : ""}`}
                    onClick={() =>
                      document.getElementById(item.id)
                        ?.scrollIntoView({ behavior: "smooth" })
                    }
                  >
                    {item.text}
                  </div>
                ))}
              </div>

              <div className="content">
                {paperTitle && <div className="title-block">{paperTitle}</div>}
                {blocks.map(block => (
                  <div
                    key={block.id}
                    className={block.role === "user" ? "user-message-block" : "message-block"}
                    dangerouslySetInnerHTML={{
                      __html: marked.parse(processLatex(block.content))
                    }}
                  />
                ))}
              </div>

            </div>
          </div>

          <Modal
            title="自定义对话"
            open={customModalVisible}
            onOk={handleCustomSubmit}
            onCancel={() => setCustomModalVisible(false)}
            confirmLoading={loading}
          >
            <TextArea
              rows={4}
              placeholder="请输入追问内容"
              value={customMessage}
              onChange={e => setCustomMessage(e.target.value)}
            />
            <Checkbox
              checked={saveToRecord}
              onChange={e => setSaveToRecord(e.target.checked)}
              style={{ marginTop: 10 }}
            >
              保存到翻译记录里
            </Checkbox>
          </Modal>
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
