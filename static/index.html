<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <title>论文翻译 - Poe API</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Ant Design -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.js"></script>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div id="root"></div>

  <!-- Math Utils -->
  <script src="/static/math-utils.js"></script>

  <script type="text/babel">
    // ==========================================
    // 1. 常量与配置
    // ==========================================

    const { useState, useEffect } = React;
    const { Button, Upload, Input, InputNumber, message, Modal, Checkbox, Select, Tag } = antd;
    const { TextArea } = Input;

    const BASE_URL = "";

    // ==========================================
    // 2. 工具函数
    // ==========================================

    /**
     * 格式化日期时间
     */
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    /**
     * 瀑布流布局：将项目分配到指定数量的列中
     */
    function getMasonryColumns(items, cols) {
      const columns = Array.from({ length: cols }, () => []);
      items.forEach((item, index) => {
        const colIndex = index % cols;
        columns[colIndex].push(item);
      });
      return columns;
    }

    // ==========================================
    // 3. 组件定义
    // ==========================================

    // ==========================================
    // 3.1 App - 主应用组件，处理路由
    // ==========================================
    function App() {
      /**
       * 检测当前页面是浏览页还是聊天页
       */
      function getCurrentPage() {
        // match /chat or /chat/{id}
        const match = window.location.pathname.match(/^\/chat(?:\/(.+))?$/);
        if (match) {
          return { page: "chat", conversationId: match[1] || null };
        }
        return { page: "browse" };
      }

      const currentPageInfo = getCurrentPage();

      // 如果是浏览页，直接返回BrowsePage组件
      if (currentPageInfo.page === "browse") {
        return <BrowsePage />;
      }

      // 否则显示聊天页面（ChatPage）
      return <ChatPage conversationId={currentPageInfo.conversationId} />;
    }

    // ==========================================
    // 3.2 BrowsePage - 论文库浏览页面
    // ==========================================
    function BrowsePage() {
      // ===== 常量 =====
      const PAGE_SIZE = 10; // 与后端默认保持一致

      // ===== 数据状态 =====
      const [conversations, setConversations] = useState([]);
      const [totalCount, setTotalCount] = useState(0);

      // ===== UI 状态 =====
      const [loading, setLoading] = useState(false);
      const [viewMode, setViewMode] = useState("masonry"); // 'masonry' or 'list'
      const [readOnly, setReadOnly] = useState(false);
      const [offset, setOffset] = useState(0);
      const [hasMore, setHasMore] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const [columnCount, setColumnCount] = useState(3);

      // ===== 搜索状态 =====
      const [searchQuery, setSearchQuery] = useState("");
      const [searchResults, setSearchResults] = useState({ exact_matches: [], fuzzy_matches: [] });
      const [isSearching, setIsSearching] = useState(false);
      const [showSearchResults, setShowSearchResults] = useState(false);

      // ===== 响应式布局 =====
      useEffect(() => {
        function updateColumnCount() {
          const width = window.innerWidth;
          if (width <= 768) {
            setColumnCount(1);
          } else if (width <= 1200) {
            setColumnCount(2);
          } else {
            setColumnCount(3);
          }
        }

        updateColumnCount();
        window.addEventListener('resize', updateColumnCount);
        return () => window.removeEventListener('resize', updateColumnCount);
      }, []);

      // ===== 初始化 =====
      useEffect(() => {
        // 加载第一页
        loadConversations(false);
        // 加载配置
        loadConfig();
      }, []);

      // ===== 数据加载函数 =====
      async function loadConversations(append = false) {
        if (!append) {
          setLoading(true);
        } else {
          setLoadingMore(true);
        }

        try {
          const params = new URLSearchParams();
          params.append("limit", PAGE_SIZE);
          params.append("offset", append ? offset : 0);
          const res = await fetch(`${BASE_URL}/conversations?${params.toString()}`);

          if (!res.ok) {
            message.error("加载论文列表失败");
            return;
          }

          const data = await res.json();
          const items = data.conversations || [];
          // update total from server
          if (typeof data.total === 'number') {
            setTotalCount(data.total);
          }

          if (append) {
            setConversations(prev => [...prev, ...items]);
          } else {
            setConversations(items);
          }

          setHasMore(!!data.has_more);
          setOffset(prev => (append ? prev + items.length : items.length));
        } catch (err) {
          message.error("网络错误");
        } finally {
          setLoading(false);
          setLoadingMore(false);
        }
      }

      async function loadConfig() {
        try {
          const res = await fetch(`${BASE_URL}/config`);
          if (res.ok) {
            const data = await res.json();
            setReadOnly(data.read_only || false);
          }
        } catch (err) {
          console.error("Failed to load config:", err);
        }
      }

      // ===== 搜索功能 =====
      async function handleSearch() {
        if (!searchQuery.trim()) {
          setShowSearchResults(false);
          return;
        }

        setIsSearching(true);
        setShowSearchResults(true);

        try {
          const params = new URLSearchParams();
          params.append("q", searchQuery);
          const res = await fetch(`${BASE_URL}/search?${params.toString()}`);

          if (!res.ok) {
            message.error("搜索失败");
            return;
          }

          const data = await res.json();
          setSearchResults(data);
        } catch (err) {
          message.error("网络错误");
        } finally {
          setIsSearching(false);
        }
      }

      function clearSearch() {
        setSearchQuery("");
        setSearchResults({ exact_matches: [], fuzzy_matches: [] });
        setShowSearchResults(false);
        setOffset(0);
        loadConversations(false);
      }

      // ===== 导航功能 =====
      function goToPaper(conversationId) {
        window.history.pushState({}, "", `/chat/${conversationId}`);
        window.location.reload();
      }

      // ===== 渲染功能 =====
      const masonryColumns = viewMode === 'masonry' ? getMasonryColumns(conversations, columnCount) : [];
      const displayConversations = showSearchResults ? [] : conversations;

      /**
       * 渲染论文列表（瀑布流或列表视图）
       */
      function renderPapers(papers) {
        if (viewMode === 'masonry') {
          const columns = getMasonryColumns(papers, columnCount);
          return (
            <div style={{ display: 'flex', gap: '20px' }}>
              {columns.map((column, colIndex) => (
                <div key={colIndex} style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '20px' }}>
                  {column.map(paper => (
                    <PaperCard key={paper.id} paper={paper} goToPaper={goToPaper} />
                  ))}
                </div>
              ))}
            </div>
          );
        } else {
          return (
            <div className={`paper-grid ${viewMode}`}>
              {papers.map(paper => (
                <PaperCard key={paper.id} paper={paper} goToPaper={goToPaper} />
              ))}
            </div>
          );
        }
      }

      /**
       * 论文卡片组件
       */
      function PaperCard({ paper, goToPaper }) {
        return (
          <div
            className="paper-card"
            onClick={() => goToPaper(paper.id)}
          >
            <div className="paper-title">{paper.title || "未命名论文"}</div>
            <div className="paper-time">{formatDate(paper.created_at)}</div>
            <div className="paper-summary">{paper.summary || "暂无摘要"}</div>
            {paper.pdf_url && (
              <div style={{ marginTop: 10 }}>
                <a href={paper.pdf_url} download target="_blank" rel="noopener noreferrer" style={{ color: '#1677ff', textDecoration: 'none' }} onClick={(e) => e.stopPropagation()}>
                  📄 下载 PDF
                </a>
              </div>
            )}
            {paper.relevance !== undefined && (
              <div style={{ marginTop: 10, fontSize: 12, color: '#999' }}>
                相关度: {paper.relevance}
              </div>
            )}
          </div>
        );
      }

      // ===== JSX 渲染 =====
      return (
        <div style={{ minHeight: "100vh" }}>
          <div className="header-box">
            <div className="container">
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <h2>📚 论文库</h2>
                {readOnly && <Tag color="red">只读模式</Tag>}
              </div>
              <div className="browse-header">
                <div style={{ display: "flex", gap: 10, alignItems: "center", flex: 1 }}>
                  <span>{showSearchResults ? "搜索结果" : `已翻译 ${totalCount} 篇论文`}</span>
                  {/* Search bar integrated with controls */}
                  <Input
                    placeholder="搜索论文标题..."
                    value={searchQuery}
                    onChange={e => setSearchQuery(e.target.value)}
                    onPressEnter={handleSearch}
                    style={{ width: 250 }}
                    allowClear
                  />
                  {!showSearchResults ? (
                    <Button
                      type="primary"
                      size="small"
                      onClick={handleSearch}
                      loading={isSearching}
                    >
                      搜索
                    </Button>
                  ) : (
                    <Button
                      size="small"
                      onClick={clearSearch}
                    >
                      清除
                    </Button>
                  )}
                </div>
                <div className="browse-controls" style={{ flex: "none" }}>
                  <button
                    className={`view-toggle-btn ${viewMode === "masonry" ? "active" : ""}`}
                    onClick={() => setViewMode("masonry")}
                  >
                    瀑布流
                  </button>
                  <button
                    className={`view-toggle-btn ${viewMode === "list" ? "active" : ""}`}
                    onClick={() => setViewMode("list")}
                  >
                    列表
                  </button>
                  {!readOnly && (
                    <button
                      className="view-toggle-btn"
                      style={{ background: "#52c41a", color: "white", borderColor: "#52c41a" }}
                      onClick={() => { window.location.href = "/chat"; }}
                    >
                      翻译新论文
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>

          <div className="container">
            {/* Show exact matches section */}
            {showSearchResults && searchResults.exact_matches.length > 0 && (
              <>
                <div style={{ fontSize: 18, fontWeight: 600, margin: "20px 0 10px", color: "#1677ff" }}>
                  🔍 严格匹配 ({searchResults.exact_matches.length})
                </div>
                {renderPapers(searchResults.exact_matches)}
              </>
            )}

            {/* Show fuzzy matches section */}
            {showSearchResults && searchResults.fuzzy_matches.length > 0 && (
              <>
                <div style={{ fontSize: 18, fontWeight: 600, margin: "20px 0 10px", color: "#faad14" }}>
                  🔎 模糊匹配 ({searchResults.fuzzy_matches.length})
                </div>
                {renderPapers(searchResults.fuzzy_matches)}
              </>
            )}

            {/* Show no search results */}
            {showSearchResults && searchResults.exact_matches.length === 0 && searchResults.fuzzy_matches.length === 0 && (
              <div className="empty-state">
                <p>未找到匹配的论文</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>尝试使用不同的关键词搜索</p>
              </div>
            )}

            {/* Show all conversations when not searching */}
            {!showSearchResults && conversations.length === 0 ? (
              <div className="empty-state">
                <p>暂无翻译论文</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>上传 PDF 文件开始翻译</p>
              </div>
            ) : null}

            {!showSearchResults && conversations.length > 0 && (
              <>
                {renderPapers(conversations)}

                {hasMore && (
                  <div style={{ textAlign: 'center', margin: '20px 0' }}>
                    <Button onClick={() => loadConversations(true)} loading={loadingMore}>
                      {loadingMore ? '加载中…' : '加载更多'}
                    </Button>
                  </div>
                )}
              </>
            )}
          </div>
        </div>
      );
    }

    // ==========================================
    // 3.3 ChatPage - 论文翻译页面
    // ==========================================
    function ChatPage({ conversationId: initialConversationId }) {
      // ===== 路由与页面状态 =====
      /**
       * 从 URL 读取 conversationId
       */
      function getConversationIdFromUrl() {
        const match = window.location.pathname.match(/\/chat\/(.+)/);
        return match ? match[1] : null;
      }

      function pushConversationToUrl(id) {
        window.history.pushState({}, "", `/chat/${id}`);
      }

      const [conversationId, setConversationId] = useState(getConversationIdFromUrl());

      // ===== 数据状态 =====
      const [blocks, setBlocks] = useState([]);
      const [paperTitle, setPaperTitle] = useState("");

      // ===== UI 状态 =====
      const [loading, setLoading] = useState(false);
      const [configModalVisible, setConfigModalVisible] = useState(false);
      const [toc, setToc] = useState([]);
      const [activeHeading, setActiveHeading] = useState(null);

      // ===== 配置状态 =====
      const [poeApiKey, setPoeApiKey] = useState(localStorage.getItem("poe_api_key") || "");
      const [poeModel, setPoeModel] = useState(localStorage.getItem("poe_model") || "GPT-5.2-Instant");
      const [titleModel, setTitleModel] = useState(localStorage.getItem("title_model") || "GPT-5.2-Instant");
      const [readOnly, setReadOnly] = useState(false);

      // ===== 其他状态 =====
      const [continueCount, setContinueCount] = useState(4);
      const [customModalVisible, setCustomModalVisible] = useState(false);
      const [customMessage, setCustomMessage] = useState("");
      const [saveToRecord, setSaveToRecord] = useState(true);

      // ===== 模型选项 =====
      const modelOptions = [
        { label: "GPT-5.4", value: "GPT-5.4" },
        { label: "GPT-5.2", value: "GPT-5.2" },
        { label: "GPT-5.2-Instant", value: "GPT-5.2-Instant" },
        { label: "GPT-5.3-Instant", value: "GPT-5.3-Instant" },
        { label: "Minimax-M2.5", value: "Minimax-M2.5" },
        { label: "Kimi-K2.5-FW", value: "Kimi-K2.5-FW" },
        { label: "Qwen3.5-Flash", value: "Qwen3.5-Flash" },
        { label: "GLM-4.7-Flash", value: "GLM-4.7-Flash" },
        { label: "GPT-5-Chat", value: "GPT-5-Chat"},
        { label: "GPT-5", value: "GPT-5"},
      ];

      // ===== 配置管理 =====
      /**
       * 保存配置到 localStorage
       */
      const saveConfig = () => {
        localStorage.setItem("poe_api_key", poeApiKey);
        localStorage.setItem("poe_model", poeModel);
        localStorage.setItem("title_model", titleModel);
        message.success("配置已保存");
        setConfigModalVisible(false);
      };

      // ===== 初始化与副作用 =====
      /**
       * 更新文档标题
       */
      useEffect(() => {
        if (paperTitle) {
          document.title = `论文翻译 - ${paperTitle}`;
        } else {
          document.title = "论文翻译 - Poe API";
        }
      }, [paperTitle]);

      /**
       * 页面加载时如果 URL 有 id 自动加载历史
       */
      useEffect(() => {
        const id = getConversationIdFromUrl();
        if (id) {
          setConversationId(id);
          loadConversation(id);
        }
        loadConfig();
      }, []);

      /**
       * 渲染数学公式和生成目录
       */
      useEffect(() => {
        const contentEl = document.querySelector(".content");

        if (contentEl) {
          renderMathInElement(contentEl, {
            delimiters: [
              { left: "\\[", right: "\\]", display: true },
              { left: "\\(", right: "\\)", display: false }
            ],
            throwOnError: false,
            strict: false
          });
        }

        const headings = document.querySelectorAll(".content h1, .content h2, .content h3");
        const newToc = [];

        headings.forEach((heading, index) => {
          const id = "heading-" + index;
          heading.id = id;
          newToc.push({
            id,
            text: heading.innerText,
            level: Number(heading.tagName.slice(1))
          });
        });

        setToc(newToc);
      }, [blocks]);

      /**
       * 监听滚动，高亮当前目录项
       */
      useEffect(() => {
        const handleScroll = () => {
          const headings = document.querySelectorAll(".content h1, .content h2");
          let current = null;
          headings.forEach(heading => {
            if (heading.getBoundingClientRect().top <= 120) {
              current = heading.id;
            }
          });
          setActiveHeading(current);
        };
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      // ===== 数据加载函数 =====
      async function loadConversation(id) {
        setPaperTitle("");
        setLoading(true);
        const res = await fetch(`${BASE_URL}/conversation/${id}`);
        if (!res.ok) {
          message.error("会话不存在");
          setLoading(false);
          return;
        }
        const data = await res.json();
        if (data.title) {
          setPaperTitle(data.title);
        }
        // filter out continuation markers and rely on backend to remove the initial prompt
        const filtered = data.messages.filter(m => !(m.role === "user" && m.content === "继续"));
        setBlocks(
          filtered.map((m, i) => ({
            id: Date.now() + i,
            role: m.role,
            content: m.content
          }))
        );
        setLoading(false);
      }

      async function loadConfig() {
        try {
          const res = await fetch(`${BASE_URL}/config`);
          if (res.ok) {
            const data = await res.json();
            setReadOnly(data.read_only || false);
          }
        } catch (err) {
          console.error("Failed to load config:", err);
        }
      }

      // ===== 上传功能 =====
      const uploadProps = {
        name: "file",
        accept: ".pdf",
        showUploadList: false,
        customRequest: async ({ file }) => {
          if (!poeApiKey) { message.error("请先配置 API Key"); return; }

          const formData = new FormData();
          formData.append("file", file);
          formData.append("api_key", poeApiKey);
          formData.append("poe_model", poeModel);
          formData.append("title_model", titleModel);

          setLoading(true);
          setBlocks([]);
          // 提取文件名（去掉.pdf后缀）作为临时标题
          const tempTitle = file.name.replace(/\.pdf$/i, "");
          setPaperTitle(tempTitle);

          const res = await fetch(`${BASE_URL}/upload`, {
            method: "POST",
            body: formData
          });

          const data = await res.json();
          setLoading(false);

          if (!res.ok) {
            message.error(data.detail || "上传失败");
            return;
          }

          // 如果文件已存在（后端通过指纹检测），后端返回 exists + messages
          if (data.exists) {
            setConversationId(data.conversation_id);
            if (data.title) { setPaperTitle(data.title); }
            pushConversationToUrl(data.conversation_id);

            const msgs = (data.messages || []).filter(m => !(m.role === "user" && m.content === "继续")).map((m, i) => ({ id: Date.now() + i, role: m.role, content: m.content }));
            setBlocks(msgs);
            message.info("文件已存在，跳转到对应会话");
            return;
          }

          // 新上传返回的也改为 messages 数组（包含 user 和 bot）
          setConversationId(data.conversation_id);
          if (data.title) { setPaperTitle(data.title); }
          pushConversationToUrl(data.conversation_id);

          const msgsNew = (data.messages || []).filter(m => !(m.role === "user" && m.content === "继续")).map((m, i) => ({ id: Date.now() + i, role: m.role, content: m.content }));
          setBlocks(msgsNew.length ? msgsNew : [{ id: Date.now(), role: "bot", content: "无回复" }]);
          setLoading(false);
        }
      };

      // ===== 翻译功能 =====
      /**
       * 单次翻译请求
       */
      const doContinue = async () => {
        const formData = new FormData();
        formData.append("api_key", poeApiKey);
        formData.append("poe_model", poeModel);

        const res = await fetch(
          `${BASE_URL}/continue/${conversationId}`,
          { method: "POST", body: formData }
        );

        const data = await res.json();

        if (!res.ok) {
          message.error(data.detail || "请求失败");
          return false;
        }

        setBlocks(prev => [
          ...prev,
          { id: Date.now(), role: "bot", content: data.reply }
        ]);
        return true;
      };

      /**
       * 继续翻译（会根据 continueCount 调用多次）
       */
      const handleContinue = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (!poeApiKey) { message.warning("请先配置 API Key"); return; }

        setLoading(true);
        for (let i = 0; i < continueCount; i++) {
          const ok = await doContinue();
          if (!ok) break;
        }
        setLoading(false);
      };

      /**
       * 自定义对话提交
       */
      const handleCustomSubmit = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (!poeApiKey) { message.warning("请先配置 API Key"); return; }
        if (!customMessage.trim()) { message.warning("请输入消息"); return; }

        setLoading(true);
        const formData = new FormData();
        formData.append("api_key", poeApiKey);
        formData.append("message", customMessage);
        formData.append("save_to_record", saveToRecord);
        formData.append("poe_model", poeModel);

        const res = await fetch(`${BASE_URL}/custom_message/${conversationId}`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        setLoading(false);

        if (!res.ok) {
          message.error(data.detail || "请求失败");
          return;
        }

        // always display user and bot responses locally
        setBlocks(prev => [
          ...prev,
          { id: Date.now(), role: "user", content: customMessage },
          { id: Date.now() + 1, role: "bot", content: data.reply }
        ]);
        if (!saveToRecord) {
          message.info("对话完成（未保存到记录）");
        }

        setCustomModalVisible(false);
        setCustomMessage("");
      };

      // ===== JSX 渲染 =====
      return (
        <>
          <div className="header-box">
            <div className="container">
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <h2>📄 论文翻译 - Poe API</h2>
                {readOnly && <Tag color="red">只读模式</Tag>}
              </div>

              <div style={{ marginTop: 15 }}>
                <Button
                  style={{ marginRight: 10, color: "#1677ff", borderColor: "#1677ff" }}
                  onClick={() => window.location.href = "/"}
                >
                  ← 论文库
                </Button>

                <Button
                  style={{ marginRight: 10 }}
                  onClick={() => setConfigModalVisible(true)}
                  disabled={loading}
                >
                  ⚙️ 配置
                </Button>

                {/* upload button only when no conversation in progress */}
                {!readOnly && !conversationId && (
                  <Upload {...uploadProps} disabled={loading}>
                    <Button type="primary" loading={loading}>
                      {loading ? "处理中..." : "上传 PDF"}
                    </Button>
                  </Upload>
                )}

                {!readOnly && (
                  <>
                    <span style={{ marginLeft: 10 }}>自动继续次数：</span>
                    <InputNumber
                      min={0}
                      value={continueCount}
                      disabled={loading}
                      onChange={v => setContinueCount(v)}
                      style={{ width: 80, marginLeft: 5 }}
                    />

                    <Button
                      style={{ marginLeft: 10 }}
                      onClick={handleContinue}
                      loading={loading}
                      disabled={loading || !conversationId}
                    >
                      {loading ? "翻译中..." : "继续"}
                    </Button>

                    <Button
                      style={{ marginLeft: 10 }}
                      onClick={() => setCustomModalVisible(true)}
                      disabled={loading || !conversationId}
                    >
                      自定义对话
                    </Button>
                  </>
                )}

                {loading && <div className="status-bar">⏳ 正在翻译...</div>}
              </div>
            </div>
          </div>

          <div className="container">
            <div className="layout">

              <div className="sidebar">
                <h3>目录</h3>
                {toc.map(item => (
                  <div
                    key={item.id}
                    className={`toc-item level-${item.level} ${activeHeading === item.id ? "active" : ""}`}
                    onClick={() =>
                      document.getElementById(item.id)
                        ?.scrollIntoView({ behavior: "smooth" })
                    }
                  >
                    {item.text}
                  </div>
                ))}
              </div>

              <div className="content">
                {paperTitle && <div className="title-block">{paperTitle}</div>}
                {blocks.map(block => (
                  <div
                    key={block.id}
                    className={block.role === "user" ? "user-message-block" : "message-block"}
                    dangerouslySetInnerHTML={{
                      __html: MathUtils.renderMarkdownWithMath(block.content)
                    }}
                  />
                ))}
              </div>

            </div>
          </div>

          <Modal
            title="自定义对话"
            open={customModalVisible}
            onOk={handleCustomSubmit}
            onCancel={() => setCustomModalVisible(false)}
            confirmLoading={loading}
          >
            <TextArea
              rows={4}
              placeholder="请输入追问内容"
              value={customMessage}
              onChange={e => setCustomMessage(e.target.value)}
            />
            <Checkbox
              checked={saveToRecord}
              onChange={e => setSaveToRecord(e.target.checked)}
              style={{ marginTop: 10 }}
            >
              保存到翻译记录里
            </Checkbox>
          </Modal>

          <Modal
            title="Poe API 配置"
            open={configModalVisible}
            onOk={saveConfig}
            onCancel={() => setConfigModalVisible(false)}
            width={500}
          >
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>Poe API Key：</label>
              <Input.Password
                placeholder="请输入 Poe API Key"
                value={poeApiKey}
                onChange={e => setPoeApiKey(e.target.value)}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>标题提取模型：</label>
              <Select
                style={{ width: "100%" }}
                value={titleModel}
                onChange={setTitleModel}
                options={modelOptions}
              />
            </div>
            <div>
              <label style={{ display: "block", marginBottom: 8 }}>翻译模型：</label>
              <Select
                style={{ width: "100%" }}
                value={poeModel}
                onChange={setPoeModel}
                options={modelOptions}
              />
            </div>
          </Modal>
        </>
      );
    }

    // ==========================================
    // 4. 入口渲染
    // ==========================================

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
