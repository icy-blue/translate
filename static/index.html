<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>论文翻译 - Poe API</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Ant Design -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/icons@4.7.0/dist/index.umd.js"></script>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div id="root"></div>

  <!-- Math Utils -->
  <script src="/static/math-utils.js"></script>

  <script type="text/babel">
    // ==========================================
    // 1. 常量与配置
    // ==========================================

    const { useState, useEffect } = React;
    const { Button, Upload, Input, InputNumber, message, Modal, Checkbox, Select, Tag, Drawer, Dropdown, Menu, Tooltip, Image, Radio } = antd;
    const { AppstoreOutlined, BarsOutlined, PlusOutlined, SearchOutlined, FileTextOutlined, ArrowLeftOutlined, SettingOutlined, UploadOutlined, CaretRightOutlined, MoreOutlined, ShareAltOutlined, DownloadOutlined, TagsOutlined, EditOutlined, ReloadOutlined } = icons;

    const BASE_URL = "";
    const AUTO_TRANSLATE_BREAKER_DEFAULT = 8;
    const AUTO_TRANSLATE_LOCAL_KEYS = {
      appendix: "auto_translate_appendix",
      breakerLimit: "auto_translate_breaker_limit",
    };
    const TAG_CATEGORY_META = {
      L: { className: "tag-chip-learning" },
      M: { className: "tag-chip-modality" },
      T: { className: "tag-chip-task" },
      S: { className: "tag-chip-system" },
      A: { className: "tag-chip-application" },
      P: { className: "tag-chip-property" },
    };

    // ==========================================
    // 2. 工具函数
    // ==========================================

    /**
     * 格式化日期时间
     */
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    function getStoredBoolean(key, defaultValue = false) {
      const raw = localStorage.getItem(key);
      if (raw === null) {
        return defaultValue;
      }
      return raw === "true";
    }

    function getStoredInteger(key, defaultValue) {
      const raw = Number(localStorage.getItem(key));
      return Number.isFinite(raw) && raw > 0 ? raw : defaultValue;
    }

    function buildAutomationSettingsSnapshot({
      autoTranslateAppendix,
      autoTranslateBreakerLimit,
    }) {
      return {
        autoTranslateAppendix: Boolean(autoTranslateAppendix),
        autoTranslateBreakerLimit: Number.isFinite(Number(autoTranslateBreakerLimit))
          ? Math.max(1, Number(autoTranslateBreakerLimit))
          : AUTO_TRANSLATE_BREAKER_DEFAULT,
      };
    }

    function getEnabledAutoScopeTargets(settings) {
      const scopes = [];
      if (settings.autoTranslateAppendix) scopes.push("appendix");
      return scopes;
    }

    function getScopeLabel(scope) {
      if (scope === "appendix") return "附录";
      if (scope === "body") return "正文";
      if (scope === "done") return "全部内容";
      if (scope === "none") return "无";
      return "当前范围";
    }

    function formatTranslationActionLabel(nextAction) {
      if (!nextAction || typeof nextAction !== "object") {
        return "";
      }
      if (nextAction.type === "stop") {
        return "停止";
      }
      if (nextAction.type === "continue") {
        return nextAction.target_scope === "appendix" ? "继续翻译附录" : "继续翻译正文";
      }
      return "";
    }

    function formatActionButtonLabel(action, options = {}) {
      const { fallback = "继续翻译正文", stopLabel = "无可继续内容" } = options;
      if (!action || typeof action !== "object") {
        return fallback;
      }
      if (action.type === "stop") {
        return stopLabel;
      }
      if (action.target_scope === "appendix") {
        return "继续翻译附录";
      }
      return "继续翻译正文";
    }

    /**
     * 瀑布流布局：将项目分配到指定数量的列中
     */
    function getMasonryColumns(items, cols) {
      const columns = Array.from({ length: cols }, () => []);
      items.forEach((item, index) => {
        const colIndex = index % cols;
        columns[colIndex].push(item);
      });
      return columns;
    }

    function renderTagChips(tags, options = {}) {
      const { emptyText = null, compact = false } = options;
      if (!Array.isArray(tags) || tags.length === 0) {
        return emptyText ? <span className="tag-empty-text">{emptyText}</span> : null;
      }

      return tags.map(tag => {
        const chipClassName = getPaperTagChipClassName(tag, { compact });
        return (
          <span
            key={tag.id || `${tag.tag_code}-${tag.tag_label}`}
            className={chipClassName}
            title={tag.tag_label_en ? `${tag.tag_path || tag.tag_label} / ${tag.tag_path_en || tag.tag_label_en}` : (tag.tag_path || tag.tag_label)}
          >
            {tag.tag_label}
          </span>
        );
      });
    }

    function normalizePaperMeta(data = {}) {
      return {
        venue_abbr: data.venue_abbr || "",
        ccf_category: data.ccf_category || "None",
        ccf_type: data.ccf_type || "None",
        citation_count: data.citation_count ?? null,
        venue: data.venue || null,
        year: data.year ?? null,
        semantic_updated_at: data.semantic_updated_at || null,
      };
    }

    function truncateLabel(text, maxLength = 18) {
      if (!text || text.length <= maxLength) {
        return text;
      }
      return `${text.slice(0, maxLength)}...`;
    }

    function buildMetaTagItems(meta = {}, options = {}) {
      const { compact = false } = options;
      const items = [];
      const ccfCategory = meta.ccf_category || "None";
      const ccfLabel = ccfCategory === "None" ? "CCF-None" : `CCF-${ccfCategory}`;
      const ccfClassName = ccfCategory === "A"
        ? "tag-chip-ccf-a"
        : ccfCategory === "B"
          ? "tag-chip-ccf-b"
          : ccfCategory === "C"
            ? "tag-chip-ccf-c"
            : "tag-chip-ccf-none";

      items.push({
        key: `ccf-${ccfCategory}`,
        label: ccfLabel,
        title: ccfLabel,
        className: ccfClassName,
        tooltip: false,
      });

      const venueLabel = meta.venue_abbr || meta.venue;
      if (venueLabel) {
        items.push({
          key: `venue-${venueLabel}`,
          label: truncateLabel(venueLabel, compact ? 14 : 20),
          title: meta.venue || venueLabel,
          className: "tag-chip-venue",
          tooltip: true,
        });
      }

      if (meta.year) {
        items.push({
          key: `year-${meta.year}`,
          label: String(meta.year),
          title: String(meta.year),
          className: "tag-chip-year",
          tooltip: false,
        });
      }

      return items;
    }

    function renderMetaTagChips(meta, options = {}) {
      const { compact = false } = options;
      return buildMetaTagItems(meta, { compact }).map(item => (
        item.tooltip ? (
          <Tooltip key={item.key} title={item.title}>
            <span
              className={["tag-chip", item.className, compact ? "tag-chip-compact" : ""].filter(Boolean).join(" ")}
            >
              {item.label}
            </span>
          </Tooltip>
        ) : (
          <span
            key={item.key}
            className={["tag-chip", item.className, compact ? "tag-chip-compact" : ""].filter(Boolean).join(" ")}
            title={item.title}
          >
            {item.label}
          </span>
        )
      ));
    }

    function normalizeTranslationStatus(status) {
      if (!status || typeof status !== "object") {
        return null;
      }
      const protocol = String(status.protocol || "").trim();
      if (protocol && protocol !== "unit_v1") {
        return null;
      }
      const state = String(status.state || "").toUpperCase();
      if (!state) {
        return null;
      }
      const activeUnits = Array.isArray(status.active_units)
        ? status.active_units.map(item => String(item || "").trim()).filter(Boolean)
        : [];
      const completedUnitIds = Array.isArray(status.completed_unit_ids)
        ? status.completed_unit_ids.map(item => String(item || "").trim()).filter(Boolean)
        : [];
      const remainingUnitIds = Array.isArray(status.remaining_unit_ids)
        ? status.remaining_unit_ids.map(item => String(item || "").trim()).filter(Boolean)
        : [];
      const currentUnitIndex = Number.isFinite(Number(status.current_unit_index))
        ? Number(status.current_unit_index)
        : -1;
      const totalUnitCount = Number.isFinite(Number(status.total_unit_count))
        ? Number(status.total_unit_count)
        : completedUnitIds.length + remainingUnitIds.length;
      const completedUnitCount = Number.isFinite(Number(status.completed_unit_count))
        ? Number(status.completed_unit_count)
        : completedUnitIds.length;
      return {
        protocol: protocol || "unit_v1",
        planner_status: String(status.planner_status || "").trim().toLowerCase(),
        active_scope: String(status.active_scope || "").trim().toLowerCase(),
        active_units: activeUnits,
        current_unit_id: String(status.current_unit_id || "").trim(),
        current_unit_index: currentUnitIndex,
        completed_unit_ids: completedUnitIds,
        remaining_unit_ids: remainingUnitIds,
        next_unit_id: String(status.next_unit_id || "").trim(),
        state,
        reason: String(status.reason || "").trim(),
        total_unit_count: totalUnitCount,
        completed_unit_count: completedUnitCount,
        source: String(status.source || ""),
        is_completed: Boolean(status.is_completed),
        is_all_done: Boolean(status.is_all_done),
      };
    }

    function normalizeTranslationPlan(plan) {
      if (!plan || typeof plan !== "object") {
        return null;
      }
      const protocol = String(plan.protocol || "").trim();
      if (protocol && protocol !== "unit_v1") {
        return null;
      }
      const status = String(plan.status || "").trim().toLowerCase();
      if (status && status !== "ok" && status !== "unsupported") {
        return null;
      }
      const units = Array.isArray(plan.units)
        ? plan.units.map(item => String(item || "").trim()).filter(Boolean)
        : [];
      const appendixUnits = Array.isArray(plan.appendix_units)
        ? plan.appendix_units.map(item => String(item || "").trim()).filter(Boolean)
        : [];
      return {
        protocol: protocol || "unit_v1",
        status,
        units,
        appendix_units: appendixUnits,
        reason: String(plan.reason || "").trim(),
      };
    }

    function normalizeTranslationGlossary(glossary) {
      if (!glossary || typeof glossary !== "object") {
        return null;
      }
      const protocol = String(glossary.protocol || "").trim();
      if (protocol && protocol !== "glossary_v1") {
        return null;
      }
      const rawStatus = String(glossary.status || "").trim().toLowerCase();
      const entries = Array.isArray(glossary.entries)
        ? glossary.entries
            .map(entry => {
              if (!entry || typeof entry !== "object") {
                return null;
              }
              const term = String(entry.term || "").trim();
              const candidates = Array.isArray(entry.candidates)
                ? Array.from(new Set(entry.candidates.map(item => String(item || "").trim()).filter(Boolean))).slice(0, 3)
                : [];
              if (!term || candidates.length === 0) {
                return null;
              }
              const selected = candidates.includes(String(entry.selected || "").trim())
                ? String(entry.selected || "").trim()
                : candidates[0];
              return { term, candidates, selected };
            })
            .filter(Boolean)
        : [];
      const status = rawStatus === "draft" || rawStatus === "confirmed"
        ? rawStatus
        : (entries.length > 0 ? "draft" : "confirmed");
      return {
        protocol: protocol || "glossary_v1",
        status: entries.length === 0 ? "confirmed" : status,
        entries,
      };
    }

    function buildTranslationProgressBreakdown(status, plan) {
      const fallbackOverallCompleted = Number.isFinite(Number(status?.completed_unit_count))
        ? Number(status.completed_unit_count)
        : 0;
      const fallbackOverallTotal = Number.isFinite(Number(status?.total_unit_count))
        ? Number(status.total_unit_count)
        : 0;
      const bodyUnits = Array.isArray(plan?.units) ? plan.units : [];
      const appendixUnits = Array.isArray(plan?.appendix_units) ? plan.appendix_units : [];
      const hasScopedPlan = bodyUnits.length > 0 || appendixUnits.length > 0 || String(plan?.status || "").trim().toLowerCase() === "unsupported";
      const completedSet = new Set(
        Array.isArray(status?.completed_unit_ids)
          ? status.completed_unit_ids.map(item => String(item || "").trim()).filter(Boolean)
          : []
      );
      const bodyCompleted = bodyUnits.filter(unitId => completedSet.has(unitId)).length;
      const appendixCompleted = appendixUnits.filter(unitId => completedSet.has(unitId)).length;
      const overallCompleted = hasScopedPlan ? bodyCompleted + appendixCompleted : fallbackOverallCompleted;
      const overallTotal = hasScopedPlan ? bodyUnits.length + appendixUnits.length : fallbackOverallTotal;
      return {
        hasScopedPlan,
        overallCompleted,
        overallTotal,
        bodyCompleted: hasScopedPlan ? bodyCompleted : null,
        bodyTotal: hasScopedPlan ? bodyUnits.length : null,
        appendixCompleted: hasScopedPlan ? appendixCompleted : null,
        appendixTotal: hasScopedPlan ? appendixUnits.length : null,
      };
    }

    function formatUnitProgress(completed, total, options = {}) {
      const { emptyText = "0 / 0 块" } = options;
      if (!Number.isFinite(Number(total))) {
        return emptyText;
      }
      const safeTotal = Math.max(0, Number(total));
      if (safeTotal === 0) {
        return emptyText;
      }
      const safeCompleted = Math.min(safeTotal, Math.max(0, Number(completed) || 0));
      return `${safeCompleted} / ${safeTotal} 块`;
    }

    function formatProgressRatio(completed, total, options = {}) {
      const { emptyText = "0 / 0" } = options;
      if (!Number.isFinite(Number(total))) {
        return emptyText;
      }
      const safeTotal = Math.max(0, Number(total));
      const safeCompleted = Math.min(safeTotal, Math.max(0, Number(completed) || 0));
      if (safeTotal === 0) {
        return emptyText;
      }
      return `${safeCompleted} / ${safeTotal}`;
    }

    function formatProgressPercent(completed, total) {
      if (!Number.isFinite(Number(total)) || Number(total) <= 0) {
        return "0%";
      }
      const safeTotal = Math.max(1, Number(total));
      const safeCompleted = Math.min(safeTotal, Math.max(0, Number(completed) || 0));
      return `${Math.round((safeCompleted / safeTotal) * 100)}%`;
    }

    function parseJsonObject(raw) {
      if (!raw) {
        return null;
      }
      if (typeof raw === "object" && !Array.isArray(raw)) {
        return raw;
      }
      if (typeof raw !== "string") {
        return null;
      }
      try {
        const parsed = JSON.parse(raw);
        return parsed && typeof parsed === "object" && !Array.isArray(parsed) ? parsed : null;
      } catch (err) {
        return null;
      }
    }

    function getRoleFromMessageKind(messageKind) {
      return String(messageKind || "").trim().toLowerCase() === "bot_reply" ? "bot" : "user";
    }

    function getMessageClientPayload(messageLike) {
      if (!messageLike || typeof messageLike !== "object") {
        return null;
      }
      return parseJsonObject(messageLike.client_payload) || parseJsonObject(messageLike.client_payload_json);
    }

    function normalizeChatBlock(messageLike, fallbackId) {
      const clientPayload = getMessageClientPayload(messageLike);
      const translationStatus = normalizeTranslationStatus(
        messageLike?.translation_status || clientPayload?.translation_status
      );
      const cleanContent = String(messageLike?.content || "");
      const messageKind = String(
        messageLike?.message_kind
          || messageLike?.message_type
          || (messageLike?.role === "bot" ? "bot_reply" : "user_message")
      ).trim().toLowerCase();
      return {
        id: messageLike?.id ?? fallbackId,
        role: messageLike?.role || getRoleFromMessageKind(messageKind),
        message_kind: messageKind,
        visible_to_user: messageLike?.visible_to_user !== false,
        content: cleanContent,
        translation_status: translationStatus,
      };
    }

    function getLatestTranslationContextFromMessages(messages) {
      const items = Array.isArray(messages) ? messages : [];
      let latestTranslationStatus = null;
      let latestTranslationPlan = null;
      let latestTranslationGlossary = null;
      for (let i = items.length - 1; i >= 0; i -= 1) {
        const messageLike = items[i];
        const messageKind = String(
          messageLike?.message_kind
            || messageLike?.message_type
            || (messageLike?.role === "bot" ? "bot_reply" : "user_message")
        ).trim().toLowerCase();
        const role = messageLike?.role || getRoleFromMessageKind(messageKind);
        if (role !== "bot") {
          continue;
        }
        const clientPayload = getMessageClientPayload(messageLike);
        const translationStatus = normalizeTranslationStatus(
          messageLike?.translation_status || clientPayload?.translation_status
        );
        const translationPlan = normalizeTranslationPlan(
          messageLike?.translation_plan || clientPayload?.translation_plan
        );
        const translationGlossary = normalizeTranslationGlossary(
          messageLike?.translation_glossary || clientPayload?.translation_glossary
        );
        if (!latestTranslationStatus && translationStatus) {
          latestTranslationStatus = translationStatus;
        }
        if (!latestTranslationPlan && translationPlan) {
          latestTranslationPlan = translationPlan;
        }
        if (!latestTranslationGlossary && translationGlossary) {
          latestTranslationGlossary = translationGlossary;
        }
        if (latestTranslationStatus && latestTranslationPlan && latestTranslationGlossary) {
          break;
        }
      }
      return {
        translationStatus: latestTranslationStatus,
        translationPlan: latestTranslationPlan,
        translationGlossary: latestTranslationGlossary,
      };
    }

    function buildVisibleBlocks(messages) {
      const baseId = Date.now();
      return (Array.isArray(messages) ? messages : [])
        .map((messageLike, index) => normalizeChatBlock(messageLike, `${baseId}-${index}`))
        .filter(messageLike => messageLike?.visible_to_user !== false);
    }

    function getTranslationStateMeta(status) {
      const state = status?.state;
      if (state === "ALL_DONE") {
        return { label: "全部完成", className: "translation-status-done" };
      }
      if (state === "UNSUPPORTED") {
        return { label: "翻译失败", className: "translation-status-body-done" };
      }
      if (state === "BODY_DONE" && status?.active_scope === "appendix" && (status?.completed_unit_count || 0) > 0) {
        return { label: "附录进行中", className: "translation-status-progress" };
      }
      if (state === "BODY_DONE") {
        return { label: "正文完成", className: "translation-status-body-done" };
      }
      return { label: "进行中", className: "translation-status-progress" };
    }

    function getNextUnitAction(status) {
      if (!status || typeof status !== "object") {
        return { type: "stop", command: "", target_scope: "none" };
      }
      if (status.state === "UNSUPPORTED" || status.state === "ALL_DONE") {
        return { type: "stop", command: "", target_scope: "none" };
      }
      if (!Array.isArray(status.remaining_unit_ids) || status.remaining_unit_ids.length === 0) {
        return { type: "stop", command: "", target_scope: "none" };
      }
      const targetScope = status.active_scope === "appendix" ? "appendix" : "body";
      return {
        type: "continue",
        command: formatTranslationActionLabel({ type: "continue", target_scope: targetScope }),
        target_scope: targetScope,
      };
    }

    function resolveAutomationAction(status, settings) {
      const action = getNextUnitAction(status);
      if (action.type !== "continue") {
        return action;
      }
      if (action.target_scope === "appendix" && !settings.autoTranslateAppendix) {
        return { type: "stop", command: "", target_scope: "none" };
      }
      return action;
    }

    function getContinueButtonMeta(status) {
      const action = getNextUnitAction(status);
      if (status?.state === "ALL_DONE") {
        return { action, enabled: false, label: "已完成" };
      }
      if (status?.state === "UNSUPPORTED") {
        return { action, enabled: false, label: "翻译失败" };
      }
      if (!action || action.type === "stop") {
        return { action, enabled: false, label: "无可继续内容" };
      }
      return { action, enabled: true, label: formatActionButtonLabel(action) };
    }

    function getAutoTranslateButtonMeta(status, automationSettings) {
      const action = resolveAutomationAction(status, automationSettings);
      if (status?.state === "ALL_DONE") {
        return { action, enabled: false, label: "已完成" };
      }
      if (status?.state === "UNSUPPORTED") {
        return { action, enabled: false, label: "翻译失败" };
      }
      if (!action || action.type === "stop") {
        if (status?.state === "BODY_DONE") {
          return { action, enabled: false, label: "正文已完成" };
        }
        return { action, enabled: false, label: "无可继续内容" };
      }
      return { action, enabled: true, label: "自动翻完" };
    }

    function getPaperTagChipClassName(tag, options = {}) {
      const { compact = false } = options;
      const meta = TAG_CATEGORY_META[tag?.category_code] || {};
      return ["tag-chip", meta.className, compact ? "tag-chip-compact" : ""].filter(Boolean).join(" ");
    }

      function renderRemovableChipItems(items, options = {}) {
        const { emptyText = null, compact = false } = options;
        if (!Array.isArray(items) || items.length === 0) {
          return emptyText ? <span className="tag-empty-text">{emptyText}</span> : null;
        }

      return items.map(item => {
        const chipNode = (
          <button
            key={item.key}
            type="button"
            className={[item.className || "tag-chip", "tag-chip-action", compact ? "tag-chip-compact" : ""].filter(Boolean).join(" ")}
            onClick={item.onRemove}
            title={item.tooltip ? undefined : item.title}
          >
            {item.icon && <span className="tag-chip-icon">{item.icon}</span>}
            <span className="tag-chip-action-text">{item.label}</span>
            <span className="tag-chip-remove">×</span>
          </button>
        );
        return item.tooltip ? (
          <Tooltip key={item.key} title={item.title}>
            {chipNode}
          </Tooltip>
        ) : chipNode;
      });
    }

    function renderSelectedTagPills(tagCodes, options = {}) {
      const { findTagByCode, getLocalizedLabel, onRemove, emptyText } = options;
      if (!Array.isArray(tagCodes) || tagCodes.length === 0) {
        return <span className="tag-empty-text">{emptyText || "暂无已选标签"}</span>;
      }

      return tagCodes.map(tagCode => {
        const tag = findTagByCode(tagCode);
        return (
          <button
            key={tagCode}
            type="button"
            className="tag-picker-selected-pill"
            onClick={() => onRemove && onRemove(tagCode)}
          >
            <span className="tag-picker-selected-pill-text">{getLocalizedLabel(tag)}</span>
            <span className="tag-picker-selected-pill-remove">x</span>
          </button>
        );
      });
    }

    const READ_MODE_TOOLTIP = "当前为阅读模式。如需切换为编辑模式，请先修改后端 .env 中的 READ_ONLY 配置，并重启后端后生效。";
    const ASSET_DIRECTION_TOOLTIP = "解析有错误？";
    const ASSET_DIRECTION_MODAL_TITLE = "解析有错误？试试调整解析配置";

    function ReadModeBadge() {
      return (
        <Tooltip title={READ_MODE_TOOLTIP}>
          <Tag className="mode-badge mode-badge-read">阅读模式</Tag>
        </Tooltip>
      );
    }

    function getBrowserLanguage() {
      const lang = (navigator.language || "zh-CN").toLowerCase();
      return lang.startsWith("zh") ? "zh" : "en";
    }

    const BROWSE_SEARCH_PARAM_KEYS = ["q", "tag_code", "ccf_category", "venue_filter", "year"];

    function normalizeBrowseSearchState(state = {}) {
      const filters = state.filters || {};
      const normalizeList = (value) => Array.from(new Set(
        (Array.isArray(value) ? value : [])
          .map(item => String(item || "").trim())
          .filter(Boolean)
      ));

      return {
        query: String(state.query || "").trim(),
        filters: {
          tagCodes: normalizeList(filters.tagCodes),
          ccfCategories: normalizeList(filters.ccfCategories),
          venues: normalizeList(filters.venues),
          years: normalizeList(filters.years),
        },
      };
    }

    function getBrowseSearchStateFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return normalizeBrowseSearchState({
        query: params.get("q") || "",
        filters: {
          tagCodes: params.getAll("tag_code"),
          ccfCategories: params.getAll("ccf_category"),
          venues: params.getAll("venue_filter"),
          years: params.getAll("year"),
        },
      });
    }

    function hasBrowseSearchState(state = {}) {
      const normalized = normalizeBrowseSearchState(state);
      const filters = normalized.filters;
      return Boolean(
        normalized.query ||
        filters.tagCodes.length ||
        filters.ccfCategories.length ||
        filters.venues.length ||
        filters.years.length
      );
    }

    function syncBrowseSearchStateToUrl(state = {}, options = {}) {
      const normalized = normalizeBrowseSearchState(state);
      const url = new URL(window.location.href);

      BROWSE_SEARCH_PARAM_KEYS.forEach(key => url.searchParams.delete(key));

      if (normalized.query) {
        url.searchParams.set("q", normalized.query);
      }
      normalized.filters.tagCodes.forEach(value => url.searchParams.append("tag_code", value));
      normalized.filters.ccfCategories.forEach(value => url.searchParams.append("ccf_category", value));
      normalized.filters.venues.forEach(value => url.searchParams.append("venue_filter", value));
      normalized.filters.years.forEach(value => url.searchParams.append("year", value));

      const nextUrl = `${url.pathname}${url.search}${url.hash}`;
      const currentUrl = `${window.location.pathname}${window.location.search}${window.location.hash}`;
      if (nextUrl !== currentUrl) {
        const method = options.replace ? "replaceState" : "pushState";
        window.history[method]({}, "", nextUrl);
      }
    }

    // ==========================================
    // 3. 组件定义
    // ==========================================

    // ==========================================
    // 3.1 App - 主应用组件，处理路由
    // ==========================================
    function App() {
      /**
       * 检测当前页面是浏览页还是聊天页
       */
      function getCurrentPage() {
        // match /chat or /chat/{id}
        const match = window.location.pathname.match(/^\/chat(?:\/(.+))?$/);
        if (match) {
          return { page: "chat", conversationId: match[1] || null };
        }
        return { page: "browse" };
      }

      const currentPageInfo = getCurrentPage();

      // 如果是浏览页，直接返回BrowsePage组件
      if (currentPageInfo.page === "browse") {
        return <BrowsePage />;
      }

      // 否则显示聊天页面（ChatPage）
      return <ChatPage conversationId={currentPageInfo.conversationId} />;
    }

    // ==========================================
    // 3.2 BrowsePage - 论文库浏览页面
    // ==========================================
    function BrowsePage() {
      const initialBrowseState = getBrowseSearchStateFromUrl();
      const EMPTY_SEARCH_FILTERS = {
        tagCodes: [],
        ccfCategories: [],
        venues: [],
        years: [],
      };

      // ===== 常量 =====
      const PAGE_SIZE = 10; // 与后端默认保持一致

      // ===== 响应式状态 =====
      const [isMobile, setIsMobile] = useState(window.innerWidth <= 576);

      // ===== 数据状态 =====
      const [conversations, setConversations] = useState([]);
      const [totalCount, setTotalCount] = useState(0);

      // ===== UI 状态 =====
      const [loading, setLoading] = useState(false);
      const [viewMode, setViewMode] = useState("masonry"); // 'masonry' or 'list'
      const [readOnly, setReadOnly] = useState(false);
      const [configModalVisible, setConfigModalVisible] = useState(false);
      const [offset, setOffset] = useState(0);
      const [hasMore, setHasMore] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const [columnCount, setColumnCount] = useState(3);

      // ===== 搜索状态 =====
      const [searchQuery, setSearchQuery] = useState(initialBrowseState.query);
      const [searchResults, setSearchResults] = useState({ exact_matches: [], fuzzy_matches: [] });
      const [isSearching, setIsSearching] = useState(false);
      const [searchStatus, setSearchStatus] = useState("idle"); // 'idle' | 'loading' | 'success' | 'error'
      const [showSearchResults, setShowSearchResults] = useState(false);
      const [tagLibrary, setTagLibrary] = useState([]);
      const [searchFilterLibrary, setSearchFilterLibrary] = useState({ ccf_categories: [], venues: [], years: [] });
      const [libraryTotalCount, setLibraryTotalCount] = useState(0);
      const [selectedTagCodes, setSelectedTagCodes] = useState(initialBrowseState.filters.tagCodes);
      const [selectedCcfCategories, setSelectedCcfCategories] = useState(initialBrowseState.filters.ccfCategories);
      const [selectedVenueFilters, setSelectedVenueFilters] = useState(initialBrowseState.filters.venues);
      const [selectedYears, setSelectedYears] = useState(initialBrowseState.filters.years);
      const [tagPickerVisible, setTagPickerVisible] = useState(false);
      const [draftTagCodes, setDraftTagCodes] = useState(initialBrowseState.filters.tagCodes);
      const [draftCcfCategories, setDraftCcfCategories] = useState(initialBrowseState.filters.ccfCategories);
      const [draftVenueFilters, setDraftVenueFilters] = useState(initialBrowseState.filters.venues);
      const [draftYears, setDraftYears] = useState(initialBrowseState.filters.years);
      const [activeTagCategory, setActiveTagCategory] = useState("L");
      const [tagKeyword, setTagKeyword] = useState("");
      const [uiLanguage, setUiLanguage] = useState(getBrowserLanguage());
      const [mobileSearchDirty, setMobileSearchDirty] = useState(false);
      const [poeApiKey, setPoeApiKey] = useState(localStorage.getItem("poe_api_key") || "");
      const [defaultPoeModel, setDefaultPoeModel] = useState("GPT-5.2-Instant");
      const [poeModel, setPoeModel] = useState(localStorage.getItem("poe_model") || "");
      const [titleModel, setTitleModel] = useState(localStorage.getItem("title_model") || "");
      const [extractTagsOnUpload, setExtractTagsOnUpload] = useState(localStorage.getItem("extract_tags_on_upload") === "true");
      const [autoTranslateAppendix, setAutoTranslateAppendix] = useState(getStoredBoolean(AUTO_TRANSLATE_LOCAL_KEYS.appendix, false));
      const [autoTranslateBreakerLimit, setAutoTranslateBreakerLimit] = useState(getStoredInteger(AUTO_TRANSLATE_LOCAL_KEYS.breakerLimit, AUTO_TRANSLATE_BREAKER_DEFAULT));
      const [urlBase, setUrlBase] = useState(localStorage.getItem("urlbase") || "");

      const modelOptions = [
        { label: "GPT-5.4", value: "GPT-5.4" },
        { label: "GPT-5.2", value: "GPT-5.2" },
        { label: "GPT-5.2-Instant", value: "GPT-5.2-Instant" },
        { label: "GPT-5.3-Instant", value: "GPT-5.3-Instant" },
        { label: "Minimax-M2.5", value: "Minimax-M2.5" },
        { label: "Kimi-K2.5-FW", value: "Kimi-K2.5-FW" },
        { label: "Qwen3.5-Flash", value: "Qwen3.5-Flash" },
        { label: "GLM-4.7-Flash", value: "GLM-4.7-Flash" },
        { label: "GPT-5-Chat", value: "GPT-5-Chat"},
        { label: "GPT-5", value: "GPT-5"},
      ];

      const automationSettings = buildAutomationSettingsSnapshot({
        autoTranslateAppendix,
        autoTranslateBreakerLimit,
      });
      const activePoeModel = poeModel || defaultPoeModel;
      const activeTitleModel = titleModel || defaultPoeModel;

      // ===== 响应式布局 =====
      useEffect(() => {
        setUiLanguage(getBrowserLanguage());

        function updateColumnCount() {
          const width = window.innerWidth;
          setIsMobile(width <= 576);
          if (width <= 768) {
            setColumnCount(1);
          } else if (width <= 1200) {
            setColumnCount(2);
          } else {
            setColumnCount(3);
          }
        }

        updateColumnCount();
        window.addEventListener('resize', updateColumnCount);
        return () => window.removeEventListener('resize', updateColumnCount);
      }, []);

      // ===== 初始化 =====
      function resolveSearchFilters(options = {}) {
        return {
          tagCodes: options.tagCodes !== undefined ? options.tagCodes : selectedTagCodes,
          ccfCategories: options.ccfCategories !== undefined ? options.ccfCategories : selectedCcfCategories,
          venues: options.venues !== undefined ? options.venues : selectedVenueFilters,
          years: options.years !== undefined ? options.years : selectedYears,
        };
      }

      function getSelectedFilterCount(filters = resolveSearchFilters()) {
        return filters.tagCodes.length + filters.ccfCategories.length + filters.venues.length + filters.years.length;
      }

      function applyBrowseSearchState(state = {}, options = {}) {
        const normalized = normalizeBrowseSearchState(state);
        const filters = normalized.filters;

        setSearchQuery(normalized.query);
        setSelectedTagCodes(filters.tagCodes);
        setSelectedCcfCategories(filters.ccfCategories);
        setSelectedVenueFilters(filters.venues);
        setSelectedYears(filters.years);
        setDraftTagCodes(filters.tagCodes);
        setDraftCcfCategories(filters.ccfCategories);
        setDraftVenueFilters(filters.venues);
        setDraftYears(filters.years);
        setTagKeyword("");
        setOffset(0);
        setMobileSearchDirty(false);

        if (normalized.query) {
          handleSearch({
            query: normalized.query,
            tagCodes: filters.tagCodes,
            ccfCategories: filters.ccfCategories,
            venues: filters.venues,
            years: filters.years,
            syncUrl: options.syncUrl,
            replaceUrl: options.replaceUrl,
          });
          return;
        }

        setSearchResults({ exact_matches: [], fuzzy_matches: [] });
        setShowSearchResults(false);
        setSearchStatus("idle");

        if (getSelectedFilterCount(filters) > 0) {
          if (options.syncUrl !== false) {
            syncBrowseSearchStateToUrl({
              query: "",
              filters,
            }, { replace: options.replaceUrl });
          }
          loadConversations(false, filters);
          return;
        }

        if (options.syncUrl !== false) {
          syncBrowseSearchStateToUrl({
            query: "",
            filters: EMPTY_SEARCH_FILTERS,
          }, { replace: options.replaceUrl });
        }
        loadConversations(false, EMPTY_SEARCH_FILTERS);
      }

      // ===== 初始化 =====
      useEffect(() => {
        applyBrowseSearchState(initialBrowseState, { syncUrl: false });
        loadConfig();
        loadTagLibrary();
        loadSearchFilterLibrary();
      }, []);

      useEffect(() => {
        function handlePopState() {
          applyBrowseSearchState(getBrowseSearchStateFromUrl(), { syncUrl: false });
        }

        window.addEventListener("popstate", handlePopState);
        return () => window.removeEventListener("popstate", handlePopState);
      }, []);

      // ===== 数据加载函数 =====

      function appendSearchFilterParams(params, filters) {
        filters.tagCodes.forEach(tagCode => params.append("tag_code", tagCode));
        filters.ccfCategories.forEach(value => params.append("ccf_category", value));
        filters.venues.forEach(value => params.append("venue_filter", value));
        filters.years.forEach(value => params.append("year", value));
      }

      async function loadConversations(append = false, options = {}) {
        const filters = resolveSearchFilters(options);
        if (!append) {
          setLoading(true);
        } else {
          setLoadingMore(true);
        }

        try {
          const params = new URLSearchParams();
          params.append("limit", PAGE_SIZE);
          params.append("offset", append ? offset : 0);
          appendSearchFilterParams(params, filters);
          const res = await fetch(`${BASE_URL}/conversations?${params.toString()}`);

          if (!res.ok) {
            message.error("加载论文列表失败");
            return;
          }

          const data = await res.json();
          const items = data.conversations || [];
          // update total from server
          if (typeof data.total === 'number') {
            setTotalCount(data.total);
          }

          if (append) {
            setConversations(prev => [...prev, ...items]);
          } else {
            setConversations(items);
          }

          setHasMore(!!data.has_more);
          setOffset(prev => (append ? prev + items.length : items.length));
        } catch (err) {
          message.error("网络错误");
        } finally {
          setLoading(false);
          setLoadingMore(false);
        }
      }

      async function loadConfig() {
        try {
          const res = await fetch(`${BASE_URL}/config`);
          if (res.ok) {
            const data = await res.json();
            setReadOnly(data.read_only || false);
            if (data.default_poe_model) {
              setDefaultPoeModel(data.default_poe_model);
            }
          }
        } catch (err) {
          console.error("Failed to load config:", err);
        }
      }

      async function loadTagLibrary() {
        try {
          const res = await fetch(`${BASE_URL}/tags/library`);
          if (!res.ok) {
            return;
          }
          const data = await res.json();
          const categories = Array.isArray(data.categories) ? data.categories : [];
          setTagLibrary(categories);
          if (categories.length > 0) {
            setActiveTagCategory(prev => prev || categories[0].category_code);
          }
        } catch (err) {
          console.error("Failed to load tag library:", err);
        }
      }

      const saveConfig = () => {
        localStorage.setItem("poe_api_key", poeApiKey);
        localStorage.setItem("poe_model", activePoeModel);
        localStorage.setItem("title_model", activeTitleModel);
        localStorage.setItem("extract_tags_on_upload", String(extractTagsOnUpload));
        localStorage.setItem(AUTO_TRANSLATE_LOCAL_KEYS.appendix, String(autoTranslateAppendix));
        localStorage.setItem(AUTO_TRANSLATE_LOCAL_KEYS.breakerLimit, String(Math.max(1, Number(autoTranslateBreakerLimit) || AUTO_TRANSLATE_BREAKER_DEFAULT)));
        localStorage.setItem("urlbase", urlBase);
        message.success("配置已保存");
        setConfigModalVisible(false);
      };

      async function loadSearchFilterLibrary() {
        try {
          const res = await fetch(`${BASE_URL}/search/filters`);
          if (!res.ok) {
            return;
          }
          const data = await res.json();
          setSearchFilterLibrary({
            ccf_categories: Array.isArray(data.ccf_categories) ? data.ccf_categories : [],
            venues: Array.isArray(data.venues) ? data.venues : [],
            years: Array.isArray(data.years) ? data.years : [],
          });
          if (typeof data.total_conversations === "number") {
            setLibraryTotalCount(data.total_conversations);
          }
        } catch (err) {
          console.error("Failed to load search filter library:", err);
        }
      }

      // ===== 搜索功能 =====
      async function handleSearch(options = {}) {
        const queryValue = (options.query !== undefined ? options.query : searchQuery).trim();
        const filters = resolveSearchFilters(options);
        const selectedFilterCount = getSelectedFilterCount(filters);
        const shouldSyncUrl = options.syncUrl !== false;

        setSearchQuery(queryValue);
        setMobileSearchDirty(false);

        if (shouldSyncUrl) {
          syncBrowseSearchStateToUrl({
            query: queryValue,
            filters,
          }, { replace: options.replaceUrl });
        }

        if (!queryValue && selectedFilterCount === 0) {
          setSearchResults({ exact_matches: [], fuzzy_matches: [] });
          setShowSearchResults(false);
          setSearchStatus("idle");
          setOffset(0);
          await loadConversations(false, EMPTY_SEARCH_FILTERS);
          return;
        }

        if (!queryValue && selectedFilterCount > 0) {
          setSearchResults({ exact_matches: [], fuzzy_matches: [] });
          setShowSearchResults(false);
          setSearchStatus("idle");
          setOffset(0);
          await loadConversations(false, filters);
          return;
        }

        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), 10000);

        setIsSearching(true);
        setShowSearchResults(true);
        setSearchStatus("loading");
        setSearchResults({ exact_matches: [], fuzzy_matches: [] });

        try {
          const params = new URLSearchParams();
          if (queryValue) {
            params.append("q", queryValue);
          }
          appendSearchFilterParams(params, filters);
          const res = await fetch(`${BASE_URL}/search?${params.toString()}`, {
            signal: controller.signal,
          });

          if (!res.ok) {
            message.error("搜索失败");
            setSearchStatus("error");
            return;
          }

          const data = await res.json();
          if (typeof data.total_conversations === "number") {
            setLibraryTotalCount(data.total_conversations);
          }
          setSearchResults(data);
          setSearchStatus("success");
        } catch (err) {
          const isAbortError = err && err.name === "AbortError";
          message.error(isAbortError ? "搜索超时" : "网络错误");
          setSearchStatus("error");
        } finally {
          window.clearTimeout(timeoutId);
          setIsSearching(false);
        }
      }

      function clearSearch() {
        setSearchQuery("");
        setMobileSearchDirty(false);
        setSelectedTagCodes([]);
        setSelectedCcfCategories([]);
        setSelectedVenueFilters([]);
        setSelectedYears([]);
        setDraftTagCodes([]);
        setDraftCcfCategories([]);
        setDraftVenueFilters([]);
        setDraftYears([]);
        setTagKeyword("");
        setSearchResults({ exact_matches: [], fuzzy_matches: [] });
        setShowSearchResults(false);
        setSearchStatus("idle");
        setOffset(0);
        syncBrowseSearchStateToUrl({ query: "", filters: EMPTY_SEARCH_FILTERS });
        loadConversations(false, EMPTY_SEARCH_FILTERS);
      }

      function getLocalizedLabel(item) {
        if (!item) {
          return "";
        }
        if (uiLanguage === "en") {
          return item.tag_label_en || item.category_label_en || item.tag_label || item.category_label || "";
        }
        return item.tag_label || item.category_label || item.tag_label_en || item.category_label_en || "";
      }

      function findTagByCode(tagCode) {
        for (const category of tagLibrary) {
          const found = (category.tags || []).find(tag => tag.tag_code === tagCode);
          if (found) {
            return found;
          }
        }
        return null;
      }

      function findSearchFilterOption(type, value) {
        if (type === "ccf") {
          return (searchFilterLibrary.ccf_categories || []).find(item => item.value === value) || null;
        }
        if (type === "venue") {
          return (searchFilterLibrary.venues || []).find(item => item.value === value) || null;
        }
        if (type === "year") {
          return (searchFilterLibrary.years || []).find(item => item.value === value) || null;
        }
        return null;
      }

      function openTagPicker() {
        setDraftTagCodes([...selectedTagCodes]);
        setDraftCcfCategories([...selectedCcfCategories]);
        setDraftVenueFilters([...selectedVenueFilters]);
        setDraftYears([...selectedYears]);
        setTagKeyword("");
        setTagPickerVisible(true);
      }

      function toggleDraftSelection(type, value) {
        const updateList = (setter) => setter(prev => (
          prev.includes(value)
            ? prev.filter(item => item !== value)
            : [...prev, value]
        ));

        if (type === "paper_tag") {
          updateList(setDraftTagCodes);
        } else if (type === "ccf") {
          updateList(setDraftCcfCategories);
        } else if (type === "venue") {
          updateList(setDraftVenueFilters);
        } else if (type === "year") {
          updateList(setDraftYears);
        }
      }

      function applyTagSelection() {
        const nextTagCodes = [...draftTagCodes];
        const nextCcfCategories = [...draftCcfCategories];
        const nextVenueFilters = [...draftVenueFilters];
        const nextYears = [...draftYears];
        setSelectedTagCodes(nextTagCodes);
        setSelectedCcfCategories(nextCcfCategories);
        setSelectedVenueFilters(nextVenueFilters);
        setSelectedYears(nextYears);
        setTagPickerVisible(false);
        handleSearch({
          query: searchQuery.trim(),
          tagCodes: nextTagCodes,
          ccfCategories: nextCcfCategories,
          venues: nextVenueFilters,
          years: nextYears,
        });
      }

      // ===== 导航功能 =====
      function goToPaper(conversationId) {
        window.history.pushState({}, "", `/chat/${conversationId}`);
        window.location.reload();
      }

      // ===== 渲染功能 =====
      const pickerSections = [
        ...tagLibrary.map(category => ({
          key: category.category_code,
          title: getLocalizedLabel(category),
          type: "paper_tag",
          items: (category.tags || []).map(tag => ({
            value: tag.tag_code,
            label: getLocalizedLabel(tag),
            count: tag.usage_count || 0,
            title: tag.tag_code,
          })),
        })),
        {
          key: "CCF",
          title: "CCF",
          type: "ccf",
          items: (searchFilterLibrary.ccf_categories || []).map(item => ({
            value: item.value,
            label: item.label,
            count: item.count || 0,
            title: item.label,
          })),
        },
        {
          key: "VENUE",
          title: "会议/期刊名",
          type: "venue",
          items: (searchFilterLibrary.venues || []).map(item => ({
            value: item.value,
            label: item.label,
            count: item.count || 0,
            title: item.full_label || item.label,
          })),
        },
        {
          key: "YEAR",
          title: "年份",
          type: "year",
          items: (searchFilterLibrary.years || []).map(item => ({
            value: item.value,
            label: item.label,
            count: item.count || 0,
            title: item.label,
          })),
        },
      ];

      const filteredTagCategories = tagKeyword.trim()
        ? pickerSections
            .map(section => ({
              ...section,
              items: (section.items || []).filter(item => {
                const searchText = `${item.label} ${item.value} ${item.title || ""}`.toLowerCase();
                return searchText.includes(tagKeyword.trim().toLowerCase());
              }),
            }))
            .filter(section => section.items.length > 0)
        : pickerSections.filter(section => section.key === activeTagCategory);

      const selectedFilterCount = getSelectedFilterCount();
      const browseSubtitle = `已翻译 ${libraryTotalCount || totalCount} 篇论文`;
      const hasKeywordSearch = !!searchQuery.trim();
      const shouldShowRelevance = showSearchResults && hasKeywordSearch;
      const exactResultCount = searchResults.exact_matches.length;
      const fuzzyResultCount = searchResults.fuzzy_matches.length;
      const totalSearchResultCount = exactResultCount + fuzzyResultCount;
      const resultModeLabel = hasKeywordSearch && selectedFilterCount > 0
        ? "标签 + 关键字搜索"
        : hasKeywordSearch
          ? "关键字搜索"
          : "标签筛选";
      const shouldShowResultSummary = (selectedFilterCount > 0 && !hasKeywordSearch)
        || (showSearchResults && searchStatus === "success");
      const appliedSelectedItems = buildAppliedSelectedItems();

      function scrollToBrowseResultSection(sectionId) {
        document.getElementById(sectionId)?.scrollIntoView({ behavior: "smooth", block: "start" });
      }

      function removeAppliedSelection(type, value) {
        const nextFilters = {
          tagCodes: type === "paper_tag" ? selectedTagCodes.filter(item => item !== value) : [...selectedTagCodes],
          ccfCategories: type === "ccf" ? selectedCcfCategories.filter(item => item !== value) : [...selectedCcfCategories],
          venues: type === "venue" ? selectedVenueFilters.filter(item => item !== value) : [...selectedVenueFilters],
          years: type === "year" ? selectedYears.filter(item => item !== value) : [...selectedYears],
        };

        setSelectedTagCodes(nextFilters.tagCodes);
        setSelectedCcfCategories(nextFilters.ccfCategories);
        setSelectedVenueFilters(nextFilters.venues);
        setSelectedYears(nextFilters.years);
        setDraftTagCodes(nextFilters.tagCodes);
        setDraftCcfCategories(nextFilters.ccfCategories);
        setDraftVenueFilters(nextFilters.venues);
        setDraftYears(nextFilters.years);

        handleSearch({
          query: searchQuery.trim(),
          tagCodes: nextFilters.tagCodes,
          ccfCategories: nextFilters.ccfCategories,
          venues: nextFilters.venues,
          years: nextFilters.years,
        });
      }

      useEffect(() => {
        if (!pickerSections.some(section => section.key === activeTagCategory) && pickerSections.length > 0) {
          setActiveTagCategory(pickerSections[0].key);
        }
      }, [tagLibrary, searchFilterLibrary, activeTagCategory]);

      useEffect(() => {
        if (!isMobile || !mobileSearchDirty) {
          return;
        }
        const timer = window.setTimeout(() => {
          handleSearch({ query: searchQuery.trim(), replaceUrl: true });
        }, 1000);
        return () => window.clearTimeout(timer);
      }, [isMobile, mobileSearchDirty, searchQuery]);

      function buildDraftSelectedItems() {
        const items = [];
        draftTagCodes.forEach(tagCode => {
          const tag = findTagByCode(tagCode);
          items.push({
            key: `paper_tag:${tagCode}`,
            label: getLocalizedLabel(tag) || tagCode,
            title: tagCode,
            className: getPaperTagChipClassName(tag),
            onRemove: () => toggleDraftSelection("paper_tag", tagCode),
          });
        });
        draftCcfCategories.forEach(value => {
          const item = findSearchFilterOption("ccf", value);
          items.push({
            key: `ccf:${value}`,
            label: item?.label || `CCF-${value}`,
            title: item?.label || `CCF-${value}`,
            className: ["tag-chip", value === "A" ? "tag-chip-ccf-a" : value === "B" ? "tag-chip-ccf-b" : value === "C" ? "tag-chip-ccf-c" : "tag-chip-ccf-none"].join(" "),
            onRemove: () => toggleDraftSelection("ccf", value),
          });
        });
        draftVenueFilters.forEach(value => {
          const item = findSearchFilterOption("venue", value);
          items.push({
            key: `venue:${value}`,
            label: item?.label || value,
            title: item?.title || item?.full_label || value,
            className: "tag-chip tag-chip-venue",
            tooltip: true,
            onRemove: () => toggleDraftSelection("venue", value),
          });
        });
        draftYears.forEach(value => {
          const item = findSearchFilterOption("year", value);
          items.push({
            key: `year:${value}`,
            label: item?.label || value,
            title: item?.label || value,
            className: "tag-chip tag-chip-year",
            onRemove: () => toggleDraftSelection("year", value),
          });
        });
        return items;
      }

      function buildAppliedSelectedItems() {
        const searchItems = [];
        const filterItems = [];
        if (searchQuery.trim()) {
          searchItems.push({
            key: `query:${searchQuery.trim()}`,
            label: `搜索：${searchQuery.trim()}`,
            title: `关键词：${searchQuery.trim()}`,
            className: "tag-chip tag-chip-keyword",
            icon: <SearchOutlined />,
            onRemove: () => {
              handleSearch({
                query: "",
                tagCodes: selectedTagCodes,
                ccfCategories: selectedCcfCategories,
                venues: selectedVenueFilters,
                years: selectedYears,
              });
            },
          });
        }
        selectedTagCodes.forEach(tagCode => {
          const tag = findTagByCode(tagCode);
          filterItems.push({
            key: `paper_tag:${tagCode}`,
            label: getLocalizedLabel(tag) || tagCode,
            title: tagCode,
            className: getPaperTagChipClassName(tag),
            onRemove: () => removeAppliedSelection("paper_tag", tagCode),
          });
        });
        selectedCcfCategories.forEach(value => {
          const item = findSearchFilterOption("ccf", value);
          filterItems.push({
            key: `ccf:${value}`,
            label: item?.label || `CCF-${value}`,
            title: item?.label || `CCF-${value}`,
            className: ["tag-chip", value === "A" ? "tag-chip-ccf-a" : value === "B" ? "tag-chip-ccf-b" : value === "C" ? "tag-chip-ccf-c" : "tag-chip-ccf-none"].join(" "),
            onRemove: () => removeAppliedSelection("ccf", value),
          });
        });
        selectedVenueFilters.forEach(value => {
          const item = findSearchFilterOption("venue", value);
          filterItems.push({
            key: `venue:${value}`,
            label: item?.label || value,
            title: item?.title || item?.full_label || value,
            className: "tag-chip tag-chip-venue",
            tooltip: true,
            onRemove: () => removeAppliedSelection("venue", value),
          });
        });
        selectedYears.forEach(value => {
          const item = findSearchFilterOption("year", value);
          filterItems.push({
            key: `year:${value}`,
            label: item?.label || value,
            title: item?.label || value,
            className: "tag-chip tag-chip-year",
            onRemove: () => removeAppliedSelection("year", value),
          });
        });
        return {
          searchItems,
          filterItems,
        };
      }

      /**
       * 渲染论文列表（瀑布流或列表视图）
       */
      function renderPapers(papers) {
        if (viewMode === 'masonry') {
          const columns = getMasonryColumns(papers, columnCount);
          return (
            <div style={{ display: 'flex', gap: '20px' }}>
              {columns.map((column, colIndex) => (
                <div key={colIndex} style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '20px' }}>
                  {column.map(paper => (
                    <PaperCard key={paper.id} paper={paper} goToPaper={goToPaper} />
                  ))}
                </div>
              ))}
            </div>
          );
        } else {
          return (
            <div className={`paper-grid ${viewMode}`}>
              {papers.map(paper => (
                <PaperCard key={paper.id} paper={paper} goToPaper={goToPaper} />
              ))}
            </div>
          );
        }
      }

      /**
       * 论文卡片组件
       */
      function PaperCard({ paper, goToPaper }) {
        const meta = normalizePaperMeta(paper);
        const metaTagItems = buildMetaTagItems(meta, { compact: true });
        return (
          <div
            className="paper-card"
            onClick={() => goToPaper(paper.id)}
          >
            <div className="paper-title">{paper.title || "未命名论文"}</div>
            <div className="paper-meta-row">
              <div className="paper-time">{formatDate(paper.created_at)}</div>
              {meta.citation_count !== null && meta.citation_count !== undefined && (
                <Tooltip
                  title={
                    <div>
                      <div>信息来源于 Semantic Scholar</div>
                      <div>{`同步时间：${meta.semantic_updated_at ? formatDate(meta.semantic_updated_at) : "未知"}`}</div>
                    </div>
                  }
                >
                  <div className="paper-citation-count">{`引用量：${meta.citation_count}`}</div>
                </Tooltip>
              )}
            </div>
            <div
              className="paper-summary"
              dangerouslySetInnerHTML={{
                __html: paper.summary
                  ? MathUtils.renderMarkdownWithMath(paper.summary)
                  : "暂无摘要"
              }}
            />
            {(paper.pdf_url || metaTagItems.length > 0 || (paper.tags && paper.tags.length > 0)) && (
              <div className="paper-footer">
                <div className="paper-tag-row">
                  {metaTagItems.map(item => (
                    item.tooltip ? (
                      <Tooltip key={item.key} title={item.title}>
                        <span
                          className={["tag-chip", item.className, "tag-chip-compact"].filter(Boolean).join(" ")}
                        >
                          {item.label}
                        </span>
                      </Tooltip>
                    ) : (
                      <span
                        key={item.key}
                        className={["tag-chip", item.className, "tag-chip-compact"].filter(Boolean).join(" ")}
                        title={item.title}
                      >
                        {item.label}
                      </span>
                    )
                  ))}
                  {renderTagChips(paper.tags, { compact: true })}
                </div>
                {paper.pdf_url && (
                  <a href={paper.pdf_url} download target="_blank" rel="noopener noreferrer" className="paper-download-link" onClick={(e) => e.stopPropagation()}>
                    <DownloadOutlined />
                    <span>下载 PDF</span>
                  </a>
                )}
              </div>
            )}
            {shouldShowRelevance && paper.relevance !== undefined && (
              <div style={{ marginTop: 10, fontSize: 12, color: '#999' }}>
                相关度: {paper.relevance}
              </div>
            )}
          </div>
        );
      }

      // ===== JSX 渲染 =====
      return (
        <div style={{ minHeight: "100vh" }}>
          <div className="header-box">
            <div className="container">
              <div className="browse-title-row" style={{ alignItems: isMobile ? "center" : "center" }}>
                <div style={{ minWidth: 0, flex: 1 }}>
                  <h2 className="header-title">
                    <span>📚 论文库</span>
                    <span className="header-subtitle">{browseSubtitle}</span>
                  </h2>
                </div>
                <div className="browse-title-actions">
                  {isMobile && !readOnly && (
                    <>
                      <Tooltip title="配置">
                        <Button
                          icon={<SettingOutlined />}
                          onClick={() => setConfigModalVisible(true)}
                        />
                      </Tooltip>
                      <Tooltip title="翻译新论文">
                        <Button
                          type="primary"
                          icon={<PlusOutlined />}
                          onClick={() => { window.location.href = "/chat"; }}
                        >
                          新建翻译
                        </Button>
                      </Tooltip>
                    </>
                  )}
                  {!isMobile && !readOnly && (
                    <>
                      <Tooltip title="瀑布流">
                        <Button
                          className={viewMode === "masonry" ? "ant-btn-primary" : ""}
                          icon={<AppstoreOutlined />}
                          onClick={() => setViewMode("masonry")}
                        />
                      </Tooltip>
                      <Tooltip title="列表">
                        <Button
                          className={viewMode === "list" ? "ant-btn-primary" : ""}
                          icon={<BarsOutlined />}
                          onClick={() => setViewMode("list")}
                        />
                      </Tooltip>
                    </>
                  )}
                  {!isMobile && readOnly && (
                    <>
                      <Tooltip title="瀑布流">
                        <Button
                          className={viewMode === "masonry" ? "ant-btn-primary" : ""}
                          icon={<AppstoreOutlined />}
                          onClick={() => setViewMode("masonry")}
                        />
                      </Tooltip>
                      <Tooltip title="列表">
                        <Button
                          className={viewMode === "list" ? "ant-btn-primary" : ""}
                          icon={<BarsOutlined />}
                          onClick={() => setViewMode("list")}
                        />
                      </Tooltip>
                      <ReadModeBadge />
                    </>
                  )}
                  {isMobile && readOnly && <ReadModeBadge />}
                </div>
              </div>
              <div className="browse-header" style={{ flexDirection: isMobile ? 'column' : 'row', alignItems: isMobile ? 'stretch' : 'center', justifyContent: "space-between" }}>
                {isMobile ? (
                  <>
                    <div style={{ width: "100%", display: "flex", gap: 8, alignItems: "center" }}>
                      <Button icon={<TagsOutlined />} onClick={openTagPicker}>
                        {selectedFilterCount > 0 ? `筛选（${selectedFilterCount}）` : "筛选"}
                      </Button>
                      <Input
                        placeholder="搜索论文标题..."
                        value={searchQuery}
                        onChange={e => {
                          setSearchQuery(e.target.value);
                          setMobileSearchDirty(true);
                        }}
                        onPressEnter={() => handleSearch({ query: searchQuery.trim() })}
                        style={{ flex: 1 }}
                        allowClear
                      />
                    </div>
                  </>
                ) : (
                  <>
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", flex: 1, minWidth: 0 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, width: "100%" }}>
                        <Button icon={<TagsOutlined />} onClick={openTagPicker}>
                          {selectedFilterCount > 0 ? `已选标签 ${selectedFilterCount}` : "按标签搜索"}
                        </Button>
                        <Input.Search
                          placeholder="搜索论文标题..."
                          value={searchQuery}
                          onChange={e => setSearchQuery(e.target.value)}
                          onSearch={handleSearch}
                          style={{ flex: 1, minWidth: 150, maxWidth: 1200 }}
                          allowClear
                          enterButton={!showSearchResults}
                          loading={isSearching}
                          addonAfter={
                            (showSearchResults || selectedFilterCount > 0) ? (
                              <Button onClick={clearSearch} style={{ marginLeft: "1rem" }} >
                                重置条件
                              </Button>
                            ) : null
                          }
                        />
                      </div>
                    </div>
                    <div className="browse-controls" style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", gap: "10px", marginLeft: 16 }}>
                      {!readOnly && (
                        <Tooltip title="配置">
                          <Button
                            icon={<SettingOutlined />}
                            onClick={() => setConfigModalVisible(true)}
                          />
                        </Tooltip>
                      )}
                      {!readOnly && (
                        <Tooltip title="翻译新论文">
                          <Button
                            type="primary"
                            icon={<PlusOutlined />}
                            onClick={() => { window.location.href = "/chat"; }}
                          >
                            新建翻译
                          </Button>
                        </Tooltip>
                      )}
                    </div>
                  </>
                )}

              </div>
            </div>
          </div>

          <div className="container">
            {shouldShowResultSummary && (
              <div id="browse-results-top" className="browse-result-summary">
                <div className="browse-result-summary-title">
                  {`${resultModeLabel} · ${hasKeywordSearch ? totalSearchResultCount : totalCount} 篇`}
                </div>
                {(appliedSelectedItems.searchItems.length > 0 || appliedSelectedItems.filterItems.length > 0) && (
                  <div className="browse-active-filters">
                    {renderRemovableChipItems(appliedSelectedItems.searchItems)}
                    {appliedSelectedItems.searchItems.length > 0 && appliedSelectedItems.filterItems.length > 0 && (
                      <span className="browse-active-filters-divider" aria-hidden="true" />
                    )}
                    {renderRemovableChipItems(appliedSelectedItems.filterItems)}
                  </div>
                )}
                {hasKeywordSearch && (
                  <div className="browse-result-segments">
                    <button
                      type="button"
                      className="browse-result-segment"
                      onClick={() => scrollToBrowseResultSection("browse-results-top")}
                    >
                      {`全部 ${totalSearchResultCount}`}
                    </button>
                    <span className="browse-result-separator">|</span>
                    <button
                      type="button"
                      className="browse-result-segment"
                      onClick={() => scrollToBrowseResultSection("browse-search-exact")}
                    >
                      {`精确 ${exactResultCount}`}
                    </button>
                    <span className="browse-result-separator">|</span>
                    <button
                      type="button"
                      className="browse-result-segment"
                      onClick={() => scrollToBrowseResultSection("browse-search-fuzzy")}
                    >
                      {`模糊 ${fuzzyResultCount}`}
                    </button>
                  </div>
                )}
              </div>
            )}

            {/* Show exact matches section */}
            {showSearchResults && searchResults.exact_matches.length > 0 && (
              <>
                <div id="browse-search-exact" style={{ fontSize: 18, fontWeight: 600, margin: "20px 0 10px", color: "#1677ff", scrollMarginTop: "160px" }}>
                  精确匹配 ({searchResults.exact_matches.length})
                </div>
                {renderPapers(searchResults.exact_matches)}
              </>
            )}

            {/* Show fuzzy matches section */}
            {showSearchResults && searchResults.fuzzy_matches.length > 0 && (
              <>
                <div id="browse-search-fuzzy" style={{ fontSize: 18, fontWeight: 600, margin: "20px 0 10px", color: "#faad14", scrollMarginTop: "160px" }}>
                  模糊匹配 ({searchResults.fuzzy_matches.length})
                </div>
                {renderPapers(searchResults.fuzzy_matches)}
              </>
            )}

            {/* Show searching state */}
            {showSearchResults && searchStatus === "loading" && (
              <div className="empty-state">
                <p>搜索中</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>正在检索论文，请稍候</p>
              </div>
            )}

            {/* Show search error state */}
            {showSearchResults && searchStatus === "error" && (
              <div className="empty-state">
                <p>搜索异常</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>搜索时间较长或请求出现问题，请稍后重试</p>
              </div>
            )}

            {showSearchResults && searchStatus === "success" && searchResults.exact_matches.length === 0 && searchResults.fuzzy_matches.length === 0 && (
              <div className="empty-state">
                <p>暂无匹配论文</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>可以尝试切换标题关键词或其他 tag</p>
              </div>
            )}

            {/* Show all conversations when not searching */}
            {!showSearchResults && conversations.length === 0 ? (
              <div className="empty-state">
                <p>{selectedFilterCount > 0 ? "暂无匹配论文" : "暂无翻译论文"}</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>
                  {selectedFilterCount > 0 ? "可以调整标签筛选条件" : "上传 PDF 文件开始翻译"}
                </p>
              </div>
            ) : null}

            {!showSearchResults && conversations.length > 0 && (
              <>
                {renderPapers(conversations)}

                {hasMore && (
                  <div style={{ textAlign: 'center', margin: '20px 0' }}>
                    <Button onClick={() => loadConversations(true)} loading={loadingMore}>
                      {loadingMore ? '加载中…' : '加载更多'}
                    </Button>
                  </div>
                )}
              </>
            )}
          </div>
          <Modal
            title="Poe API 配置"
            open={configModalVisible}
            onOk={saveConfig}
            onCancel={() => setConfigModalVisible(false)}
            width={500}
          >
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>Poe API Key：</label>
              <Input.Password
                placeholder="请输入 Poe API Key"
                value={poeApiKey}
                onChange={e => setPoeApiKey(e.target.value)}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>标题提取模型：</label>
              <Select
                style={{ width: "100%" }}
                value={activeTitleModel}
                onChange={setTitleModel}
                options={modelOptions}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>翻译模型：</label>
              <Select
                style={{ width: "100%" }}
                value={activePoeModel}
                onChange={setPoeModel}
                options={modelOptions}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <Checkbox
                checked={extractTagsOnUpload}
                onChange={e => setExtractTagsOnUpload(e.target.checked)}
              >
                上传后自动提取论文标签
              </Checkbox>
              <div style={{ fontSize: 12, color: "#7a7a7a", marginTop: 8, lineHeight: 1.6 }}>
                开启后会在获得摘要后额外请求 Poe 进行标签分类，并把 tags 一同返回前端，可能额外消耗少量积分。
              </div>
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>自动翻完范围：</label>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <Checkbox checked={autoTranslateAppendix} onChange={e => setAutoTranslateAppendix(e.target.checked)}>
                  自动翻译附录
                </Checkbox>
              </div>
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>自动翻完熔断次数：</label>
              <InputNumber
                min={1}
                max={50}
                value={autoTranslateBreakerLimit}
                onChange={value => setAutoTranslateBreakerLimit(value || AUTO_TRANSLATE_BREAKER_DEFAULT)}
                style={{ width: 120 }}
              />
              <div style={{ fontSize: 12, color: "#7a7a7a", marginTop: 8, lineHeight: 1.6 }}>
                自动翻完时最多连续请求的轮数，默认 {AUTO_TRANSLATE_BREAKER_DEFAULT} 次，用于避免 bot 异常循环。
              </div>
            </div>
            <div>
              <label style={{ display: "block", marginBottom: 8 }}>分享链接基础路径 (URL Base)：</label>
              <Input
                placeholder="留空则使用当前页面URL，例如: https://a.com"
                value={urlBase}
                onChange={e => setUrlBase(e.target.value)}
              />
              <div style={{ fontSize: 12, color: "#999", marginTop: 5 }}>
                设置后分享链接将使用此基础路径，例如当前页是 /chat/abc，URL Base 为 https://a.com，则分享链接为 https://a.com/chat/abc
              </div>
            </div>
          </Modal>

          <Modal
            title="选择标签"
            open={tagPickerVisible}
            onOk={applyTagSelection}
            onCancel={() => setTagPickerVisible(false)}
            okText="确认"
            width={980}
            bodyStyle={{ paddingTop: 12 }}
          >
              <div className="tag-picker-toolbar">
                <div className="tag-picker-tabs">
                {pickerSections.map(section => (
                  <button
                    key={section.key}
                    type="button"
                    className={`tag-picker-tab ${activeTagCategory === section.key ? "active" : ""}`}
                    onClick={() => setActiveTagCategory(section.key)}
                  >
                    {section.title}
                  </button>
                ))}
              </div>
              <Input
                prefix={<SearchOutlined />}
                placeholder={uiLanguage === "en" ? "Search all tags" : "搜索全部标签"}
                value={tagKeyword}
                onChange={e => setTagKeyword(e.target.value)}
                className="tag-picker-search"
                allowClear
              />
            </div>

            <div className="tag-picker-selected">
              <div className="tag-picker-section-title">
                {uiLanguage === "en"
                  ? `Selected Tags (${draftTagCodes.length + draftCcfCategories.length + draftVenueFilters.length + draftYears.length})`
                  : `已选标签（${draftTagCodes.length + draftCcfCategories.length + draftVenueFilters.length + draftYears.length}）`}
              </div>
              <div className="tag-picker-selected-list">
                {renderRemovableChipItems(buildDraftSelectedItems(), {
                  emptyText: uiLanguage === "en" ? "No tags selected" : "暂无已选标签",

            <div className="tag-picker-groups">
              {filteredTagCategories.map(section => (

                      return (
                        <button

                          className={`tag-picker-chip ${selected ? "selected" : ""}`}

                          title={item.title}

                          <span>{item.label}</span>
                          <span className="tag-picker-chip-count">{item.count || 0}</span>

                    })}

                </div>

            </div>
          </Modal>
        </div>
      );
    }

    // ==========================================
    // 3.3 ChatPage - 论文翻译页面
    // ==========================================
    function ChatPage({ conversationId: initialConversationId }) {
      // ===== 路由与页面状态 =====
      /**
       * 从 URL 读取 conversationId
       */
      function getConversationIdFromUrl() {
        const match = window.location.pathname.match(/\/chat\/(.+)/);
        return match ? match[1] : null;
      }

      function pushConversationToUrl(id) {
        window.history.pushState({}, "", `/chat/${id}`);
      }

      const initialRouteConversationId = initialConversationId || getConversationIdFromUrl();

      // ===== 数据加载函数 =====
      function applyConversationPayload(data) {
        const conversationMessages = Array.isArray(data?.messages) ? data.messages : [];
        const latestTranslationContext = getLatestTranslationContextFromMessages(conversationMessages);
        const resolvedTranslationStatus =
          latestTranslationContext.translationStatus
          || normalizeTranslationStatus(data?.translation_status);
        const resolvedTranslationPlan =
          latestTranslationContext.translationPlan
          || normalizeTranslationPlan(data?.translation_plan);
        const resolvedTranslationGlossary =
          latestTranslationContext.translationGlossary
