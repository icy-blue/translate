<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>论文翻译 - Poe API</title>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <!-- Ant Design -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/antd/4.24.16/antd.min.js"></script>
  <script src="https://unpkg.com/@ant-design/icons@4.7.0/dist/index.umd.js"></script>

  <!-- Markdown -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <!-- KaTeX -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/auto-render.min.js"></script>

  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="/static/style.css" />
</head>

<body>
  <div id="root"></div>

  <!-- Math Utils -->
  <script src="/static/math-utils.js"></script>

  <script type="text/babel">
    // ==========================================
    // 1. 常量与配置
    // ==========================================

    const { useState, useEffect } = React;
    const { Button, Upload, Input, InputNumber, message, Modal, Checkbox, Select, Tag, Drawer, Dropdown, Menu, Tooltip, Image, Radio } = antd;
    const { AppstoreOutlined, BarsOutlined, PlusOutlined, SearchOutlined, FileTextOutlined, ArrowLeftOutlined, SettingOutlined, UploadOutlined, CaretRightOutlined, MessageOutlined, MoreOutlined, ShareAltOutlined, DownloadOutlined, TagsOutlined, EditOutlined } = icons;
    const { TextArea } = Input;

    const BASE_URL = "";
    const TAG_CATEGORY_META = {
      L: { className: "tag-chip-learning" },
      M: { className: "tag-chip-modality" },
      T: { className: "tag-chip-task" },
      S: { className: "tag-chip-system" },
      A: { className: "tag-chip-application" },
      P: { className: "tag-chip-property" },
    };

    // ==========================================
    // 2. 工具函数
    // ==========================================

    /**
     * 格式化日期时间
     */
    function formatDate(dateString) {
      const date = new Date(dateString);
      return date.toLocaleDateString("zh-CN", {
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit"
      });
    }

    /**
     * 瀑布流布局：将项目分配到指定数量的列中
     */
    function getMasonryColumns(items, cols) {
      const columns = Array.from({ length: cols }, () => []);
      items.forEach((item, index) => {
        const colIndex = index % cols;
        columns[colIndex].push(item);
      });
      return columns;
    }

    function renderTagChips(tags, options = {}) {
      const { emptyText = null, compact = false } = options;
      if (!Array.isArray(tags) || tags.length === 0) {
        return emptyText ? <span className="tag-empty-text">{emptyText}</span> : null;
      }

      return tags.map(tag => {
        const meta = TAG_CATEGORY_META[tag.category_code] || {};
        const chipClassName = ["tag-chip", meta.className, compact ? "tag-chip-compact" : ""].filter(Boolean).join(" ");
        return (
          <span
            key={tag.id || `${tag.tag_code}-${tag.tag_label}`}
            className={chipClassName}
            title={tag.tag_label_en ? `${tag.tag_path || tag.tag_label} / ${tag.tag_path_en || tag.tag_label_en}` : (tag.tag_path || tag.tag_label)}
          >
            {tag.tag_label}
          </span>
        );
      });
    }

    function normalizePaperMeta(data = {}) {
      return {
        venue_abbr: data.venue_abbr || "",
        ccf_category: data.ccf_category || "None",
        ccf_type: data.ccf_type || "None",
        citation_count: data.citation_count ?? null,
        venue: data.venue || null,
        year: data.year ?? null,
        semantic_updated_at: data.semantic_updated_at || null,
      };
    }

    function truncateLabel(text, maxLength = 18) {
      if (!text || text.length <= maxLength) {
        return text;
      }
      return `${text.slice(0, maxLength)}...`;
    }

    function buildMetaTagItems(meta = {}, options = {}) {
      const { compact = false } = options;
      const items = [];
      const ccfCategory = meta.ccf_category || "None";
      const ccfLabel = ccfCategory === "None" ? "CCF-None" : `CCF-${ccfCategory}`;
      const ccfClassName = ccfCategory === "A"
        ? "tag-chip-ccf-a"
        : ccfCategory === "B"
          ? "tag-chip-ccf-b"
          : ccfCategory === "C"
            ? "tag-chip-ccf-c"
            : "tag-chip-ccf-none";

      items.push({
        key: `ccf-${ccfCategory}`,
        label: ccfLabel,
        title: ccfLabel,
        className: ccfClassName,
        tooltip: false,
      });

      const venueLabel = meta.venue_abbr || meta.venue;
      if (venueLabel) {
        items.push({
          key: `venue-${venueLabel}`,
          label: truncateLabel(venueLabel, compact ? 14 : 20),
          title: meta.venue || venueLabel,
          className: "tag-chip-venue",
          tooltip: true,
        });
      }

      if (meta.year) {
        items.push({
          key: `year-${meta.year}`,
          label: String(meta.year),
          title: String(meta.year),
          className: "tag-chip-year",
          tooltip: false,
        });
      }

      return items;
    }

    function renderMetaTagChips(meta, options = {}) {
      const { compact = false } = options;
      return buildMetaTagItems(meta, { compact }).map(item => (
        item.tooltip ? (
          <Tooltip key={item.key} title={item.title}>
            <span
              className={["tag-chip", item.className, compact ? "tag-chip-compact" : ""].filter(Boolean).join(" ")}
            >
              {item.label}
            </span>
          </Tooltip>
        ) : (
          <span
            key={item.key}
            className={["tag-chip", item.className, compact ? "tag-chip-compact" : ""].filter(Boolean).join(" ")}
            title={item.title}
          >
            {item.label}
          </span>
        )
      ));
    }

    function renderSelectedTagPills(tagCodes, options = {}) {
      const { findTagByCode, getLocalizedLabel, onRemove, emptyText } = options;
      if (!Array.isArray(tagCodes) || tagCodes.length === 0) {
        return <span className="tag-empty-text">{emptyText || "暂无已选标签"}</span>;
      }

      return tagCodes.map(tagCode => {
        const tag = findTagByCode(tagCode);
        return (
          <button
            key={tagCode}
            type="button"
            className="tag-picker-selected-pill"
            onClick={() => onRemove && onRemove(tagCode)}
          >
            <span className="tag-picker-selected-pill-text">{getLocalizedLabel(tag)}</span>
            <span className="tag-picker-selected-pill-remove">x</span>
          </button>
        );
      });
    }

    const READ_MODE_TOOLTIP = "当前为阅读模式。如需切换为编辑模式，请先修改后端 .env 中的 READ_ONLY 配置，并重启后端后生效。";
    const ASSET_DIRECTION_TOOLTIP = "解析有错误？";
    const ASSET_DIRECTION_MODAL_TITLE = "解析有错误？试试调整解析配置";

    function ReadModeBadge() {
      return (
        <Tooltip title={READ_MODE_TOOLTIP}>
          <Tag className="mode-badge mode-badge-read">阅读模式</Tag>
        </Tooltip>
      );
    }

    function getBrowserLanguage() {
      const lang = (navigator.language || "zh-CN").toLowerCase();
      return lang.startsWith("zh") ? "zh" : "en";
    }

    const BROWSE_SEARCH_PARAM_KEYS = ["q", "tag_code", "ccf_category", "venue_filter", "year"];

    function normalizeBrowseSearchState(state = {}) {
      const filters = state.filters || {};
      const normalizeList = (value) => Array.from(new Set(
        (Array.isArray(value) ? value : [])
          .map(item => String(item || "").trim())
          .filter(Boolean)
      ));

      return {
        query: String(state.query || "").trim(),
        filters: {
          tagCodes: normalizeList(filters.tagCodes),
          ccfCategories: normalizeList(filters.ccfCategories),
          venues: normalizeList(filters.venues),
          years: normalizeList(filters.years),
        },
      };
    }

    function getBrowseSearchStateFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return normalizeBrowseSearchState({
        query: params.get("q") || "",
        filters: {
          tagCodes: params.getAll("tag_code"),
          ccfCategories: params.getAll("ccf_category"),
          venues: params.getAll("venue_filter"),
          years: params.getAll("year"),
        },
      });
    }

    function hasBrowseSearchState(state = {}) {
      const normalized = normalizeBrowseSearchState(state);
      const filters = normalized.filters;
      return Boolean(
        normalized.query ||
        filters.tagCodes.length ||
        filters.ccfCategories.length ||
        filters.venues.length ||
        filters.years.length
      );
    }

    function syncBrowseSearchStateToUrl(state = {}, options = {}) {
      const normalized = normalizeBrowseSearchState(state);
      const url = new URL(window.location.href);

      BROWSE_SEARCH_PARAM_KEYS.forEach(key => url.searchParams.delete(key));

      if (normalized.query) {
        url.searchParams.set("q", normalized.query);
      }
      normalized.filters.tagCodes.forEach(value => url.searchParams.append("tag_code", value));
      normalized.filters.ccfCategories.forEach(value => url.searchParams.append("ccf_category", value));
      normalized.filters.venues.forEach(value => url.searchParams.append("venue_filter", value));
      normalized.filters.years.forEach(value => url.searchParams.append("year", value));

      const nextUrl = `${url.pathname}${url.search}${url.hash}`;
      const currentUrl = `${window.location.pathname}${window.location.search}${window.location.hash}`;
      if (nextUrl !== currentUrl) {
        const method = options.replace ? "replaceState" : "pushState";
        window.history[method]({}, "", nextUrl);
      }
    }

    // ==========================================
    // 3. 组件定义
    // ==========================================

    // ==========================================
    // 3.1 App - 主应用组件，处理路由
    // ==========================================
    function App() {
      /**
       * 检测当前页面是浏览页还是聊天页
       */
      function getCurrentPage() {
        // match /chat or /chat/{id}
        const match = window.location.pathname.match(/^\/chat(?:\/(.+))?$/);
        if (match) {
          return { page: "chat", conversationId: match[1] || null };
        }
        return { page: "browse" };
      }

      const currentPageInfo = getCurrentPage();

      // 如果是浏览页，直接返回BrowsePage组件
      if (currentPageInfo.page === "browse") {
        return <BrowsePage />;
      }

      // 否则显示聊天页面（ChatPage）
      return <ChatPage conversationId={currentPageInfo.conversationId} />;
    }

    // ==========================================
    // 3.2 BrowsePage - 论文库浏览页面
    // ==========================================
    function BrowsePage() {
      const initialBrowseState = getBrowseSearchStateFromUrl();
      const EMPTY_SEARCH_FILTERS = {
        tagCodes: [],
        ccfCategories: [],
        venues: [],
        years: [],
      };

      // ===== 常量 =====
      const PAGE_SIZE = 10; // 与后端默认保持一致

      // ===== 响应式状态 =====
      const [isMobile, setIsMobile] = useState(window.innerWidth <= 576);

      // ===== 数据状态 =====
      const [conversations, setConversations] = useState([]);
      const [totalCount, setTotalCount] = useState(0);

      // ===== UI 状态 =====
      const [loading, setLoading] = useState(false);
      const [viewMode, setViewMode] = useState("masonry"); // 'masonry' or 'list'
      const [readOnly, setReadOnly] = useState(false);
      const [offset, setOffset] = useState(0);
      const [hasMore, setHasMore] = useState(false);
      const [loadingMore, setLoadingMore] = useState(false);
      const [columnCount, setColumnCount] = useState(3);

      // ===== 搜索状态 =====
      const [searchQuery, setSearchQuery] = useState(initialBrowseState.query);
      const [searchResults, setSearchResults] = useState({ exact_matches: [], fuzzy_matches: [] });
      const [isSearching, setIsSearching] = useState(false);
      const [searchStatus, setSearchStatus] = useState("idle"); // 'idle' | 'loading' | 'success' | 'error'
      const [showSearchResults, setShowSearchResults] = useState(false);
      const [searchBarExpanded, setSearchBarExpanded] = useState(window.innerWidth <= 576 && hasBrowseSearchState(initialBrowseState));
      const [tagLibrary, setTagLibrary] = useState([]);
      const [searchFilterLibrary, setSearchFilterLibrary] = useState({ ccf_categories: [], venues: [], years: [] });
      const [selectedTagCodes, setSelectedTagCodes] = useState(initialBrowseState.filters.tagCodes);
      const [selectedCcfCategories, setSelectedCcfCategories] = useState(initialBrowseState.filters.ccfCategories);
      const [selectedVenueFilters, setSelectedVenueFilters] = useState(initialBrowseState.filters.venues);
      const [selectedYears, setSelectedYears] = useState(initialBrowseState.filters.years);
      const [tagPickerVisible, setTagPickerVisible] = useState(false);
      const [draftTagCodes, setDraftTagCodes] = useState(initialBrowseState.filters.tagCodes);
      const [draftCcfCategories, setDraftCcfCategories] = useState(initialBrowseState.filters.ccfCategories);
      const [draftVenueFilters, setDraftVenueFilters] = useState(initialBrowseState.filters.venues);
      const [draftYears, setDraftYears] = useState(initialBrowseState.filters.years);
      const [activeTagCategory, setActiveTagCategory] = useState("L");
      const [tagKeyword, setTagKeyword] = useState("");
      const [uiLanguage, setUiLanguage] = useState(getBrowserLanguage());

      // ===== 响应式布局 =====
      useEffect(() => {
        setUiLanguage(getBrowserLanguage());

        function updateColumnCount() {
          const width = window.innerWidth;
          setIsMobile(width <= 576);
          if (width <= 768) {
            setColumnCount(1);
          } else if (width <= 1200) {
            setColumnCount(2);
          } else {
            setColumnCount(3);
          }
        }

        updateColumnCount();
        window.addEventListener('resize', updateColumnCount);
        return () => window.removeEventListener('resize', updateColumnCount);
      }, []);

      // ===== 初始化 =====
      function resolveSearchFilters(options = {}) {
        return {
          tagCodes: options.tagCodes !== undefined ? options.tagCodes : selectedTagCodes,
          ccfCategories: options.ccfCategories !== undefined ? options.ccfCategories : selectedCcfCategories,
          venues: options.venues !== undefined ? options.venues : selectedVenueFilters,
          years: options.years !== undefined ? options.years : selectedYears,
        };
      }

      function getSelectedFilterCount(filters = resolveSearchFilters()) {
        return filters.tagCodes.length + filters.ccfCategories.length + filters.venues.length + filters.years.length;
      }

      function applyBrowseSearchState(state = {}, options = {}) {
        const normalized = normalizeBrowseSearchState(state);
        const filters = normalized.filters;

        setSearchQuery(normalized.query);
        setSelectedTagCodes(filters.tagCodes);
        setSelectedCcfCategories(filters.ccfCategories);
        setSelectedVenueFilters(filters.venues);
        setSelectedYears(filters.years);
        setDraftTagCodes(filters.tagCodes);
        setDraftCcfCategories(filters.ccfCategories);
        setDraftVenueFilters(filters.venues);
        setDraftYears(filters.years);
        setTagKeyword("");
        setSearchBarExpanded(window.innerWidth <= 576 && hasBrowseSearchState(normalized));
        setOffset(0);

        if (normalized.query) {
          handleSearch({
            query: normalized.query,
            tagCodes: filters.tagCodes,
            ccfCategories: filters.ccfCategories,
            venues: filters.venues,
            years: filters.years,
            syncUrl: options.syncUrl,
            replaceUrl: options.replaceUrl,
          });
          return;
        }

        setSearchResults({ exact_matches: [], fuzzy_matches: [] });
        setShowSearchResults(false);
        setSearchStatus("idle");

        if (getSelectedFilterCount(filters) > 0) {
          if (options.syncUrl !== false) {
            syncBrowseSearchStateToUrl({
              query: "",
              filters,
            }, { replace: options.replaceUrl });
          }
          loadConversations(false, filters);
          return;
        }

        if (options.syncUrl !== false) {
          syncBrowseSearchStateToUrl({
            query: "",
            filters: EMPTY_SEARCH_FILTERS,
          }, { replace: options.replaceUrl });
        }
        loadConversations(false, EMPTY_SEARCH_FILTERS);
      }

      // ===== 初始化 =====
      useEffect(() => {
        applyBrowseSearchState(initialBrowseState, { syncUrl: false });
        loadConfig();
        loadTagLibrary();
        loadSearchFilterLibrary();
      }, []);

      useEffect(() => {
        function handlePopState() {
          applyBrowseSearchState(getBrowseSearchStateFromUrl(), { syncUrl: false });
        }

        window.addEventListener("popstate", handlePopState);
        return () => window.removeEventListener("popstate", handlePopState);
      }, []);

      // ===== 数据加载函数 =====

      function appendSearchFilterParams(params, filters) {
        filters.tagCodes.forEach(tagCode => params.append("tag_code", tagCode));
        filters.ccfCategories.forEach(value => params.append("ccf_category", value));
        filters.venues.forEach(value => params.append("venue_filter", value));
        filters.years.forEach(value => params.append("year", value));
      }

      async function loadConversations(append = false, options = {}) {
        const filters = resolveSearchFilters(options);
        if (!append) {
          setLoading(true);
        } else {
          setLoadingMore(true);
        }

        try {
          const params = new URLSearchParams();
          params.append("limit", PAGE_SIZE);
          params.append("offset", append ? offset : 0);
          appendSearchFilterParams(params, filters);
          const res = await fetch(`${BASE_URL}/conversations?${params.toString()}`);

          if (!res.ok) {
            message.error("加载论文列表失败");
            return;
          }

          const data = await res.json();
          const items = data.conversations || [];
          // update total from server
          if (typeof data.total === 'number') {
            setTotalCount(data.total);
          }

          if (append) {
            setConversations(prev => [...prev, ...items]);
          } else {
            setConversations(items);
          }

          setHasMore(!!data.has_more);
          setOffset(prev => (append ? prev + items.length : items.length));
        } catch (err) {
          message.error("网络错误");
        } finally {
          setLoading(false);
          setLoadingMore(false);
        }
      }

      async function loadConfig() {
        try {
          const res = await fetch(`${BASE_URL}/config`);
          if (res.ok) {
            const data = await res.json();
            setReadOnly(data.read_only || false);
          }
        } catch (err) {
          console.error("Failed to load config:", err);
        }
      }

      async function loadTagLibrary() {
        try {
          const res = await fetch(`${BASE_URL}/tags/library`);
          if (!res.ok) {
            return;
          }
          const data = await res.json();
          const categories = Array.isArray(data.categories) ? data.categories : [];
          setTagLibrary(categories);
          if (categories.length > 0) {
            setActiveTagCategory(prev => prev || categories[0].category_code);
          }
        } catch (err) {
          console.error("Failed to load tag library:", err);
        }
      }

      async function loadSearchFilterLibrary() {
        try {
          const res = await fetch(`${BASE_URL}/search/filters`);
          if (!res.ok) {
            return;
          }
          const data = await res.json();
          setSearchFilterLibrary({
            ccf_categories: Array.isArray(data.ccf_categories) ? data.ccf_categories : [],
            venues: Array.isArray(data.venues) ? data.venues : [],
            years: Array.isArray(data.years) ? data.years : [],
          });
        } catch (err) {
          console.error("Failed to load search filter library:", err);
        }
      }

      // ===== 搜索功能 =====
      async function handleSearch(options = {}) {
        const queryValue = (options.query !== undefined ? options.query : searchQuery).trim();
        const filters = resolveSearchFilters(options);
        const selectedFilterCount = getSelectedFilterCount(filters);
        const shouldSyncUrl = options.syncUrl !== false;

        setSearchQuery(queryValue);

        if (shouldSyncUrl) {
          syncBrowseSearchStateToUrl({
            query: queryValue,
            filters,
          }, { replace: options.replaceUrl });
        }

        if (!queryValue && selectedFilterCount === 0) {
          setSearchResults({ exact_matches: [], fuzzy_matches: [] });
          setShowSearchResults(false);
          setSearchStatus("idle");
          return;
        }

        if (!queryValue && selectedFilterCount > 0) {
          setSearchResults({ exact_matches: [], fuzzy_matches: [] });
          setShowSearchResults(false);
          setSearchStatus("idle");
          setOffset(0);
          await loadConversations(false, filters);
          return;
        }

        const controller = new AbortController();
        const timeoutId = window.setTimeout(() => controller.abort(), 10000);

        setIsSearching(true);
        setShowSearchResults(true);
        setSearchStatus("loading");
        setSearchResults({ exact_matches: [], fuzzy_matches: [] });

        try {
          const params = new URLSearchParams();
          if (queryValue) {
            params.append("q", queryValue);
          }
          appendSearchFilterParams(params, filters);
          const res = await fetch(`${BASE_URL}/search?${params.toString()}`, {
            signal: controller.signal,
          });

          if (!res.ok) {
            message.error("搜索失败");
            setSearchStatus("error");
            return;
          }

          const data = await res.json();
          setSearchResults(data);
          setSearchStatus("success");
        } catch (err) {
          const isAbortError = err && err.name === "AbortError";
          message.error(isAbortError ? "搜索超时" : "网络错误");
          setSearchStatus("error");
        } finally {
          window.clearTimeout(timeoutId);
          setIsSearching(false);
        }
      }

      function clearSearch() {
        setSearchQuery("");
        setSelectedTagCodes([]);
        setSelectedCcfCategories([]);
        setSelectedVenueFilters([]);
        setSelectedYears([]);
        setDraftTagCodes([]);
        setDraftCcfCategories([]);
        setDraftVenueFilters([]);
        setDraftYears([]);
        setTagKeyword("");
        setSearchResults({ exact_matches: [], fuzzy_matches: [] });
        setShowSearchResults(false);
        setSearchStatus("idle");
        setOffset(0);
        syncBrowseSearchStateToUrl({ query: "", filters: EMPTY_SEARCH_FILTERS });
        loadConversations(false, EMPTY_SEARCH_FILTERS);
      }

      function getLocalizedLabel(item) {
        if (!item) {
          return "";
        }
        if (uiLanguage === "en") {
          return item.tag_label_en || item.category_label_en || item.tag_label || item.category_label || "";
        }
        return item.tag_label || item.category_label || item.tag_label_en || item.category_label_en || "";
      }

      function findTagByCode(tagCode) {
        for (const category of tagLibrary) {
          const found = (category.tags || []).find(tag => tag.tag_code === tagCode);
          if (found) {
            return found;
          }
        }
        return null;
      }

      function findSearchFilterOption(type, value) {
        if (type === "ccf") {
          return (searchFilterLibrary.ccf_categories || []).find(item => item.value === value) || null;
        }
        if (type === "venue") {
          return (searchFilterLibrary.venues || []).find(item => item.value === value) || null;
        }
        if (type === "year") {
          return (searchFilterLibrary.years || []).find(item => item.value === value) || null;
        }
        return null;
      }

      function openTagPicker() {
        setDraftTagCodes([...selectedTagCodes]);
        setDraftCcfCategories([...selectedCcfCategories]);
        setDraftVenueFilters([...selectedVenueFilters]);
        setDraftYears([...selectedYears]);
        setTagKeyword("");
        setTagPickerVisible(true);
      }

      function toggleDraftSelection(type, value) {
        const updateList = (setter) => setter(prev => (
          prev.includes(value)
            ? prev.filter(item => item !== value)
            : [...prev, value]
        ));

        if (type === "paper_tag") {
          updateList(setDraftTagCodes);
        } else if (type === "ccf") {
          updateList(setDraftCcfCategories);
        } else if (type === "venue") {
          updateList(setDraftVenueFilters);
        } else if (type === "year") {
          updateList(setDraftYears);
        }
      }

      function applyTagSelection() {
        const nextTagCodes = [...draftTagCodes];
        const nextCcfCategories = [...draftCcfCategories];
        const nextVenueFilters = [...draftVenueFilters];
        const nextYears = [...draftYears];
        setSelectedTagCodes(nextTagCodes);
        setSelectedCcfCategories(nextCcfCategories);
        setSelectedVenueFilters(nextVenueFilters);
        setSelectedYears(nextYears);
        setTagPickerVisible(false);
        handleSearch({
          query: searchQuery.trim(),
          tagCodes: nextTagCodes,
          ccfCategories: nextCcfCategories,
          venues: nextVenueFilters,
          years: nextYears,
        });
      }

      // ===== 导航功能 =====
      function goToPaper(conversationId) {
        window.history.pushState({}, "", `/chat/${conversationId}`);
        window.location.reload();
      }

      // ===== 渲染功能 =====
      const pickerSections = [
        ...tagLibrary.map(category => ({
          key: category.category_code,
          title: getLocalizedLabel(category),
          type: "paper_tag",
          items: (category.tags || []).map(tag => ({
            value: tag.tag_code,
            label: getLocalizedLabel(tag),
            count: tag.usage_count || 0,
            title: tag.tag_code,
          })),
        })),
        {
          key: "CCF",
          title: "CCF",
          type: "ccf",
          items: (searchFilterLibrary.ccf_categories || []).map(item => ({
            value: item.value,
            label: item.label,
            count: item.count || 0,
            title: item.label,
          })),
        },
        {
          key: "VENUE",
          title: "会议/期刊名",
          type: "venue",
          items: (searchFilterLibrary.venues || []).map(item => ({
            value: item.value,
            label: item.label,
            count: item.count || 0,
            title: item.full_label || item.label,
          })),
        },
        {
          key: "YEAR",
          title: "年份",
          type: "year",
          items: (searchFilterLibrary.years || []).map(item => ({
            value: item.value,
            label: item.label,
            count: item.count || 0,
            title: item.label,
          })),
        },
      ];

      const filteredTagCategories = tagKeyword.trim()
        ? pickerSections
            .map(section => ({
              ...section,
              items: (section.items || []).filter(item => {
                const searchText = `${item.label} ${item.value} ${item.title || ""}`.toLowerCase();
                return searchText.includes(tagKeyword.trim().toLowerCase());
              }),
            }))
            .filter(section => section.items.length > 0)
        : pickerSections.filter(section => section.key === activeTagCategory);

      const selectedFilterCount = getSelectedFilterCount();

      useEffect(() => {
        if (!pickerSections.some(section => section.key === activeTagCategory) && pickerSections.length > 0) {
          setActiveTagCategory(pickerSections[0].key);
        }
      }, [tagLibrary, searchFilterLibrary, activeTagCategory]);

      function buildDraftSelectedItems() {
        const items = [];
        draftTagCodes.forEach(tagCode => {
          const tag = findTagByCode(tagCode);
          items.push({
            key: `paper_tag:${tagCode}`,
            label: getLocalizedLabel(tag) || tagCode,
            title: tagCode,
            onRemove: () => toggleDraftSelection("paper_tag", tagCode),
          });
        });
        draftCcfCategories.forEach(value => {
          const item = findSearchFilterOption("ccf", value);
          items.push({
            key: `ccf:${value}`,
            label: item?.label || `CCF-${value}`,
            title: item?.label || `CCF-${value}`,
            onRemove: () => toggleDraftSelection("ccf", value),
          });
        });
        draftVenueFilters.forEach(value => {
          const item = findSearchFilterOption("venue", value);
          items.push({
            key: `venue:${value}`,
            label: item?.label || value,
            title: item?.title || item?.full_label || value,
            onRemove: () => toggleDraftSelection("venue", value),
          });
        });
        draftYears.forEach(value => {
          const item = findSearchFilterOption("year", value);
          items.push({
            key: `year:${value}`,
            label: item?.label || value,
            title: item?.label || value,
            onRemove: () => toggleDraftSelection("year", value),
          });
        });
        return items;
      }

      /**
       * 渲染论文列表（瀑布流或列表视图）
       */
      function renderPapers(papers) {
        if (viewMode === 'masonry') {
          const columns = getMasonryColumns(papers, columnCount);
          return (
            <div style={{ display: 'flex', gap: '20px' }}>
              {columns.map((column, colIndex) => (
                <div key={colIndex} style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: '20px' }}>
                  {column.map(paper => (
                    <PaperCard key={paper.id} paper={paper} goToPaper={goToPaper} />
                  ))}
                </div>
              ))}
            </div>
          );
        } else {
          return (
            <div className={`paper-grid ${viewMode}`}>
              {papers.map(paper => (
                <PaperCard key={paper.id} paper={paper} goToPaper={goToPaper} />
              ))}
            </div>
          );
        }
      }

      /**
       * 论文卡片组件
       */
      function PaperCard({ paper, goToPaper }) {
        const meta = normalizePaperMeta(paper);
        const metaTagItems = buildMetaTagItems(meta, { compact: true });
        return (
          <div
            className="paper-card"
            onClick={() => goToPaper(paper.id)}
          >
            <div className="paper-title">{paper.title || "未命名论文"}</div>
            <div className="paper-meta-row">
              <div className="paper-time">{formatDate(paper.created_at)}</div>
              {meta.citation_count !== null && meta.citation_count !== undefined && (
                <Tooltip
                  title={
                    <div>
                      <div>信息来源于Semantic Scholar</div>
                      <div>{`同步时间：${meta.semantic_updated_at ? formatDate(meta.semantic_updated_at) : "未知"}`}</div>
                    </div>
                  }
                >
                  <div className="paper-citation-count">{`引用量：${meta.citation_count}`}</div>
                </Tooltip>
              )}
            </div>
            <div
              className="paper-summary"
              dangerouslySetInnerHTML={{
                __html: paper.summary
                  ? MathUtils.renderMarkdownWithMath(paper.summary)
                  : "暂无摘要"
              }}
            />
            {(paper.pdf_url || metaTagItems.length > 0 || (paper.tags && paper.tags.length > 0)) && (
              <div className="paper-footer">
                <div className="paper-tag-row">
                  {metaTagItems.map(item => (
                    item.tooltip ? (
                      <Tooltip key={item.key} title={item.title}>
                        <span
                          className={["tag-chip", item.className, "tag-chip-compact"].filter(Boolean).join(" ")}
                        >
                          {item.label}
                        </span>
                      </Tooltip>
                    ) : (
                      <span
                        key={item.key}
                        className={["tag-chip", item.className, "tag-chip-compact"].filter(Boolean).join(" ")}
                        title={item.title}
                      >
                        {item.label}
                      </span>
                    )
                  ))}
                  {renderTagChips(paper.tags, { compact: true })}
                </div>
                {paper.pdf_url && (
                  <a href={paper.pdf_url} download target="_blank" rel="noopener noreferrer" className="paper-download-link" onClick={(e) => e.stopPropagation()}>
                    <DownloadOutlined />
                    <span>下载 PDF</span>
                  </a>
                )}
              </div>
            )}
            {paper.relevance !== undefined && (
              <div style={{ marginTop: 10, fontSize: 12, color: '#999' }}>
                相关度: {paper.relevance}
              </div>
            )}
          </div>
        );
      }

      // ===== JSX 渲染 =====
      return (
        <div style={{ minHeight: "100vh" }}>
          <div className="header-box">
            <div className="container">
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                <h2>📚 论文库</h2>
                {readOnly && <ReadModeBadge />}
              </div>
              <div className="browse-header" style={{ flexDirection: isMobile ? 'column' : 'row', alignItems: isMobile ? 'stretch' : 'center', justifyContent: "space-between" }}>
                {/* 手机端：第一行 - 统计信息和搜索按钮 */}
                {isMobile ? (
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", width: "100%" }}>
                    <span>{showSearchResults ? "搜索结果" : (selectedFilterCount > 0 ? `标签筛选 ${totalCount} 篇论文` : `已翻译 ${totalCount} 篇论文`)}</span>
                    <div style={{ display: "flex", gap: 8 }}>
                      {!readOnly && (
                        <Tooltip title="翻译新论文">
                          <Button
                            type="primary"
                            icon={<PlusOutlined />}
                            onClick={() => { window.location.href = "/chat"; }}
                          />
                        </Tooltip>
                      )}
                      <Tooltip title="搜索">
                        <Button
                          icon={<SearchOutlined />}
                          onClick={() => {setSearchBarExpanded(!searchBarExpanded); clearSearch();}}
                        />
                      </Tooltip>
                    </div>
                  </div>
                ) : (
                  <>
                    {/* 左侧：统计信息 */}
                    <div style={{ display: "flex", alignItems: "center", flex: 1, justifyContent: "flex-start" }}>
                      <span>{showSearchResults ? "搜索结果" : (selectedFilterCount > 0 ? `标签筛选 ${totalCount} 篇论文` : `已翻译 ${totalCount} 篇论文`)}</span>
                    </div>
                    
                    {/* 中间：搜索组件 */}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "center", flex: 2 }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 10, width: "100%" }}>
                        <Button icon={<TagsOutlined />} onClick={openTagPicker}>
                          {selectedFilterCount > 0 ? `已选标签 ${selectedFilterCount}` : "按标签搜索"}
                        </Button>
                        <Input.Search
                          placeholder="搜索论文标题..."
                          value={searchQuery}
                          onChange={e => setSearchQuery(e.target.value)}
                          onSearch={handleSearch}
                          style={{ flex: 1, minWidth: 150, maxWidth: 1200 }}
                          allowClear
                          enterButton={!showSearchResults}
                          loading={isSearching}
                          addonAfter={
                            (showSearchResults || selectedFilterCount > 0) ? (
                              <Button onClick={clearSearch} style={{ marginLeft: "1rem" }} >
                                清除
                              </Button>
                            ) : null
                          }
                        />
                      </div>
                    </div>
                    
                    {/* 右侧：控制按钮 */}
                    <div className="browse-controls" style={{ display: "flex", alignItems: "center", justifyContent: "flex-end", flex: 1, gap: "10px" }}>
                      <Tooltip title="瀑布流">
                        <Button
                          className={viewMode === "masonry" ? "ant-btn-primary" : ""}
                          icon={<AppstoreOutlined />}
                          onClick={() => setViewMode("masonry")}
                        />
                      </Tooltip>
                      <Tooltip title="列表">
                        <Button
                          className={viewMode === "list" ? "ant-btn-primary" : ""}
                          icon={<BarsOutlined />}
                          onClick={() => setViewMode("list")}
                        />
                      </Tooltip>
                      {!readOnly && (
                        <Tooltip title="翻译新论文">
                          <Button
                            type="primary"
                            icon={<PlusOutlined />}
                            onClick={() => { window.location.href = "/chat"; }}
                          />
                        </Tooltip>
                      )}
                    </div>
                  </>
                )}

                {/* 手机端搜索栏 */}
                {isMobile && searchBarExpanded && (
                  <div style={{ width: "100%", display: "flex", gap: 8, flexDirection: "column" }}>
                    <Button icon={<TagsOutlined />} onClick={openTagPicker}>
                      {selectedFilterCount > 0 ? `已选标签 ${selectedFilterCount}` : "按标签搜索"}
                    </Button>
                    <Input.Search
                      placeholder="搜索论文标题..."
                      value={searchQuery}
                      onChange={e => setSearchQuery(e.target.value)}
                      onSearch={handleSearch}
                      style={{ flex: 1 }}
                      allowClear
                      enterButton="搜索"
                      loading={isSearching}
                      autoFocus
                    />
                  </div>
                )}
              </div>
            </div>
          </div>

          <div className="container">
            {/* Show exact matches section */}
            {showSearchResults && searchResults.exact_matches.length > 0 && (
              <>
                <div style={{ fontSize: 18, fontWeight: 600, margin: "20px 0 10px", color: "#1677ff" }}>
                  {searchQuery.trim() ? "🔍 严格匹配" : "🏷️ 标签匹配"} ({searchResults.exact_matches.length})
                </div>
                {renderPapers(searchResults.exact_matches)}
              </>
            )}

            {/* Show fuzzy matches section */}
            {showSearchResults && searchResults.fuzzy_matches.length > 0 && (
              <>
                <div style={{ fontSize: 18, fontWeight: 600, margin: "20px 0 10px", color: "#faad14" }}>
                  🔎 模糊匹配 ({searchResults.fuzzy_matches.length})
                </div>
                {renderPapers(searchResults.fuzzy_matches)}
              </>
            )}

            {/* Show searching state */}
            {showSearchResults && searchStatus === "loading" && (
              <div className="empty-state">
                <p>搜索中</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>正在检索论文，请稍候</p>
              </div>
            )}

            {/* Show search error state */}
            {showSearchResults && searchStatus === "error" && (
              <div className="empty-state">
                <p>搜索异常</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>搜索时间较长或请求出现问题，请稍后重试</p>
              </div>
            )}

            {showSearchResults && searchStatus === "success" && searchResults.exact_matches.length === 0 && searchResults.fuzzy_matches.length === 0 && (
              <div className="empty-state">
                <p>暂无匹配论文</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>可以尝试切换标题关键词或其他 tag</p>
              </div>
            )}

            {/* Show all conversations when not searching */}
            {!showSearchResults && conversations.length === 0 ? (
              <div className="empty-state">
                <p>{selectedFilterCount > 0 ? "暂无匹配论文" : "暂无翻译论文"}</p>
                <p style={{ fontSize: 14, color: "#ccc" }}>
                  {selectedFilterCount > 0 ? "可以调整标签筛选条件" : "上传 PDF 文件开始翻译"}
                </p>
              </div>
            ) : null}

            {!showSearchResults && conversations.length > 0 && (
              <>
                {renderPapers(conversations)}

                {hasMore && (
                  <div style={{ textAlign: 'center', margin: '20px 0' }}>
                    <Button onClick={() => loadConversations(true)} loading={loadingMore}>
                      {loadingMore ? '加载中…' : '加载更多'}
                    </Button>
                  </div>
                )}
              </>
            )}
          </div>
          <Modal
            title="选择标签"
            open={tagPickerVisible}
            onOk={applyTagSelection}
            onCancel={() => setTagPickerVisible(false)}
            okText="确认"
            width={980}
            bodyStyle={{ paddingTop: 12 }}
          >
              <div className="tag-picker-toolbar">
                <div className="tag-picker-tabs">
                {pickerSections.map(section => (
                  <button
                    key={section.key}
                    type="button"
                    className={`tag-picker-tab ${activeTagCategory === section.key ? "active" : ""}`}
                    onClick={() => setActiveTagCategory(section.key)}
                  >
                    {section.title}
                  </button>
                ))}
              </div>
              <Input
                prefix={<SearchOutlined />}
                placeholder={uiLanguage === "en" ? "Search all tags" : "搜索全部标签"}
                value={tagKeyword}
                onChange={e => setTagKeyword(e.target.value)}
                className="tag-picker-search"
                allowClear
              />
            </div>

            <div className="tag-picker-selected">
              <div className="tag-picker-section-title">
                {uiLanguage === "en"
                  ? `Selected Tags (${draftTagCodes.length + draftCcfCategories.length + draftVenueFilters.length + draftYears.length})`
                  : `已选标签（${draftTagCodes.length + draftCcfCategories.length + draftVenueFilters.length + draftYears.length}）`}
              </div>
              <div className="tag-picker-selected-list">
                {buildDraftSelectedItems().length === 0 ? (
                  <span className="tag-empty-text">{uiLanguage === "en" ? "No tags selected" : "暂无已选标签"}</span>
                ) : buildDraftSelectedItems().map(item => (
                  <button
                    key={item.key}
                    type="button"
                    className="tag-picker-selected-pill"
                    onClick={item.onRemove}
                    title={item.title}
                  >
                    <span className="tag-picker-selected-pill-text">{item.label}</span>
                    <span className="tag-picker-selected-pill-remove">x</span>
                  </button>
                ))}
              </div>
            </div>

            <div className="tag-picker-groups">
              {filteredTagCategories.map(section => (
                <div key={section.key} className="tag-picker-group">
                  <div className="tag-picker-group-title">{section.title}</div>
                  <div className="tag-picker-chip-list">
                    {(section.items || []).map(item => {
                      const selected =
                        section.type === "paper_tag" ? draftTagCodes.includes(item.value) :
                        section.type === "ccf" ? draftCcfCategories.includes(item.value) :
                        section.type === "venue" ? draftVenueFilters.includes(item.value) :
                        draftYears.includes(item.value);
                      return (
                        <button
                          key={`${section.type}:${item.value}`}
                          type="button"
                          className={`tag-picker-chip ${selected ? "selected" : ""}`}
                          onClick={() => toggleDraftSelection(section.type, item.value)}
                          title={item.title}
                        >
                          <span>{item.label}</span>
                          <span className="tag-picker-chip-count">{item.count || 0}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </Modal>
        </div>
      );
    }

    // ==========================================
    // 3.3 ChatPage - 论文翻译页面
    // ==========================================
    function ChatPage({ conversationId: initialConversationId }) {
      // ===== 路由与页面状态 =====
      /**
       * 从 URL 读取 conversationId
       */
      function getConversationIdFromUrl() {
        const match = window.location.pathname.match(/\/chat\/(.+)/);
        return match ? match[1] : null;
      }

      function pushConversationToUrl(id) {
        window.history.pushState({}, "", `/chat/${id}`);
      }

      const [conversationId, setConversationId] = useState(getConversationIdFromUrl());

      // ===== 响应式状态 =====
      const [isMobile, setIsMobile] = useState(window.innerWidth <= 576);
      const [drawerVisible, setDrawerVisible] = useState(false);

      // ===== 数据状态 =====
      const [blocks, setBlocks] = useState([]);
      const [paperTitle, setPaperTitle] = useState("");
      const [pdfUrl, setPdfUrl] = useState("");
      const [figures, setFigures] = useState([]);
      const [tables, setTables] = useState([]);
      const [tags, setTags] = useState([]);
      const [paperMeta, setPaperMeta] = useState(normalizePaperMeta());
      const [tagLibrary, setTagLibrary] = useState([]);

      // ===== UI 状态 =====
      const [loading, setLoading] = useState(false);
      const [configModalVisible, setConfigModalVisible] = useState(false);
      const [toc, setToc] = useState([]);
      const [activeHeading, setActiveHeading] = useState(null);
      const [figuresExpanded, setFiguresExpanded] = useState(false);
      const [tablesExpanded, setTablesExpanded] = useState(false);

      // ===== 配置状态 =====
      const [poeApiKey, setPoeApiKey] = useState(localStorage.getItem("poe_api_key") || "");
      const [poeModel, setPoeModel] = useState(localStorage.getItem("poe_model") || "GPT-5.2-Instant");
      const [titleModel, setTitleModel] = useState(localStorage.getItem("title_model") || "GPT-5.2-Instant");
      const [extractTagsOnUpload, setExtractTagsOnUpload] = useState(localStorage.getItem("extract_tags_on_upload") === "true");
      const [readOnly, setReadOnly] = useState(false);
      const [urlBase, setUrlBase] = useState(localStorage.getItem("urlbase") || "");

      // ===== 其他状态 =====
      const [continueCount, setContinueCount] = useState(4);
      const [customModalVisible, setCustomModalVisible] = useState(false);
      const [customMessage, setCustomMessage] = useState("");
      const [saveToRecord, setSaveToRecord] = useState(true);
      const [assetDirectionModalVisible, setAssetDirectionModalVisible] = useState(false);
      const [figureDirectionValue, setFigureDirectionValue] = useState("above");
      const [tableDirectionValue, setTableDirectionValue] = useState("above");
      const [assetDirectionSubmitting, setAssetDirectionSubmitting] = useState(false);
      const [tagPickerVisible, setTagPickerVisible] = useState(false);
      const [draftTagCodes, setDraftTagCodes] = useState([]);
      const [activeTagCategory, setActiveTagCategory] = useState("L");
      const [tagKeyword, setTagKeyword] = useState("");
      const [tagSaving, setTagSaving] = useState(false);
      const [uiLanguage, setUiLanguage] = useState(getBrowserLanguage());

      // ===== 模型选项 =====
      const modelOptions = [
        { label: "GPT-5.4", value: "GPT-5.4" },
        { label: "GPT-5.2", value: "GPT-5.2" },
        { label: "GPT-5.2-Instant", value: "GPT-5.2-Instant" },
        { label: "GPT-5.3-Instant", value: "GPT-5.3-Instant" },
        { label: "Minimax-M2.5", value: "Minimax-M2.5" },
        { label: "Kimi-K2.5-FW", value: "Kimi-K2.5-FW" },
        { label: "Qwen3.5-Flash", value: "Qwen3.5-Flash" },
        { label: "GLM-4.7-Flash", value: "GLM-4.7-Flash" },
        { label: "GPT-5-Chat", value: "GPT-5-Chat"},
        { label: "GPT-5", value: "GPT-5"},
      ];

      // ===== 配置管理 =====
      /**
       * 保存配置到 localStorage
       */
      const saveConfig = () => {
        localStorage.setItem("poe_api_key", poeApiKey);
        localStorage.setItem("poe_model", poeModel);
        localStorage.setItem("title_model", titleModel);
        localStorage.setItem("extract_tags_on_upload", String(extractTagsOnUpload));
        localStorage.setItem("urlbase", urlBase);
        message.success("配置已保存");
        setConfigModalVisible(false);
      };

      /**
       * 复制链接到剪贴板
       */
      const handleShare = () => {
        let shareUrl = window.location.href;
        const urlBase = localStorage.getItem("urlbase");
        
        if (urlBase) {
          const pathname = window.location.pathname;
          const baseUrl = urlBase.replace(/\/$/, "");
          shareUrl = baseUrl + pathname;
        }
        
        navigator.clipboard.writeText(shareUrl).then(() => {
          message.success("链接已复制到剪贴板");
        }).catch(() => {
          message.error("复制失败");
        });
      };

      // ===== 响应式监听 =====
      useEffect(() => {
        function handleResize() {
          setIsMobile(window.innerWidth <= 576);
        }
        window.addEventListener('resize', handleResize);
        return () => window.removeEventListener('resize', handleResize);
      }, []);

      // ===== 初始化与副作用 =====
      /**
       * 更新文档标题
       */
      useEffect(() => {
        if (paperTitle) {
          document.title = `论文翻译 - ${paperTitle}`;
        } else {
          document.title = "论文翻译 - Poe API";
        }
      }, [paperTitle]);

      /**
       * 页面加载时如果 URL 有 id 自动加载历史
       */
      useEffect(() => {
        const id = getConversationIdFromUrl();
        if (id) {
          setConversationId(id);
          loadConversation(id);
        }
        loadConfig();
        loadTagLibrary();
      }, []);

      /**
       * 渲染数学公式和生成目录
       */
      useEffect(() => {
        const contentEl = document.querySelector(".content");

        if (contentEl) {
          renderMathInElement(contentEl, {
            delimiters: [
              { left: "\\[", right: "\\]", display: true },
              { left: "\\(", right: "\\)", display: false }
            ],
            throwOnError: false,
            strict: false
          });
        }

        const headings = document.querySelectorAll(".content .toc-anchor, .content h1, .content h2, .content h3");
        const newToc = [];

        headings.forEach((heading, index) => {
          const id = heading.dataset.tocId || heading.id || ("heading-" + index);
          heading.id = id;
          newToc.push({
            id,
            text: heading.dataset.tocText || heading.innerText,
            level: Number(heading.dataset.tocLevel || heading.tagName.slice(1))
          });
        });

        setToc(newToc);
      }, [blocks, figures.length, tables.length]);

      /**
       * 监听滚动，高亮当前目录项
       */
      useEffect(() => {
        const handleScroll = () => {
          const headings = document.querySelectorAll(".content .toc-anchor, .content h1, .content h2");
          let current = null;
          headings.forEach(heading => {
            if (heading.getBoundingClientRect().top <= 120) {
              current = heading.id;
            }
          });
          setActiveHeading(current);
        };
        window.addEventListener("scroll", handleScroll);
        return () => window.removeEventListener("scroll", handleScroll);
      }, []);

      // ===== 数据加载函数 =====
      async function loadConversation(id) {
        setPaperTitle("");
        setPdfUrl("");
        setFigures([]);
        setTables([]);
        setTags([]);
        setPaperMeta(normalizePaperMeta());
        setFiguresExpanded(false);
        setTablesExpanded(false);
        setLoading(true);
        const res = await fetch(`${BASE_URL}/conversation/${id}`);
        if (!res.ok) {
          message.error("会话不存在");
          setLoading(false);
          return;
        }
        const data = await res.json();
        if (data.title) {
          setPaperTitle(data.title);
        }
        if (data.pdf_url) {
          setPdfUrl(data.pdf_url);
        }
        setFigures(Array.isArray(data.figures) ? data.figures : []);
        setTables(Array.isArray(data.tables) ? data.tables : []);
        setTags(Array.isArray(data.tags) ? data.tags : []);
        setPaperMeta(normalizePaperMeta(data));
        // filter out continuation markers and rely on backend to remove the initial prompt
        const filtered = data.messages.filter(m => !(m.role === "user" && m.content === "继续"));
        setBlocks(
          filtered.map((m, i) => ({
            id: Date.now() + i,
            role: m.role,
            content: m.content
          }))
        );
        setLoading(false);
      }

      async function loadConfig() {
        try {
          const res = await fetch(`${BASE_URL}/config`);
          if (res.ok) {
            const data = await res.json();
            setReadOnly(data.read_only || false);
          }
        } catch (err) {
          console.error("Failed to load config:", err);
        }
      }

      async function loadTagLibrary() {
        try {
          const res = await fetch(`${BASE_URL}/tags/library`);
          if (!res.ok) {
            return;
          }
          const data = await res.json();
          const categories = Array.isArray(data.categories) ? data.categories : [];
          setTagLibrary(categories);
          if (categories.length > 0) {
            setActiveTagCategory(prev => prev || categories[0].category_code);
          }
        } catch (err) {
          console.error("Failed to load tag library:", err);
        }
      }

      function getLocalizedLabel(item) {
        if (!item) {
          return "";
        }
        if (uiLanguage === "en") {
          return item.tag_label_en || item.category_label_en || item.tag_label || item.category_label || "";
        }
        return item.tag_label || item.category_label || item.tag_label_en || item.category_label_en || "";
      }

      function findTagByCode(tagCode) {
        for (const category of tagLibrary) {
          const found = (category.tags || []).find(tag => tag.tag_code === tagCode);
          if (found) {
            return found;
          }
        }
        return null;
      }

      function openTagPicker() {
        setDraftTagCodes((tags || []).map(tag => tag.tag_code));
        setTagKeyword("");
        if (!activeTagCategory && tagLibrary.length > 0) {
          setActiveTagCategory(tagLibrary[0].category_code);
        }
        setTagPickerVisible(true);
      }

      function toggleDraftTag(tagCode) {
        setDraftTagCodes(prev => (
          prev.includes(tagCode)
            ? prev.filter(code => code !== tagCode)
            : [...prev, tagCode]
        ));
      }

      async function applyTagSelection() {
        if (!conversationId) {
          return;
        }

        const hide = message.loading("正在保存标签...", 0);
        setTagSaving(true);
        try {
          const formData = new FormData();
          draftTagCodes.forEach(tagCode => formData.append("tag_code", tagCode));

          const res = await fetch(`${BASE_URL}/conversation/${conversationId}/tags`, {
            method: "POST",
            body: formData,
          });
          const data = await res.json();
          if (!res.ok) {
            message.error(data.detail || "保存标签失败");
            return;
          }
          setTags(Array.isArray(data.tags) ? data.tags : []);
          setTagPickerVisible(false);
          message.success("标签已更新");
        } finally {
          setTagSaving(false);
          hide();
        }
      }

      // ===== 上传功能 =====
      const uploadProps = {
        name: "file",
        accept: ".pdf",
        showUploadList: false,
        customRequest: async ({ file }) => {
          if (!poeApiKey) { message.error("请先配置 API Key"); return; }

          const hide = message.loading("正在上传...", 0);
          const formData = new FormData();
          formData.append("file", file);
          formData.append("api_key", poeApiKey);
          formData.append("poe_model", poeModel);
          formData.append("title_model", titleModel);
          formData.append("extract_tags", extractTagsOnUpload ? "true" : "false");

          setLoading(true);
          setBlocks([]);
          setPdfUrl("");
          setFigures([]);
          setTables([]);
          setTags([]);
          setPaperMeta(normalizePaperMeta());
          setFiguresExpanded(false);
          setTablesExpanded(false);
          // 提取文件名（去掉.pdf后缀）作为临时标题
          const tempTitle = file.name.replace(/\.pdf$/i, "");
          setPaperTitle(tempTitle);

          const res = await fetch(`${BASE_URL}/upload`, {
            method: "POST",
            body: formData
          });

          const data = await res.json();
          setLoading(false);
          hide();

          if (!res.ok) {
            message.error(data.detail || "上传失败");
            return;
          }

          if (data.pdf_url) {
            setPdfUrl(data.pdf_url);
          }
          setFigures(Array.isArray(data.figures) ? data.figures : []);
          setTables(Array.isArray(data.tables) ? data.tables : []);
          setTags(Array.isArray(data.tags) ? data.tags : []);
          setPaperMeta(normalizePaperMeta(data));

          // 如果文件已存在（后端通过指纹检测），后端返回 exists + messages
          if (data.exists) {
            setConversationId(data.conversation_id);
            if (data.title) { setPaperTitle(data.title); }
            pushConversationToUrl(data.conversation_id);

            const msgs = (data.messages || []).filter(m => !(m.role === "user" && m.content === "继续")).map((m, i) => ({ id: Date.now() + i, role: m.role, content: m.content }));
            setBlocks(msgs);
            message.info("文件已存在，跳转到对应会话");
            return;
          }

          // 新上传返回的也改为 messages 数组（包含 user 和 bot）
          setConversationId(data.conversation_id);
          if (data.title) { setPaperTitle(data.title); }
          pushConversationToUrl(data.conversation_id);

          const msgsNew = (data.messages || []).filter(m => !(m.role === "user" && m.content === "继续")).map((m, i) => ({ id: Date.now() + i, role: m.role, content: m.content }));
          setBlocks(msgsNew.length ? msgsNew : [{ id: Date.now(), role: "bot", content: "无回复" }]);
        }
      };

      // ===== 翻译功能 =====
      /**
       * 单次翻译请求
       */
      const doContinue = async () => {
        const formData = new FormData();
        formData.append("api_key", poeApiKey);
        formData.append("poe_model", poeModel);

        const res = await fetch(
          `${BASE_URL}/continue/${conversationId}`,
          { method: "POST", body: formData }
        );

        const data = await res.json();

        if (!res.ok) {
          message.error(data.detail || "请求失败");
          return false;
        }

        setBlocks(prev => [
          ...prev,
          { id: Date.now(), role: "bot", content: data.reply }
        ]);
        return true;
      };

      /**
       * 继续翻译（会根据 continueCount 调用多次）
       */
      const handleContinue = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (!poeApiKey) { message.warning("请先配置 API Key"); return; }

        const hide = message.loading("正在翻译...", 0);
        setLoading(true);
        for (let i = 0; i < continueCount; i++) {
          const ok = await doContinue();
          if (!ok) break;
        }
        setLoading(false);
        hide();
      };

      /**
       * 自定义对话提交
       */
      const handleCustomSubmit = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (!poeApiKey) { message.warning("请先配置 API Key"); return; }
        if (!customMessage.trim()) { message.warning("请输入消息"); return; }

        const hide = message.loading("正在翻译...", 0);
        setLoading(true);
        const formData = new FormData();
        formData.append("api_key", poeApiKey);
        formData.append("message", customMessage);
        formData.append("save_to_record", saveToRecord);
        formData.append("poe_model", poeModel);

        const res = await fetch(`${BASE_URL}/custom_message/${conversationId}`, {
          method: "POST",
          body: formData
        });

        const data = await res.json();
        setLoading(false);
        hide();

        if (!res.ok) {
          message.error(data.detail || "请求失败");
          return;
        }

        // always display user and bot responses locally
        setBlocks(prev => [
          ...prev,
          { id: Date.now(), role: "user", content: customMessage },
          { id: Date.now() + 1, role: "bot", content: data.reply }
        ]);
        if (!saveToRecord) {
          message.info("对话完成（未保存到记录）");
        }

        setCustomModalVisible(false);
        setCustomMessage("");
      };

      const openAssetDirectionModal = () => {
        setAssetDirectionModalVisible(true);
      };

      const handleAssetDirectionSubmit = async () => {
        if (!conversationId) {
          message.warning("请先上传论文");
          return;
        }

        setAssetDirectionSubmitting(true);
        const hide = message.loading("正在重新处理...", 0);

        try {
          const formData = new FormData();
          formData.append("figure_caption_direction", figureDirectionValue);
          formData.append("table_caption_direction", tableDirectionValue);

          const res = await fetch(`${BASE_URL}/conversation/${conversationId}/reprocess_assets`, {
            method: "POST",
            body: formData
          });
          const data = await res.json();

          if (!res.ok) {
            message.error(data.detail || "重新处理失败");
            return;
          }

          await loadConversation(conversationId);
          setAssetDirectionModalVisible(false);
          message.success("重处理完成");
        } finally {
          setAssetDirectionSubmitting(false);
          hide();
        }
      };

      function renderAssetSection({ id, title, items, expanded, setExpanded, type }) {
        if (!items.length) {
          return null;
        }

        return (
          <div className="asset-section">
            <button
              id={id}
              data-toc-id={id}
              data-toc-text={title}
              data-toc-level="1"
              className="asset-section-header toc-anchor"
              onClick={() => setExpanded(!expanded)}
              type="button"
            >
              <div className="asset-section-heading">
                <span>{title} ({items.length})</span>
                {!readOnly && (
                  <Tooltip title={ASSET_DIRECTION_TOOLTIP}>
                    <button
                      type="button"
                      className="asset-section-help"
                      onClick={(event) => {
                        event.stopPropagation();
                        openAssetDirectionModal();
                      }}
                      aria-label={`解析有错误？调整${title}的 caption 位置`}
                    >
                      ?
                    </button>
                  </Tooltip>
                )}
              </div>
              <div className={`asset-section-toggle ${expanded ? "expanded" : ""}`}>
                <CaretRightOutlined />
                <span>{expanded ? "收起" : "展开"}</span>
              </div>
            </button>
            {expanded && (
              <div className="asset-section-body">
                <Image.PreviewGroup>
                  <div className="asset-grid">
                    {items.map(item => {
                      const label = type === "figure"
                        ? (item.figure_label || `Figure ${item.figure_index}`)
                        : (item.table_label || `Table ${item.table_index}`);
                      return (
                        <div
                          key={item.id || `${type}-${item.page_number}-${item.figure_index || item.table_index}`}
                          className="asset-card"
                        >
                          <Image
                            src={item.image_url}
                            alt={item.caption || label}
                            className="asset-image"
                          />
                          <div className="asset-meta">
                            {label + ` · 第 ${item.page_number} 页`}
                          </div>
                          <div className="asset-caption">{item.caption || "未识别到 caption"}</div>
                        </div>
                      );
                    })}
                  </div>
                </Image.PreviewGroup>
              </div>
            )}
          </div>
        );
      }

      const filteredTagCategories = tagKeyword.trim()
        ? tagLibrary
            .map(category => ({
              ...category,
              tags: (category.tags || []).filter(tag => {
                const searchText = `${tag.tag_label} ${tag.tag_label_en} ${tag.tag_code}`.toLowerCase();
                return searchText.includes(tagKeyword.trim().toLowerCase());
              }),
            }))
            .filter(category => category.tags.length > 0)
        : tagLibrary.filter(category => category.category_code === activeTagCategory);

      // ===== JSX 渲染 =====
      return (
        <>
          <div className="header-box">
            <div className="container">
              <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: "5px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "20px", flex: 1, minWidth: 0 }}>
                  <h2 className="header-title">
                    {paperTitle
                      ? isMobile
                        ? paperTitle
                        : <><FileTextOutlined /> {paperTitle}</>
                      : <><FileTextOutlined /> 论文翻译</>}
                  </h2>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: "20px", flexShrink: 0 }}>
                  {readOnly && <ReadModeBadge />}
                </div>
              </div>

              <div style={{ marginTop: 15, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
                  <Button
                    icon={<ArrowLeftOutlined />}
                    style={{ color: "#1677ff", borderColor: "#1677ff" }}
                    onClick={() => window.location.href = "/"}
                  >
                    {!isMobile && "论文库"}
                  </Button>
                
                {/* 桌面端显示完整按钮 */}
                {!readOnly && !isMobile && (
                  <Button
                    icon={<SettingOutlined />}
                    onClick={() => setConfigModalVisible(true)}
                    disabled={loading}
                  >
                    配置
                  </Button>
                )}

                {!readOnly && isMobile && (
                  <Button
                    icon={<SettingOutlined />}
                    onClick={() => setConfigModalVisible(true)}
                    disabled={loading}
                  />
                )}

                {/* upload button only when no conversation in progress */}
                {!readOnly && !conversationId && (
                  <Upload {...uploadProps} disabled={loading}>
                    <Button icon={<UploadOutlined />} type="primary" loading={loading}>
                      {loading ? "处理中..." : "上传 PDF"}
                    </Button>
                  </Upload>
                )}

                {!readOnly && !isMobile && (
                  <>
                    <span>自动继续次数：</span>
                    <InputNumber
                      min={0}
                      value={continueCount}
                      disabled={loading}
                      onChange={v => setContinueCount(v)}
                      style={{ width: 80 }}
                    />

                    <Button
                      icon={<CaretRightOutlined />}
                      onClick={handleContinue}
                      loading={loading}
                      disabled={loading || !conversationId}
                    >
                      {loading ? "翻译中..." : "继续"}
                    </Button>

                    <Button
                      icon={<MessageOutlined />}
                      onClick={() => setCustomModalVisible(true)}
                      disabled={loading || !conversationId}
                    >
                      自定义对话
                    </Button>
                  </>
                )}

                {/* 移动端更多菜单 */}
                {!readOnly && isMobile && conversationId && (
                  <>
                    <Button
                      type="primary"
                      icon={<CaretRightOutlined />}
                      onClick={handleContinue}
                      loading={loading}
                      disabled={loading}
                    >
                      {loading ? "翻译中..." : "继续"}
                    </Button>

                    <Dropdown
                      overlay={(
                        <Menu>
                          <Menu.Item icon={<SettingOutlined />} onClick={() => setConfigModalVisible(true)}>
                            配置
                          </Menu.Item>
                          <Menu.Item>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                              <span>自动继续次数:</span>
                              <InputNumber
                                min={0}
                                value={continueCount}
                                disabled={loading}
                                onChange={v => setContinueCount(v)}
                                style={{ width: 60 }}
                                size="small"
                              />
                            </div>
                          </Menu.Item>
                          <Menu.Item icon={<MessageOutlined />} onClick={() => setCustomModalVisible(true)} disabled={!conversationId}>
                            自定义对话
                          </Menu.Item>
                        </Menu>
                      )}
                      placement="bottomLeft"
                    >
                      <Button icon={<MoreOutlined />} />
                    </Dropdown>
                  </>
                )}

                </div>

                <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                  {pdfUrl && (
                    <Tooltip title={isMobile ? '下载论文' : ''}>
                      <Button
                        icon={<DownloadOutlined />}
                        onClick={() => window.open(pdfUrl, '_blank')}
                      >
                        {!isMobile && '下载论文'}
                      </Button>
                    </Tooltip>
                  )}
                  {conversationId && (
                    <Tooltip title={isMobile ? '分享' : ''}>
                      <Button
                        icon={<ShareAltOutlined />}
                        onClick={handleShare}
                      >
                        {!isMobile && '分享'}
                      </Button>
                    </Tooltip>
                  )}
                </div>
              </div>
            </div>
          </div>

          <div className="container">
            <div className="layout">

              {!isMobile && (
                <div className="sidebar">
                  <h3>目录</h3>
                  {toc.map(item => (
                    <div
                      key={item.id}
                      className={`toc-item level-${item.level} ${activeHeading === item.id ? "active" : ""}`}
                      onClick={() =>
                        document.getElementById(item.id)
                          ?.scrollIntoView({ behavior: "smooth" })
                      }
                    >
                      {item.text}
                    </div>
                  ))}
                </div>
              )}

              <div className="content">
                {paperTitle && <div className="title-block">{paperTitle}</div>}
                {(paperTitle || conversationId) && (
                  <div className="tag-block">
                    <div className="tag-block-header">
                      <div className="tag-block-title">论文标签</div>
                      {!readOnly && conversationId && (
                        <button
                          type="button"
                          className="tag-block-edit"
                          onClick={openTagPicker}
                          aria-label="编辑论文标签"
                          title="编辑论文标签"
                        >
                          <EditOutlined />
                        </button>
                      )}
                    </div>
                    <div className="tag-block-body">
                      {renderMetaTagChips(paperMeta)}
                      {renderTagChips(tags)}
                    </div>
                  </div>
                )}
                {renderAssetSection({
                  id: "figures-section",
                  title: "论文插图",
                  items: figures,
                  expanded: figuresExpanded,
                  setExpanded: setFiguresExpanded,
                  type: "figure"
                })}
                {renderAssetSection({
                  id: "tables-section",
                  title: "论文表格",
                  items: tables,
                  expanded: tablesExpanded,
                  setExpanded: setTablesExpanded,
                  type: "table"
                })}
                {blocks.map(block => (
                  <div
                    key={block.id}
                    className={block.role === "user" ? "user-message-block" : "message-block"}
                    dangerouslySetInnerHTML={{
                      __html: MathUtils.renderMarkdownWithMath(block.content)
                    }}
                  />
                ))}
              </div>

            </div>
          </div>

          {/* 移动端目录浮动按钮 */}
          {isMobile && (
            <Button
              type="primary"
              shape="circle"
              size="large"
              style={{
                position: 'fixed',
                bottom: 20,
                right: 20,
                zIndex: 1000,
                width: 50,
                height: 50
              }}
              onClick={() => setDrawerVisible(true)}
            >
              📑
            </Button>
          )}

          {/* 移动端目录抽屉 */}
          <Drawer
            title="目录"
            placement="left"
            onClose={() => setDrawerVisible(false)}
            open={drawerVisible}
            width={280}
          >
            {toc.map(item => (
              <div
                key={item.id}
                className={`toc-item level-${item.level} ${activeHeading === item.id ? "active" : ""}`}
                style={{
                  padding: '8px 0',
                  borderBottom: '1px solid #f0f0f0'
                }}
                onClick={() => {
                  document.getElementById(item.id)?.scrollIntoView({ behavior: "smooth" });
                  setDrawerVisible(false);
                }}
              >
                {item.text}
              </div>
            ))}
          </Drawer>

          <Modal
            title="自定义对话"
            open={customModalVisible}
            onOk={handleCustomSubmit}
            onCancel={() => setCustomModalVisible(false)}
            confirmLoading={loading}
          >
            <TextArea
              rows={4}
              placeholder="请输入追问内容"
              value={customMessage}
              onChange={e => setCustomMessage(e.target.value)}
            />
            <Checkbox
              checked={saveToRecord}
              onChange={e => setSaveToRecord(e.target.checked)}
              style={{ marginTop: 10 }}
            >
              保存到翻译记录里
            </Checkbox>
          </Modal>

          <Modal
            title="Poe API 配置"
            open={configModalVisible}
            onOk={saveConfig}
            onCancel={() => setConfigModalVisible(false)}
            width={500}
          >
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>Poe API Key：</label>
              <Input.Password
                placeholder="请输入 Poe API Key"
                value={poeApiKey}
                onChange={e => setPoeApiKey(e.target.value)}
              />
            </div>
