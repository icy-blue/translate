        setFigures(Array.isArray(data?.figures) ? data.figures : []);
        setTables(Array.isArray(data?.tables) ? data.tables : []);
        setTags(Array.isArray(data?.tags) ? data.tags : []);
        setPaperMeta(normalizePaperMeta(data));
        setTranslationStatus(resolvedTranslationStatus);
        setTranslationPlan(resolvedTranslationPlan);
        setTranslationGlossary(resolvedTranslationGlossary);
        setBlocks(buildVisibleBlocks(conversationMessages));
        setPaperInfoLoaded(true);
        return { ...data, resolvedTranslationStatus, resolvedTranslationPlan, resolvedTranslationGlossary };
      }

      async function loadConversation(id, options = {}) {
        const { showLoading = true, silentError = false } = options;
        if (!id) {

        if (showLoading) {
          setPaperInfoLoaded(false);
          setPaperTitle("");
          setPdfUrl("");
          setFigures([]);
          setTables([]);
          setTags([]);
          setPaperMeta(normalizePaperMeta());
          setTranslationStatus(null);
          setTranslationPlan(null);
          setTranslationGlossary(null);
          setFiguresExpanded(false);
          setTablesExpanded(false);
          setLoading(true);
        }

        try {
          const res = await fetch(`${BASE_URL}/conversations/${id}`);
          if (!res.ok) {
            if (!silentError) {
              message.error("会话不存在");
            }
            return null;
          }
          const data = await res.json();
          return applyConversationPayload(data);
        } catch (err) {
          if (!silentError) {
            message.error("会话加载失败");
          }
          return null;
        } finally {
          if (showLoading) {
            setLoading(false);
          }
        }
      }

      async function waitForJobResult(jobId, options = {}) {
        const intervalMs = options.intervalMs || 1500;
        const timeoutMs = options.timeoutMs || 20 * 60 * 1000;
        const startedAt = Date.now();
        let lastProgress = null;

        while (true) {
          const res = await fetch(`${BASE_URL}/tasks/${jobId}`);
          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.detail || "任务状态获取失败");
          }
          if (typeof options.onTick === "function") {
            const tickPromise = options.onTick(data);
            if (tickPromise && typeof tickPromise.then === "function") {
              await tickPromise;
            }
          }
          const progressText = typeof data.progress === "string" ? data.progress.trim() : "";
          if (progressText && progressText !== lastProgress && typeof options.onProgress === "function") {
            lastProgress = progressText;
            const maybePromise = options.onProgress(progressText, data);
            if (maybePromise && typeof maybePromise.then === "function") {
              await maybePromise;
            }
          }
          if (data.status === "succeeded") {
            if (typeof options.onProgress === "function") {
              options.onProgress("任务已完成", data);
            }
            return data.result || {};
          }
          if (data.status === "failed") {
            throw new Error(data.error_message || "任务执行失败");
          }
          if (Date.now() - startedAt > timeoutMs) {
            throw new Error("任务执行超时，请稍后在会话列表中查看结果");
          }
          await new Promise(resolve => setTimeout(resolve, intervalMs));
        }
      }

      // ===== 上传功能 =====
      const uploadProps = {
        name: "file",
        accept: ".pdf",
        showUploadList: false,
        customRequest: async ({ file }) => {
          if (!poeApiKey) { message.error("请先配置 API Key"); return; }

          const progressKey = `upload-progress-${Date.now()}`;
          let linkedConversationId = null;
          message.open({ key: progressKey, type: "loading", content: "正在上传：准备提交任务", duration: 0 });
          setLoading(true);
          setPaperInfoLoaded(false);
          setBlocks([]);
          setPdfUrl("");
          setFigures([]);
          setTables([]);
          setTags([]);
          setPaperMeta(normalizePaperMeta());
          setTranslationStatus(null);

          setTranslationGlossary(null);
          setFiguresExpanded(false);
          setTablesExpanded(false);
          const tempTitle = file.name.replace(/\.pdf$/i, "");
          setPaperTitle(tempTitle);

          try {
            const formData = new FormData();
            formData.append("file", file);
            formData.append("api_key", poeApiKey);
            formData.append("poe_model", activePoeModel);
            formData.append("title_model", activeTitleModel);
            formData.append("extract_tags", extractTagsOnUpload ? "true" : "false");

            const enqueueRes = await fetch(`${BASE_URL}/tasks/ingest-pdf`, {
              method: "POST",
              body: formData
            });
            const enqueueData = await enqueueRes.json();
            if (!enqueueRes.ok) {
              message.error(enqueueData.detail || "上传失败");
              return;
            }

            message.open({ key: progressKey, type: "loading", content: "正在上传：任务已入队，等待 worker 处理", duration: 0 });
            const data = await waitForJobResult(enqueueData.task_id, {
              onTick: async (jobData) => {
                if (jobData?.conversation_id && !linkedConversationId) {
                  linkedConversationId = jobData.conversation_id;
                  setConversationId(linkedConversationId);
                  pushConversationToUrl(linkedConversationId);
                }
                const conversationTitle = (jobData?.conversation_title || "").trim();
                if (conversationTitle) {
                  setPaperTitle(conversationTitle);
                }
              },
              onProgress: async (progressText) => {
                message.open({ key: progressKey, type: "loading", content: `上传处理中：${progressText}`, duration: 0 });
                const titlePrefix = "标题已提取：";
                if (typeof progressText === "string" && progressText.startsWith(titlePrefix)) {
                  const extractedTitle = progressText.slice(titlePrefix.length).trim();
                  if (extractedTitle) {
                    setPaperTitle(extractedTitle);
                  }
                }
              },
            });
            const finalConversationId = data.conversation_id || linkedConversationId;
            if (!finalConversationId) {
              throw new Error("上传任务未返回会话 ID");
            }
            setConversationId(finalConversationId);
            pushConversationToUrl(finalConversationId);
            await loadConversation(finalConversationId, { showLoading: false });

            if (data.exists) {
              message.info("文件已存在，跳转到对应会话");
              return;
            }

            message.success("上传任务完成");
          } catch (err) {
            message.error(err?.message || "上传失败");
            setPaperInfoLoaded(true);
          } finally {
            setLoading(false);
            message.destroy(progressKey);
          }
        }
      };

      // ===== 翻译功能 =====
      /**
       * 单次翻译动作
       */
      const performTranslationAction = async (action) => {
        try {
          const progressKey = action.progressKey || "continue-progress";
          const formData = new FormData();
          formData.append("api_key", poeApiKey);
          formData.append("poe_model", activePoeModel);
          formData.append("action", action.type || "continue");
          formData.append("target_scope", action.target_scope || "body");

          const enqueueRes = await fetch(
            `${BASE_URL}/translations/${conversationId}/continue`,
            { method: "POST", body: formData }
          );
          const enqueueData = await enqueueRes.json();
          if (!enqueueRes.ok) {
            message.error(enqueueData.detail || "请求失败");
            return { ok: false, reason: "request_failed" };
          }
          const data = await waitForJobResult(enqueueData.task_id, {
            onProgress: (progressText) => {
              message.open({
                key: progressKey,
                type: "loading",
                content: `翻译处理中：${progressText}`,
                duration: 0
              });
            },
          });
          const refreshedConversation = await loadConversation(conversationId, { showLoading: false });
          return { ok: true, data, status: refreshedConversation?.resolvedTranslationStatus || null };
        } catch (err) {
          message.error(err?.message || "请求失败");
          return { ok: false, reason: "request_failed" };
        }
      };

      /**
       * 单步继续
       */
      const handleContinue = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (glossaryNeedsConfirmation) { message.warning("请先确认关键术语与译法，再开始翻译。"); return; }
        if (!poeApiKey) { message.warning("请先配置 API Key"); return; }

        message.open({
          key: "continue-progress",
          type: "loading",
          content: "翻译处理中：准备提交任务",
          duration: 0
        });
        setLoading(true);
        const action = resolveAutomationAction(translationStatus, {
          autoTranslateAppendix: false,
          autoTranslateBreakerLimit: AUTO_TRANSLATE_BREAKER_DEFAULT,
        });
        if (!action || action.type === "stop") {
          setLoading(false);
          message.destroy("continue-progress");
          message.info("当前状态没有可继续的默认翻译动作");
          return;
        }
        await performTranslationAction({ ...action, progressKey: "continue-progress" });
        setLoading(false);
        message.destroy("continue-progress");
      };

      const handleAutoTranslate = async () => {
        if (!conversationId) { message.warning("请先上传论文"); return; }
        if (glossaryNeedsConfirmation) { message.warning("请先确认关键术语与译法，再开始翻译。"); return; }
        if (!poeApiKey) { message.warning("请先配置 API Key"); return; }

        const breakerLimit = automationSettings.autoTranslateBreakerLimit;
        let currentStatus = translationStatus;
        let previousReplySignature = "";
        let previousStateSignature = currentStatus
          ? `${currentStatus.state}|${currentStatus.active_scope}|${currentStatus.current_unit_id}|${currentStatus.next_unit_id}|${currentStatus.completed_unit_count}|${(currentStatus.remaining_unit_ids || []).join("|")}`
          : "";
        let stoppedByBreaker = true;

        setLoading(true);
        setAutoTranslating(true);
        try {
          for (let i = 0; i < breakerLimit; i++) {
            const action = resolveAutomationAction(currentStatus, automationSettings);
            if (!action || action.type === "stop") {
              stoppedByBreaker = false;
              if (currentStatus?.state === "ALL_DONE") {
                message.success("自动翻译已完成");
              } else if (currentStatus?.state === "BODY_DONE") {
                message.info("自动翻译已在正文完成后停止");
              } else if (currentStatus?.state === "UNSUPPORTED") {
                message.warning(`自动翻译已停止：${currentStatus?.reason || "当前 unit 无法可靠定位"}`);
              } else {
                message.info("自动翻译已停止");
              }
              break;
            }

            message.open({
              key: "continue-progress",
              type: "loading",
              content: `自动翻完：第 ${i + 1}/${breakerLimit} 次，当前 ${getScopeLabel(currentStatus?.active_scope || "body")}，目标 ${getScopeLabel(action.target_scope)}，动作「${formatTranslationActionLabel(action) || getScopeLabel(action.target_scope)}」`,
              duration: 0
            });

            const result = await performTranslationAction({ ...action, progressKey: "continue-progress" });
            if (!result.ok) {
              stoppedByBreaker = false;
              break;
            }

            const nextStatus = result.status;
            if (!nextStatus) {
              stoppedByBreaker = false;
              message.warning("自动翻译已停止：本轮未返回 translation_status");
              break;
            }

            const replySignature = String(result.data?.content || result.data?.display_reply || result.data?.reply || "").trim();
            const nextStateSignature = `${nextStatus.state}|${nextStatus.active_scope}|${nextStatus.current_unit_id}|${nextStatus.next_unit_id}|${nextStatus.completed_unit_count}|${(nextStatus.remaining_unit_ids || []).join("|")}`;
            if (
              replySignature === previousReplySignature &&
              nextStateSignature === previousStateSignature
            ) {
              stoppedByBreaker = false;
              message.warning("自动翻译已停止：检测到回复与状态未推进");
              break;
            }

            previousReplySignature = replySignature;
            previousStateSignature = nextStateSignature;
            currentStatus = nextStatus;

            if (currentStatus.state === "ALL_DONE") {
              stoppedByBreaker = false;
              message.success("自动翻译已完成");
              break;
            }

            const nextAction = resolveAutomationAction(currentStatus, automationSettings);
            if (!nextAction || nextAction.type === "stop") {
              stoppedByBreaker = false;
              if (currentStatus.state === "BODY_DONE") {
                message.info("自动翻译已在正文完成后停止");
              } else if (currentStatus.state === "UNSUPPORTED") {
                message.warning(`自动翻译已停止：${currentStatus.reason || "当前 unit 无法可靠定位"}`);
              } else {
                message.info("自动翻译已停止");
              }
              break;
            }
          }

          if (stoppedByBreaker) {
            message.warning(`自动翻译已触发熔断，达到 ${breakerLimit} 次上限`);
          }
        } finally {
          setLoading(false);
          setAutoTranslating(false);
          message.destroy("continue-progress");
        }
      };

      const openAssetDirectionModal = () => {
        setAssetDirectionModalVisible(true);
      };

      const handleAssetDirectionSubmit = async () => {
        if (!conversationId) {
          message.warning("请先上传论文");
          return;
        }

        setAssetDirectionSubmitting(true);
        const hide = message.loading("正在重新处理...", 0);

        try {
          const formData = new FormData();
          formData.append("figure_caption_direction", figureDirectionValue);
          formData.append("table_caption_direction", tableDirectionValue);

          const res = await fetch(`${BASE_URL}/assets/${conversationId}/reprocess`, {
            method: "POST",
            body: formData
          });
          const data = await res.json();

          if (!res.ok) {
            message.error(data.detail || "重新处理失败");
            return;
          }

          await loadConversation(conversationId);
          setAssetDirectionModalVisible(false);
          message.success("重处理完成");
        } finally {
          setAssetDirectionSubmitting(false);
          hide();
        }
      };

      function extractAssetOrderValue(item, type) {
        const rawLabel = type === "figure" ? item.figure_label : item.table_label;
        const match = typeof rawLabel === "string" ? rawLabel.match(/(\d+)(?!.*\d)/) : null;
        if (match) {
          return Number(match[1]);
        }
        const fallbackIndex = type === "figure" ? item.figure_index : item.table_index;
        return typeof fallbackIndex === "number" ? fallbackIndex : Number.MAX_SAFE_INTEGER;
      }

      function scrollToSummaryAnchor() {
        const summaryAnchor = document.querySelector(".content .message-block, .content .user-message-block");
        if (!summaryAnchor) {
          return;
        }
        const headerBox = document.querySelector(".header-box");
        const stickyOffset = headerBox instanceof HTMLElement ? headerBox.offsetHeight : 0;
        const extraGap = 12;
        const targetTop = summaryAnchor.getBoundingClientRect().top + window.scrollY - stickyOffset - extraGap;
        window.scrollTo({ top: Math.max(0, targetTop), behavior: "smooth" });
      }

      function collapseAssetSection(setExpanded) {
        setExpanded(false);
        window.setTimeout(scrollToSummaryAnchor, 60);
      }

      function renderAssetSection({ id, title, items, expanded, setExpanded, type }) {
        if (!items.length) {
          return null;
        }

        const sortedItems = [...items].sort((a, b) => {
          const indexA = extractAssetOrderValue(a, type);
          const indexB = extractAssetOrderValue(b, type);
          if (indexA !== indexB) {
            return indexA - indexB;
          }
          const pageA = a.page_number ?? Number.MAX_SAFE_INTEGER;
          const pageB = b.page_number ?? Number.MAX_SAFE_INTEGER;
          return pageA - pageB;
        });

        return (
          <div className="asset-section">
            <button
              id={id}
              data-toc-id={id}
              data-toc-text={title}
              data-toc-level="1"
              className="asset-section-header toc-anchor"
              onClick={() => {
                if (expanded) {
                  collapseAssetSection(setExpanded);
                } else {
                  setExpanded(true);
                }
              }}
              type="button"
            >
              <div className="asset-section-heading">
                <span>{title} ({items.length})</span>
                {!readOnly && (
                  <Tooltip title={ASSET_DIRECTION_TOOLTIP}>
                    <button
                      type="button"
                      className="asset-section-help"
                      onClick={(event) => {
                        event.stopPropagation();
                        openAssetDirectionModal();
                      }}
                      aria-label={`解析有错误？调整${title}的 caption 位置`}
                    >
                      ?
                    </button>
                  </Tooltip>
                )}
              </div>
              <div className={`asset-section-toggle ${expanded ? "expanded" : ""}`}>
                <CaretRightOutlined />
                <span>{expanded ? "收起" : "展开"}</span>
              </div>
            </button>
            {expanded && (
              <div className="asset-section-body">
                <Image.PreviewGroup>
                  <div className="asset-grid">
                    {sortedItems.map(item => {
                      const label = type === "figure"
                        ? (item.figure_label || `Figure ${item.figure_index}`)
                        : (item.table_label || `Table ${item.table_index}`);
                      return (
                        <div
                          key={item.id || `${type}-${item.page_number}-${item.figure_index || item.table_index}`}
                          className="asset-card"
                        >
                          <Image
                            src={item.image_url}
                            alt={item.caption || label}
                            className="asset-image"
                          />
                          <div className="asset-meta">
                            {label + ` · 第 ${item.page_number} 页`}
                          </div>
                          <div className="asset-caption">{item.caption || "未识别到 caption"}</div>
                        </div>
                      );
                    })}
                  </div>
                </Image.PreviewGroup>
              </div>
            )}
            {isMobile && expanded && (
              <button
                type="button"
                className={`asset-floating-collapse asset-floating-collapse-${type}`}
                onClick={() => collapseAssetSection(setExpanded)}
                aria-label={`收起${title}`}
              >
                <CaretRightOutlined className="asset-floating-collapse-icon" />
                <span>{`收起${title}`}</span>
              </button>
            )}
          </div>
        );
      }

      const filteredTagCategories = tagKeyword.trim()
        ? tagLibrary
            .map(category => ({
              ...category,
              tags: (category.tags || []).filter(tag => {
                const searchText = `${tag.tag_label} ${tag.tag_label_en} ${tag.tag_code}`.toLowerCase();
                return searchText.includes(tagKeyword.trim().toLowerCase());
              }),
            }))
            .filter(category => category.tags.length > 0)
        : tagLibrary.filter(category => category.category_code === activeTagCategory);

      const translationStateMeta = translationStatus ? getTranslationStateMeta(translationStatus) : null;
      const translationProgress = translationStatus
        ? buildTranslationProgressBreakdown(translationStatus, translationPlan)
        : null;
      const glossaryEntries = Array.isArray(translationGlossary?.entries) ? translationGlossary.entries : [];
      const hasGlossaryEntries = glossaryEntries.length > 0;
      const translationStarted = Number(translationStatus?.completed_unit_count || 0) > 0;
      const glossaryNeedsConfirmation = hasGlossaryEntries && translationGlossary?.status !== "confirmed";
      const showGlossarySection = hasGlossaryEntries;
      const continueButtonMeta = getContinueButtonMeta(translationStatus);
      const autoTranslateButtonMeta = getAutoTranslateButtonMeta(translationStatus, automationSettings);
      const overallRatioText = formatProgressRatio(translationProgress?.overallCompleted, translationProgress?.overallTotal, { emptyText: "0 / 0" });
      const overallPercentText = formatProgressPercent(translationProgress?.overallCompleted, translationProgress?.overallTotal);
      const bodyRatioText = translationProgress?.hasScopedPlan
        ? formatProgressRatio(translationProgress.bodyCompleted, translationProgress.bodyTotal, { emptyText: "无正文" })
        : "待解析";
      const appendixRatioText = translationProgress?.hasScopedPlan
        ? formatProgressRatio(translationProgress.appendixCompleted, translationProgress.appendixTotal, { emptyText: "无附录" })
        : "待解析";
      const overallPercentValue = Number.parseInt(overallPercentText, 10) || 0;
      const bodyPercentValue = translationProgress?.hasScopedPlan && Number(translationProgress?.bodyTotal) > 0
        ? Math.round((Number(translationProgress.bodyCompleted || 0) / Number(translationProgress.bodyTotal || 1)) * 100)
        : 0;
      const appendixPercentValue = translationProgress?.hasScopedPlan && Number(translationProgress?.appendixTotal) > 0
        ? Math.round((Number(translationProgress.appendixCompleted || 0) / Number(translationProgress.appendixTotal || 1)) * 100)
        : 0;
      const glossaryStatusText = hasGlossaryEntries ? (glossaryNeedsConfirmation ? "待确认" : "已确认") : "无译法表";
      const glossaryMetaText = hasGlossaryEntries ? `${glossaryStatusText} · ${glossaryEntries.length} 项` : "无译法表";
      const compactProgressText = translationProgress?.hasScopedPlan
        ? `正文 ${bodyRatioText} · ${Number(translationProgress?.appendixTotal || 0) > 0 ? `附录 ${appendixRatioText}` : "附录无"}`
        : "进度待解析";
      const remainingUnitIds = Array.isArray(translationStatus?.remaining_unit_ids)
        ? translationStatus.remaining_unit_ids.filter(Boolean)
        : [];
      const remainingUnitsCount = remainingUnitIds.length;
      const remainingUnitsSummary = remainingUnitsCount > 0 ? `剩余 ${remainingUnitsCount} 个 Units。` : "";
      const translationStatusSummary = (() => {
        if (!translationProgress?.hasScopedPlan) {
          return "当前会话已生成翻译状态，但尚未解析出完整进度明细。";
        }
        const overall = `${translationProgress.overallCompleted || 0} / ${translationProgress.overallTotal || 0}`;
        const body = `${translationProgress.bodyCompleted || 0} / ${translationProgress.bodyTotal || 0}`;
        const appendix = Number(translationProgress.appendixTotal || 0) > 0
          ? `${translationProgress.appendixCompleted || 0} / ${translationProgress.appendixTotal || 0}`
          : "未检测到附录内容";
        if (translationStatus?.state === "ALL_DONE") {
          return `当前翻译任务已全部完成，总进度 ${overall}，正文进度 ${body}，附录进度 ${appendix}。`;
        }
        if (translationStatus?.state === "BODY_DONE") {
          return `正文翻译已完成，正文进度 ${body}；当前处于附录阶段，附录进度 ${appendix}。`;
        }
        if (translationStatus?.state === "UNSUPPORTED") {
          return `翻译在当前 Unit 停止，已完成总进度 ${overall}。${translationStatus?.reason ? `原因：${translationStatus.reason}。` : ""}`;
        }
        return `当前正在翻译中，总进度 ${overall}，正文进度 ${body}，附录进度 ${appendix}。`;
      })();

      // ===== JSX 渲染 =====
      return (
        <>
          <div className="header-box">
            <div className="container">
              <div className={isMobile ? "chat-mobile-title-row" : ""} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: isMobile ? "nowrap" : "wrap", gap: "5px" }}>
                <div style={{ display: "flex", alignItems: "center", gap: "20px", flex: 1, minWidth: 0 }}>
                  <h2 className={`header-title ${isMobile ? "chat-mobile-header-title" : ""}`}>
                    {paperTitle
                      ? isMobile
                        ? <span className="chat-mobile-title-text">{paperTitle}</span>
                        : <><FileTextOutlined /> {paperTitle}</>
                      : <><FileTextOutlined /> 论文翻译</>}
                  </h2>
                </div>
                <div className={isMobile ? "chat-mobile-title-actions" : ""} style={{ display: "flex", alignItems: "center", gap: "20px", flexShrink: 0 }}>
                  {readOnly && <ReadModeBadge />}
                </div>
              </div>

              <div style={{ marginTop: 15, display: "flex", alignItems: "center", justifyContent: "space-between", flexWrap: "wrap", gap: 10 }}>
                <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", gap: 10 }}>
                  <Button
                    icon={<ArrowLeftOutlined />}
                    style={{ color: "#1677ff", borderColor: "#1677ff" }}
                    onClick={() => window.location.href = "/"}
                  >
                    {!isMobile && "论文库"}
                  </Button>
                
                {/* 桌面端显示完整按钮 */}
                {!readOnly && !isMobile && (
                  <Button
                    icon={<SettingOutlined />}
                    onClick={() => setConfigModalVisible(true)}
                    disabled={loading}
                  >
                    配置
                  </Button>
                )}

                {!readOnly && isMobile && (
                  <Button
                    icon={<SettingOutlined />}
                    onClick={() => setConfigModalVisible(true)}
                    disabled={loading}
                  />
                )}

                {/* upload button only when no conversation in progress */}
                {!readOnly && !conversationId && (
                  <Upload {...uploadProps} disabled={loading}>
                    <Button icon={<UploadOutlined />} type="primary" loading={loading}>
                      {loading ? "处理中..." : "上传 PDF"}
                    </Button>
                  </Upload>
                )}

                {!readOnly && !isMobile && (
                  <>
                    <Button
                      icon={<CaretRightOutlined />}
                      onClick={handleContinue}
                      loading={loading}
                      disabled={loading || autoTranslating || !conversationId || !continueButtonMeta.enabled || glossaryNeedsConfirmation}
                    >
                      {loading ? "翻译中..." : continueButtonMeta.label}
                    </Button>

                    <Button
                      type="primary"
                      icon={<CaretRightOutlined />}
                      onClick={handleAutoTranslate}
                      loading={autoTranslating}
                      disabled={loading || autoTranslating || !conversationId || !autoTranslateButtonMeta.enabled || glossaryNeedsConfirmation}
                    >
                      {autoTranslating ? "自动翻译中..." : autoTranslateButtonMeta.label}
                    </Button>

                  </>
                )}

                {/* 移动端更多菜单 */}
                {!readOnly && isMobile && conversationId && (
                  <>
                    <Button
                      icon={<CaretRightOutlined />}
                      onClick={handleContinue}
                      loading={loading}
                      disabled={loading || autoTranslating || !continueButtonMeta.enabled || glossaryNeedsConfirmation}
                    >
                      {loading ? "翻译中..." : continueButtonMeta.label}
                    </Button>

                    <Dropdown
                      overlay={(
                        <Menu>
                          <Menu.Item icon={<CaretRightOutlined />} onClick={handleAutoTranslate} disabled={loading || autoTranslating || !autoTranslateButtonMeta.enabled || glossaryNeedsConfirmation}>
                            {autoTranslating ? "自动翻译中..." : autoTranslateButtonMeta.label}
                          </Menu.Item>
                        </Menu>
                      )}
                      placement="bottomLeft"
                    >
                      <Button icon={<MoreOutlined />} />
                    </Dropdown>
                  </>
                )}

                </div>

                <div style={{ display: "flex", alignItems: "center", gap: "10px" }}>
                  {pdfUrl && (
                    <Tooltip title={isMobile ? '下载论文' : ''}>
                      <Button
                        icon={<DownloadOutlined />}
                        onClick={() => window.open(pdfUrl, '_blank')}
                      >
                        {!isMobile && '下载论文'}
                      </Button>
                    </Tooltip>
                  )}
                  {conversationId && (
                    <Tooltip title={isMobile ? '分享' : ''}>
                      <Button
                        icon={<ShareAltOutlined />}
                        onClick={handleShare}
                      >
                        {!isMobile && '分享'}
                      </Button>
                    </Tooltip>
                  )}
                </div>
              </div>
            </div>
          </div>

          <div className="container">
            <div className="layout">

              {!isMobile && (
                <div className="sidebar">
                  <h3>目录</h3>
                  {toc.map(item => (
                    <div
                      key={item.id}
                      className={`toc-item level-${item.level} ${activeHeading === item.id ? "active" : ""}`}
                      onClick={() =>
                        document.getElementById(item.id)
                          ?.scrollIntoView({ behavior: "smooth" })
                      }
                    >
                      {item.text}
                    </div>
                  ))}
                </div>
              )}

              <div className="content">
                {paperTitle && <div className="title-block">{paperTitle}</div>}
                {paperInfoLoaded && (paperTitle || conversationId) && (
                  <div className="tag-block">
                    <div className="tag-block-header">
                      <div className="tag-block-title">论文标签</div>
                      <div className="tag-block-actions">
                        {!readOnly && conversationId && (
                          <>
                            <Tooltip title="刷新论文标签与论文信息">
                              <button
                                type="button"
                                className="tag-block-edit"
                                onClick={refreshPaperMetadata}
                                aria-label="刷新论文标签与论文信息"
                                disabled={tagRefreshing}
                              >
                                <ReloadOutlined spin={tagRefreshing} />
                              </button>
                            </Tooltip>
                            <button
                              type="button"
                              className="tag-block-edit"
                              onClick={openTagPicker}
                              aria-label="编辑论文标签"
                              title="编辑论文标签"
                              disabled={tagRefreshing}
                            >
                              <EditOutlined />
                            </button>
                          </>
                        )}
                      </div>
                    </div>
                    <div className="tag-block-body">
                      {renderMetaTagChips(paperMeta)}
                      {renderTagChips(tags)}
                    </div>
                  </div>
                )}
                {translationStatus && translationStateMeta && (
	                <div className={`translation-status-card ${translationStateMeta.className}`}>
	                    <div className="translation-status-header">
	                      <div className="translation-status-title">
                          <span>翻译状态</span>
                        </div>
	                      <span className="translation-status-badge">
                          <span className="translation-status-badge-dot" />
                          {translationStateMeta.label}
                        </span>
	                    </div>
                      <div className="translation-status-topline">
                        <div className="translation-status-main-value">
                          {overallRatioText}
                          <span className="translation-status-main-units">Units</span>
                        </div>
                        <div className="translation-status-percent">{overallPercentText}</div>
                        <div className="translation-status-progressbar-track">
                          <div
                            className="translation-status-progressbar-fill translation-status-progressbar-fill-overall"
                            style={{ width: `${overallPercentValue}%` }}
                          />
                        </div>
                        <div className="translation-status-mini-tag">{compactProgressText}</div>
                      </div>
                      <div className="translation-status-meta">
                        <div className="translation-status-meta-item">
                          <div className="translation-status-meta-key">当前范围</div>
                          <div className="translation-status-meta-value">{getScopeLabel(translationStatus.active_scope || "body")}</div>
                        </div>
                        <div className="translation-status-meta-item">
                          <div className="translation-status-meta-key">当前 Unit</div>
                          <div className="translation-status-meta-value">{translationStatus.current_unit_id || "暂无"}</div>
                        </div>
                        <div className="translation-status-meta-item">
                          <div className="translation-status-meta-key">下一 Unit</div>
                          <div className="translation-status-meta-value">{translationStatus.next_unit_id || "暂无"}</div>
                        </div>
                        <div className="translation-status-meta-item">
                          <div className="translation-status-meta-key">译法状态</div>
                          <div className="translation-status-meta-value">{glossaryMetaText}</div>
                        </div>
                      </div>
                      <div className="translation-status-bottom">
                        <div className="translation-status-desc">
                          <span>{translationStatusSummary}</span>
                          {!!remainingUnitsSummary && (
                            <>
                              <span className="translation-status-desc-inline-note">{remainingUnitsSummary}</span>
                              <button
                                type="button"
                                className="translation-status-inline-link"
                                onClick={() => setRemainingUnitsExpanded(prev => !prev)}
                              >
                                {remainingUnitsExpanded ? "收起剩余章节" : "查看剩余章节"}
                              </button>
                            </>
                          )}
                        </div>
                        {showGlossarySection && glossaryNeedsConfirmation && (
                          <div className="translation-status-actions">
                            <span className="translation-status-action-pill pending">译法待确认</span>
                          </div>
                        )}
                      </div>
                      {remainingUnitsExpanded && remainingUnitIds.length > 0 && (
                        <div className="translation-status-inline-panel">
                          剩余章节：{remainingUnitIds.join(" / ")}
                        </div>
                      )}
                      {showGlossarySection && (
                        <div className="translation-status-glossary-panel">
                          <div className="translation-status-glossary-header">
                            <div className="translation-status-glossary-heading">
                              <div className="translation-status-glossary-title">关键术语与译法</div>
                            </div>
                            <div className="translation-status-glossary-toolbar">
                              <span className={`translation-status-action-pill ${glossaryNeedsConfirmation ? "pending" : "confirmed"}`}>
                                {glossaryNeedsConfirmation ? "待确认" : "已确认"}
                              </span>
                              <button
                                type="button"
                                className="translation-status-action-pill toggle"
                                onClick={() => setGlossaryCollapsed(prev => !prev)}
                              >
                                {glossaryCollapsed ? "展开译法列表" : "收起译法列表"}
                              </button>
                            </div>
                          </div>
                          {glossaryCollapsed ? (
                            <div className="translation-status-section-summary">
                              这里会列出全文翻译中需要统一的关键术语及候选译法。展开后可查看或确认本次采用的译法。
                            </div>
                          ) : (
                            <>
                              {!translationStarted && (
                                <div className="translation-status-section-subtitle">
                                  默认选中第一候选。确认后，后续各 Unit 会统一使用这里选定的译法。
                                </div>
                              )}
                              <div className="translation-status-glossary-list">
                                {glossaryEntries.map(entry => (
                                  <div key={entry.term} className="translation-status-glossary-row">
                                    <div className="glossary-line">
                                      <span className="glossary-term-inline">{entry.term}:</span>
                                      <div className="glossary-candidates">
                                        {entry.candidates.map((candidate, index) => {
                                          const selected = (glossaryDraftSelections[entry.term] || entry.selected) === candidate;
                                          return (
                                            <React.Fragment key={`${entry.term}-${candidate}`}>
                                              {index > 0 && <span className="glossary-separator">/</span>}
                                              <button
                                                type="button"
                                                className={`glossary-candidate ${selected ? "selected" : ""}`}
                                                onClick={() => updateGlossarySelection(entry.term, candidate)}
                                                disabled={translationStarted || readOnly || glossarySaving}
                                              >
                                                {candidate}
                                              </button>
                                            </React.Fragment>
                                          );
                                        })}
                                      </div>
                                    </div>
                                  </div>
                                ))}
                              </div>
                              <div className="translation-status-glossary-footer">
                                <div className="translation-status-section-footer">
                                  {glossaryNeedsConfirmation
                                    ? "确认译法前，继续翻译和自动翻完会保持禁用。"
                                    : "后续翻译会统一沿用这里确认过的译法。"}
                                </div>
                                {!translationStarted && (
                                  <Button
                                    type="primary"
                                    size="small"
                                    onClick={handleConfirmGlossary}
                                    loading={glossarySaving}
                                    disabled={readOnly || glossarySaving || !conversationId}
                                  >
                                    {translationGlossary?.status === "confirmed" ? "更新译法确认" : "确认译法"}
                                  </Button>
                                )}
                              </div>
                            </>
                          )}
                        </div>
                      )}
	                    {!!translationStatus.reason && (
                        <div className="translation-status-note">原因：{translationStatus.reason}</div>
                      )}
                      {glossaryNeedsConfirmation && (
                        <div className="translation-status-note">请先确认关键术语与译法，再继续翻译。</div>
                      )}
	                  </div>
                )}
                {renderAssetSection({
                  id: "figures-section",
                  title: "论文插图",
                  items: figures,
                  expanded: figuresExpanded,
                  setExpanded: setFiguresExpanded,
                  type: "figure"
                })}
                {renderAssetSection({
                  id: "tables-section",
                  title: "论文表格",
                  items: tables,
                  expanded: tablesExpanded,
                  setExpanded: setTablesExpanded,
                  type: "table"
                })}
                {blocks.map(block => (
                  block.content ? (
                  <div
                    key={block.id}
                    className={block.role === "user" ? "user-message-block" : "message-block"}
                    dangerouslySetInnerHTML={{
                      __html: MathUtils.renderMarkdownWithMath(block.content)
                    }}
                  />
                  ) : null
                ))}
              </div>

            </div>
          </div>

          {/* 移动端目录浮动按钮 */}
          {isMobile && (
            <Button
              type="primary"
              shape="circle"
              size="middle"
              icon={<FileTextOutlined />}
              style={{
                position: 'fixed',
                bottom: 20,
                right: 20,
                zIndex: 1000,
                width: 42,
                height: 42
              }}
              onClick={() => setDrawerVisible(true)}
            />
          )}

          {/* 移动端目录抽屉 */}
          <Drawer
            title="目录"
            placement="left"
            onClose={() => setDrawerVisible(false)}
            open={drawerVisible}
            width={280}
          >
            {toc.map(item => (
              <div
                key={item.id}
                className={`toc-item level-${item.level} ${activeHeading === item.id ? "active" : ""}`}
                style={{
                  padding: '8px 0',
                  borderBottom: '1px solid #f0f0f0'
                }}
                onClick={() => {
                  document.getElementById(item.id)?.scrollIntoView({ behavior: "smooth" });
                  setDrawerVisible(false);
                }}
              >
                {item.text}
              </div>
            ))}
          </Drawer>

          <Modal
            title="Poe API 配置"
            open={configModalVisible}
            onOk={saveConfig}
            onCancel={() => setConfigModalVisible(false)}
            width={500}
          >
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>Poe API Key：</label>
              <Input.Password
                placeholder="请输入 Poe API Key"
                value={poeApiKey}
                onChange={e => setPoeApiKey(e.target.value)}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>标题提取模型：</label>
              <Select
                style={{ width: "100%" }}
                value={activeTitleModel}
                onChange={setTitleModel}
                options={modelOptions}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>翻译模型：</label>
              <Select
                style={{ width: "100%" }}
                value={activePoeModel}
                onChange={setPoeModel}
                options={modelOptions}
              />
            </div>
            <div style={{ marginBottom: 20 }}>
              <Checkbox
                checked={extractTagsOnUpload}
                onChange={e => setExtractTagsOnUpload(e.target.checked)}
              >
                上传后自动提取论文标签
              </Checkbox>
              <div style={{ fontSize: 12, color: "#7a7a7a", marginTop: 8, lineHeight: 1.6 }}>
                开启后会在获得摘要后额外请求 Poe 进行标签分类，并把 tags 一同返回前端，可能额外消耗少量积分。
              </div>
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>自动翻完范围：</label>
              <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                <Checkbox checked={autoTranslateAppendix} onChange={e => setAutoTranslateAppendix(e.target.checked)}>
                  自动翻译附录
                </Checkbox>
              </div>
            </div>
            <div style={{ marginBottom: 20 }}>
              <label style={{ display: "block", marginBottom: 8 }}>自动翻完熔断次数：</label>
              <InputNumber
                min={1}
                max={50}
                value={autoTranslateBreakerLimit}
                onChange={value => setAutoTranslateBreakerLimit(value || AUTO_TRANSLATE_BREAKER_DEFAULT)}
                style={{ width: 120 }}
              />
              <div style={{ fontSize: 12, color: "#7a7a7a", marginTop: 8, lineHeight: 1.6 }}>
                自动翻完时最多连续请求的轮数，默认 {AUTO_TRANSLATE_BREAKER_DEFAULT} 次，用于避免 bot 异常循环。
              </div>
            </div>
            <div>
              <label style={{ display: "block", marginBottom: 8 }}>分享链接基础路径 (URL Base)：</label>
              <Input
                placeholder="留空则使用当前页面URL，例如: https://a.com"
                value={urlBase}
                onChange={e => setUrlBase(e.target.value)}
              />
              <div style={{ fontSize: 12, color: "#999", marginTop: 5 }}>
                设置后分享链接将使用此基础路径，例如当前页是 /chat/abc，URL Base 为 https://a.com，则分享链接为 https://a.com/chat/abc
              </div>
            </div>
          </Modal>

          <Modal
            title={ASSET_DIRECTION_MODAL_TITLE}
            open={assetDirectionModalVisible}
            onOk={handleAssetDirectionSubmit}
            onCancel={() => setAssetDirectionModalVisible(false)}
            okText="重新处理"
            confirmLoading={assetDirectionSubmitting}
          >
            <div className="asset-direction-modal">
              <div className="asset-direction-intro">
                如果插图或表格解析位置不对，可以在这里分别调整 caption 位置。保存后会重新处理当前论文的插图和表格。
              </div>

              <div className="asset-direction-card">
                <div className="asset-direction-card-title">插图设置</div>
                <div className="asset-direction-card-desc">这一组选项只影响“论文插图”。</div>
                <Radio.Group
                  value={figureDirectionValue}
                  onChange={(event) => setFigureDirectionValue(event.target.value)}
                  className="asset-direction-group"
                >
                  <Radio value="above">插图 caption 在上，图片内容在下</Radio>
                  <Radio value="below">插图 caption 在下，图片内容在上</Radio>
                </Radio.Group>
              </div>

              <div className="asset-direction-card">
                <div className="asset-direction-card-title">表格设置</div>
                <div className="asset-direction-card-desc">这一组选项只影响“论文表格”。</div>
                <Radio.Group
                  value={tableDirectionValue}
                  onChange={(event) => setTableDirectionValue(event.target.value)}
                  className="asset-direction-group"
                >
                  <Radio value="above">表格 caption 在上，表格内容在下</Radio>
                  <Radio value="below">表格 caption 在下，表格内容在上</Radio>
                </Radio.Group>
              </div>
            </div>
          </Modal>

          <Modal
            title="编辑论文标签"
            open={tagPickerVisible}
            onOk={applyTagSelection}
            onCancel={() => setTagPickerVisible(false)}
            okText="保存"
            confirmLoading={tagSaving}
            width={980}
            bodyStyle={{ paddingTop: 12 }}
          >
            <div className="tag-picker-toolbar">
              <div className="tag-picker-tabs">
                {tagLibrary.map(category => (
                  <button
                    key={category.category_code}
                    type="button"
                    className={`tag-picker-tab ${activeTagCategory === category.category_code ? "active" : ""}`}
                    onClick={() => setActiveTagCategory(category.category_code)}
                  >
                    {getLocalizedLabel(category)}
                  </button>
                ))}
              </div>
              <Input
                prefix={<SearchOutlined />}
                placeholder={uiLanguage === "en" ? "Search all tags" : "搜索全部标签"}
                value={tagKeyword}
                onChange={e => setTagKeyword(e.target.value)}
                className="tag-picker-search"
                allowClear
              />
            </div>

            <div className="tag-picker-selected">
              <div className="tag-picker-section-title">
                {uiLanguage === "en" ? `Selected Tags (${draftTagCodes.length})` : `已选标签（${draftTagCodes.length}）`}
              </div>
              <div className="tag-picker-selected-list">
                {renderSelectedTagPills(draftTagCodes, {
                  findTagByCode,
                  getLocalizedLabel,
                  onRemove: toggleDraftTag,
                  emptyText: uiLanguage === "en" ? "No tags selected" : "暂无已选标签",
                })}
              </div>
            </div>

            <div className="tag-picker-groups">
              {filteredTagCategories.map(category => (
                <div key={category.category_code} className="tag-picker-group">
                  <div className="tag-picker-group-title">{getLocalizedLabel(category)}</div>
                  <div className="tag-picker-chip-list">
                    {(category.tags || []).map(tag => {
                      const selected = draftTagCodes.includes(tag.tag_code);
                      return (
                        <button
                          key={tag.tag_code}
                          type="button"
                          className={`tag-picker-chip ${selected ? "selected" : ""}`}
                          onClick={() => toggleDraftTag(tag.tag_code)}
                          title={tag.tag_code}
                        >
                          <span>{getLocalizedLabel(tag)}</span>
                          <span className="tag-picker-chip-count">{tag.usage_count || 0}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ))}
            </div>
          </Modal>
        </>
      );
    }

    // ==========================================
    // 4. 入口渲染
    // ==========================================

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>

</html>
